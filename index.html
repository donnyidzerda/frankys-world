<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#33302B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Franky's World" />
<title>Franky's World</title>
<link rel="manifest" href="./manifest.webmanifest" />
<!-- iOS requires a real PNG here (it ignores SVG apple-touch-icons). -->
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

<!-- Tailwind v4 browser build + canvas-confetti. Both cached offline by the service worker. -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>

<style>
  /* =======================================================================
     DESIGN SYSTEM
     A warm, gallery-paper aesthetic - not neon, not gradient-y. Earthy,
     considered accents (clay / sage / ochre / sky / rose / plum), soft
     layered shadows, a rounded system typeface, and restrained motion.
     Built for calm focus on iPads & phones; high-contrast + calm modes.
     ======================================================================= */
  :root{
    --bg:#EFE7D8; --bg-2:#E7DCC8; --surface:#FFFFFF; --surface-2:#FBF6EC;
    --ink:#34302A; --ink-soft:#7A7164; --line:#E2D8C4;
    --clay:#C9633F; --sage:#6E8C5E; --ochre:#D89A36; --sky:#5E8AA0;
    --rose:#CF8585; --plum:#7C6C90; --cream:#FBF3E7;
    /* Soft section tints - colour-code the three worlds without shouting. */
    --sky-soft:#E6EEF1; --sage-soft:#EAEFE3; --clay-soft:#F6E7DE;
    --r:26px; --r-sm:18px;
    --sh-sm:0 1px 2px rgba(52,48,42,.05), 0 3px 8px rgba(52,48,42,.07);
    --sh:0 2px 6px rgba(52,48,42,.06), 0 16px 34px rgba(52,48,42,.10);
    --sh-lg:0 4px 10px rgba(52,48,42,.07), 0 28px 56px rgba(52,48,42,.14);
    --ring:rgba(201,99,63,.35);
  }
  *{ -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; box-sizing:border-box; }
  html,body{ margin:0; height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; touch-action:manipulation;
    color:var(--ink); background:var(--bg);
    font-family:'Nunito','Quicksand',ui-rounded,-apple-system,'SF Pro Rounded',
      'Segoe UI',system-ui,sans-serif;
    font-feature-settings:"ss01" 1; -webkit-font-smoothing:antialiased; }
  body{ background-image:
      radial-gradient(rgba(52,48,42,.025) 1px, transparent 1px);
    background-size:26px 26px; }
  /* Paper grain: one static SVG turbulence layer over everything. Gives a
     hand-made, fibrous warmth instead of flat-vector cleanliness. Pure
     pseudo-element, no DOM node, no repaint cost. Off in high-contrast. */
  body::after{ content:''; position:fixed; inset:0; pointer-events:none;
    z-index:9998; opacity:.05; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='180'%20height='180'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.82'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3C/filter%3E%3Crect%20width='180'%20height='180'%20filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:180px 180px; }
  body.hc::after{ display:none; }
  /* Standalone PWA (added to Home Screen) has no Safari toolbar, so the
     status bar / notch / Dynamic Island would sit on top of the content.
     Pad the top by the safe-area inset (0 in a normal browser tab). */
  #app{ position:fixed; inset:0; display:flex; flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  svg{ display:block; }

  /* Content width caps - on wide screens cards, pillars and grids stay at
     a comfortable reading / tapping width and centre, instead of
     stretching edge to edge. Harmless on phones (already narrower). */
  .cap{ max-width:680px; margin-inline:auto; width:100%; }
  .cap-wide{ max-width:980px; margin-inline:auto; width:100%; }

  /* Desktop: a touch app must not stretch across a monitor. Present it as
     a centred device panel floating on the textured backdrop. Phones and
     tablets (coarse pointer) stay edge-to-edge fullscreen, as a PWA should. */
  @media (min-width:1024px) and (hover:hover) and (pointer:fine){
    body{ display:flex; align-items:center; justify-content:center;
      background-color:#E4D9C2;
      background-image:
        radial-gradient(72% 56% at 50% 36%, rgba(255,255,255,.5), transparent 72%),
        radial-gradient(rgba(52,48,42,.045) 1px, transparent 1px);
      background-size:100% 100%, 26px 26px; }
    #app{ position:relative; inset:auto;
      width:min(780px,94vw); height:min(1120px,94dvh);
      border-radius:36px; overflow:hidden;
      border:1px solid rgba(226,216,196,.7);
      box-shadow:0 2px 8px rgba(52,48,42,.10),
        0 44px 100px rgba(52,48,42,.30), 0 14px 34px rgba(52,48,42,.18); }
  }

  /* Fluid type. Hierarchy comes from BOTH size and weight - heaviest only
     where it earns it, so the screen has a clear loudest-to-quietest order
     instead of everything shouting at weight 800. */
  .t-display{ font-size:clamp(30px,6.4vw,52px); font-weight:700; letter-spacing:-.02em; line-height:1.04; }
  .t-title{ font-size:clamp(20px,4vw,30px); font-weight:700; letter-spacing:-.015em; line-height:1.12; }
  .t-head{ font-size:clamp(17px,3vw,22px); font-weight:600; letter-spacing:-.01em; }
  .t-body{ font-size:clamp(15px,2.4vw,18px); font-weight:500; line-height:1.55; }
  .t-label{ font-size:clamp(12px,2vw,14px); font-weight:700; letter-spacing:.04em;
    text-transform:uppercase; color:var(--ink-soft); }
  .muted{ color:var(--ink-soft); }

  /* Components */
  .card{ background:var(--surface); border-radius:var(--r); box-shadow:var(--sh);
    border:1px solid rgba(226,216,196,.7); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:10px;
    border-radius:999px; font-weight:700; padding:16px 26px; font-size:clamp(15px,2.6vw,18px);
    background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8);
    transition:transform .14s cubic-bezier(.2,.7,.3,1), box-shadow .14s, background .14s; }
  .btn:active{ transform:translateY(2px) scale(.99); box-shadow:var(--sh-sm); }
  .btn:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring), var(--sh-sm); }
  .btn-primary{ background:var(--clay); color:#fff; border-color:transparent; }
  .btn-go{ background:var(--sage); color:#fff; border-color:transparent; }
  .btn-quiet{ background:var(--surface-2); }
  .btn-icon{ padding:14px; border-radius:var(--r-sm); }
  /* Fridge-door gallery */
  .fridge{ background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.5), transparent 40%),
      repeating-linear-gradient(45deg,#e7dcc4 0 6px,#e3d7bd 6px 12px); }
  .photo{ position:relative; background:#fff; padding:10px 10px 14px;
    box-shadow:var(--sh); border-radius:4px; }
  .photo:nth-child(3n){ transform:rotate(-2.2deg); }
  .photo:nth-child(3n+1){ transform:rotate(1.6deg); }
  .photo:nth-child(3n+2){ transform:rotate(-.8deg); }
  .photo .tape{ position:absolute; top:-10px; left:50%; width:64px; height:22px;
    transform:translateX(-50%) rotate(-3deg);
    background:rgba(214,196,150,.55); box-shadow:0 1px 2px rgba(0,0,0,.08); }

  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    animation:rise .32s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  .pop{ animation:pop .26s cubic-bezier(.2,.8,.3,1.05); }
  @keyframes pop{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  .float{ animation:float 6s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .nudge{ animation:nudge .6s ease; }
  @keyframes nudge{ 0%,100%{transform:rotate(0)} 30%{transform:rotate(-5deg)} 70%{transform:rotate(5deg)} }
  /* One-shot "this is ready" pulse - the only moment a button asks to be
     pressed, and only when the child has earned it (Pen-Live). */
  .ready{ animation:readyPulse .9s cubic-bezier(.2,.7,.3,1); }
  @keyframes readyPulse{ 0%,100%{transform:none} 42%{transform:scale(1.045)} }
  body.calm .float,body.calm .nudge,body.calm .ready{ animation:none !important; }
  /* Echo mic button: the child's turn to speak. Holds while they say the
     sound; a calm plum ring pulses out so they feel the moment is theirs. */
  .micbtn{ position:relative; width:128px; height:128px; border-radius:50%;
    background:var(--surface); box-shadow:var(--sh);
    border:1px solid rgba(226,216,196,.8);
    display:flex; align-items:center; justify-content:center;
    transition:background .18s, transform .14s; }
  .micbtn:active{ transform:scale(.97); }
  .micbtn.rec{ background:var(--plum); }
  .micbtn .mr{ position:absolute; inset:-4px; border-radius:50%;
    border:3px solid var(--plum); opacity:0; pointer-events:none; }
  .micbtn.rec .mr{ animation:micPulse 1.05s ease-out infinite; }
  @keyframes micPulse{ 0%{transform:scale(1);opacity:.55} 100%{transform:scale(1.34);opacity:0} }
  body.calm .micbtn.rec .mr{ animation:none; }
  /* Franky's world: milestones pop in once when unlocked; gentle ambient
     motion (sun pulse, cloud drift, bird bob) - all off in calm mode. */
  .we{ transform-box:fill-box; transform-origin:center bottom; }
  .we.lock{ opacity:0; }
  body:not(.calm) .we.new{ animation:wpop .6s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes wpop{ 0%{opacity:0;transform:scale(.15)} 60%{opacity:1;transform:scale(1.12)} 100%{transform:scale(1)} }
  .w-sun{ transform-box:fill-box; transform-origin:center; }
  .w-cloud,.w-bird{ transform-box:fill-box; }
  body:not(.calm) .w-sun{ animation:wsun 4.5s ease-in-out infinite; }
  body:not(.calm) .w-cloud{ animation:wcloud 9s ease-in-out infinite alternate; }
  body:not(.calm) .w-bird{ animation:wbird 1.7s ease-in-out infinite; }
  @keyframes wsun{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes wcloud{ from{transform:translateX(-7px)} to{transform:translateX(11px)} }
  @keyframes wbird{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  /* Decode slide hint: a dot sweeps left-to-right under the word, showing
     the child to drag across the letters as the sounds blend. */
  @keyframes wsweepdot{ 0%{left:0;opacity:0} 12%{opacity:1} 88%{opacity:1} 100%{left:100%;opacity:0} }
  .sweeprail{ position:relative; height:8px; margin:6px auto 0; max-width:320px; }
  .sweeprail i{ position:absolute; top:0; width:14px; height:14px; margin-left:-7px;
    border-radius:50%; background:var(--ochre); box-shadow:0 0 0 4px rgba(217,162,74,.25);
    animation:wsweepdot 1.5s ease-in-out 2; }
  /* Short-viewport (landscape phone): tighten the reading stage so the mic
     and choices stay on-screen without scrolling. */
  @media (max-height:560px){
    .screen .cap{ gap:8px !important; padding-top:6px !important; padding-bottom:6px !important; }
    .micbtn{ transform:scale(.82); }
  }

  /* Speech bubble (Franky) - soft, paper-like, no harsh outline */
  .bubble{ position:relative; background:var(--surface); color:var(--ink);
    border-radius:20px; padding:14px 18px; font-weight:700; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .bubble::after{ content:''; position:absolute; left:30px; bottom:-11px;
    width:18px; height:18px; background:var(--surface); transform:rotate(45deg);
    border-right:1px solid rgba(226,216,196,.8); border-bottom:1px solid rgba(226,216,196,.8); }

  /* Drawing stage: a framed sheet of paper */
  .stage{ position:relative; touch-action:none; }
  #paper{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r);
    background:var(--cream);
    background-image:radial-gradient(rgba(52,48,42,.03) 1px, transparent 1px);
    background-size:20px 20px;
    box-shadow:inset 0 0 0 1px rgba(52,48,42,.05), var(--sh); }
  canvas#pad{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r); }
  #ghost,#demo{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  /* --gw is nudged by invisible dynamic difficulty (more help when a
     child struggles, less when they're cruising). Never punishing. */
  /* pathLength=100 on every ghost path makes the dotted guide evenly
     spaced on tight curves AND long straights (arc-length normalized). */
  #ghost path{ fill:none; stroke:var(--ink); stroke-opacity:.16;
    stroke-width:var(--gw,26);
    stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:.55 3.6;
    transition:stroke .3s, stroke-opacity .3s, stroke-width .4s; }
  #ghost.help path{ stroke:var(--clay); stroke-opacity:.55; stroke-width:34; }
  #ghost.pen path{ stroke-width:var(--gw,15); stroke-dasharray:.5 2.4; stroke-opacity:.22; }
  #ghost.pen.help path{ stroke-width:20; }
  /* Pen-Live in-stroke nudge: the guide recedes when the child is tracking
     it well, and warms toward ochre when they have drifted off for a
     while. Silent, purely visual - a compass, never a scold. Placed last
     so it wins over the pen-mode opacity. */
  #ghost.gd-on path{ stroke-opacity:.07; }
  #ghost.gd-off path{ stroke:var(--ochre); stroke-opacity:.34; }

  /* Step progress */
  .prog{ height:8px; border-radius:999px; background:rgba(52,48,42,.10); overflow:hidden; }
  .prog > i{ display:block; height:100%; border-radius:999px; background:var(--sage);
    transition:width .5s cubic-bezier(.2,.7,.3,1); }

  /* Colour wells + brush chips */
  /* Colour wells - fat, easy targets for small fingers. The selected ring
     is kept tight so it never bleeds into a neighbour or off-screen. */
  .well{ width:clamp(62px,15vw,78px); height:clamp(62px,15vw,78px); border-radius:50%;
    box-shadow:var(--sh-sm), inset 0 0 0 3px rgba(255,255,255,.55);
    transition:transform .14s cubic-bezier(.2,.7,.3,1); position:relative; }
  .well.sel{ transform:scale(1.1); }
  .well.sel::after{ content:''; position:absolute; inset:-6px; border-radius:50%;
    border:3px solid var(--ink); opacity:.5; }
  .chip{ display:flex; align-items:center; justify-content:center; gap:9px;
    padding:13px 14px; border-radius:16px; min-height:54px;
    background:var(--surface-2); font-weight:800; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .chip.sel{ background:var(--ink); color:var(--cream); }
  .chip.sel svg{ stroke:var(--cream); }

  /* Reading answer feedback - a clear green ring on the right answer, a
     red ring + shake on a wrong tap; the letter inside stays readable. */
  .rc-ok{ box-shadow:0 0 0 5px var(--sage), var(--sh) !important; }
  .rc-no{ box-shadow:0 0 0 5px var(--rose), var(--sh) !important; animation:rcshake .4s ease; }
  @keyframes rcshake{ 0%,100%{transform:translateX(0)} 22%{transform:translateX(-9px)} 64%{transform:translateX(9px)} }
  body.calm .rc-no{ animation:none; }

  /* Switch */
  .sw{ width:58px; height:34px; border-radius:999px; background:rgba(52,48,42,.18);
    position:relative; transition:background .2s; flex:none; }
  .sw.on{ background:var(--sage); }
  .sw i{ position:absolute; top:4px; left:4px; width:26px; height:26px; border-radius:50%;
    background:#fff; box-shadow:var(--sh-sm); transition:transform .2s cubic-bezier(.2,.7,.3,1); }
  .sw.on i{ transform:translateX(24px); }

  /* .grid always lives inside a container-type wrap, so column count
     follows the content column width (not the window). */
  .grid{ display:grid; gap:14px; grid-template-columns:repeat(2,1fr); }
  @container (min-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @container (min-width:760px){ .grid{ grid-template-columns:repeat(4,1fr); } }
  .scroll{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .hidden{ display:none !important; }
  .caption{ background:rgba(52,48,42,.86); color:var(--cream);
    border-radius:14px; padding:9px 16px; font-weight:700; backdrop-filter:blur(6px); }
  .row{ display:flex; align-items:center; }
  .stack{ display:flex; flex-direction:column; }

  /* Evening warmth: from 18:00 to 06:00 the paper drifts a few points
     warmer and the ink softens slightly, so a tired child near bedtime
     isn't looking at a cool, high-contrast screen. Ambient, not a setting.
     Placed before .hc so high-contrast always wins. */
  body.evening{ --bg:#F1E5CB; --bg-2:#E9D8BB; --surface-2:#FCF3E2;
    --cream:#FCEFDC; --ink:#3E382E; }
  body.evening #paper{ background:var(--cream); }

  /* Accessibility modes */
  body.hc{ --bg:#000; --surface:#fff; --surface-2:#fff; --ink:#000; --ink-soft:#222;
    --line:#000; --cream:#fff; }
  body.hc{ background:#000; }
  body.hc #ghost path{ stroke:#000; stroke-opacity:.7; }
  body.hc .card,body.hc .btn{ border:2px solid #000; }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* =========================================================================
   FRANKY'S WORLD - LEARN WITH LUCY'S FAVOURITE LITTLE DOG
   A process-over-product reading, writing and drawing experience for
   toddlers, hosted by Franky the grey French bulldog.

   Pedagogy embedded in code (2025-26 early-childhood research):
   • Process over product - we never block, grade, or correct. A quality
     read only scales how warm the celebration is; every child advances.
   • Descriptive praise - we narrate the marks the child actually made
     ("you drew a long curving line"), not empty hype. Calm, specific, warm.
   • Age-adaptive - brush size, forgiveness, pacing, language shift 1→3.
   • Growth mindset & neurodiversity - high-contrast, calm mode, slow clear
     voice, always-on captions, gentle motion, zero frustration.
   • Child-directed - open exploration inside every step; Franky is kind.
   ========================================================================= */

/* ----- 0. Tiny DOM helpers --------------------------------------------- */
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const k in props) {
    if (k === "html") n.innerHTML = props[k];
    else if (k === "css") n.style.cssText = props[k];
    else if (k === "cls") n.className = props[k];
    else if (k in n) n[k] = props[k];
    else n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) c != null && n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand = (a) => a[(Math.random() * a.length) | 0];
// Whole-year age from a birthdate, clamped to the app's 1-5 range.
const ageOf = (y, m, d) => {
  const n = new Date();
  let a = n.getFullYear() - y;
  if (n.getMonth() + 1 < m || (n.getMonth() + 1 === m && n.getDate() < d)) a--;
  return clamp(a, 1, 5);
};

/* ----- 1. Persistent state --------------------------------------------- */
/* Multi-profile storage. Each child has their own snapshot (name, age,
   language, stars, stickers, progress, streak) plus their own gallery.
   An index tracks which profiles exist and which is active. Legacy
   single-profile data is migrated into the first profile so NOTHING is
   lost. Settings are per-profile too, so a Spanish cousin can have ES
   while Lucy stays NL. */
const SAVE_KEY = "scribble-heroes-v2";          // legacy single-profile key
const IDX_KEY  = "scribble-heroes-idx";
const pKey = id => SAVE_KEY + "::" + id;
const genId = () => "p" + Date.now().toString(36) + ((Math.random() * 1e4) | 0).toString(36);
const defaultState = () => ({
  id: null, name: "", age: 2, onboarded: false, lang: "nl",
  caseMode: "upper", drawDiff: 1, writeDiff: 1, sayName: "", worldSeenStars: 0,
  readBox: {}, readIntro: 1, readProd: {},
  readLat: {}, readPlaced: false, readHeard: {},   // Hoven: latency, placement, heard-log
  mathBox: {}, mathIntro: 3, mathLat: {},          // number sense mastery (start range 1-3)
  stars: 0, stickers: [], completed: {}, streak: 0, lastPlay: "", frankyLevel: 1,
  syncId: null, syncTs: 0,             // cross-device sync (set when linked)
  settings: { muted: false, voice: true, slowVoice: false,
    sound: true, haptics: true, contrast: false, calm: false,
    foundations: false, listen: true },   // listen = speech-recognition verify
});
function loadIdx() {
  try { const i = JSON.parse(localStorage.getItem(IDX_KEY)); if (i && i.ids) return i; } catch {}
  return null;
}
const saveIdx = i => localStorage.setItem(IDX_KEY, JSON.stringify(i));
function readProfile(id) {
  try {
    const r = JSON.parse(localStorage.getItem(pKey(id)));
    if (!r) return null;
    // v61 rename: buddyLevel -> frankyLevel. Carry old saves forward
    // so a profile that played before the rename keeps its progress.
    if (r.buddyLevel != null && r.frankyLevel == null) r.frankyLevel = r.buddyLevel;
    const s = Object.assign(defaultState(), r,
      { settings: Object.assign(defaultState().settings, r.settings || {}) });
    s.id = id; return s;
  } catch { return null; }
}
let S = load();
function load() {
  let idx = loadIdx();
  if (!idx) {
    // First run with this version: migrate any legacy single profile.
    let legacy = null;
    try { legacy = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch {}
    if (legacy && legacy.onboarded) {
      const id = genId();
      legacy.id = id;
      localStorage.setItem(pKey(id), JSON.stringify(legacy));
      idx = { active: id, ids: [id], legacyPid: id };
    } else {
      idx = { active: null, ids: [], legacyPid: null };
    }
    saveIdx(idx);
  }
  if (idx.active) {
    const s = readProfile(idx.active);
    if (s) return s;
  }
  return defaultState(); // no profile yet -> Splash
}
function save() {
  if (!S.id) return;
  S.syncTs = Date.now();                 // mark this profile's local edit time
  localStorage.setItem(pKey(S.id), JSON.stringify(S));
  const idx = loadIdx() || { active: S.id, ids: [], legacyPid: null };
  if (!idx.ids.includes(S.id)) idx.ids.push(S.id);
  idx.active = S.id;

    let res = await _ttsCache.match(key);
    if (!res) {
      // Cache miss: only then do we need the network. A cached phrase
      // must keep playing offline (the whole point of caching it).
      if (!navigator.onLine) return false;
      res = await fetch(key, { mode: "cors" });
      if (!res.ok) return false;
      try { await _ttsCache.put(key, res.clone()); } catch {}
    }
    const blob = await res.blob();
    // A newer speak() started while we were fetching: abort silently so we
    // don't play this (now stale) phrase on top of the newer one.
    if (gen !== _speakGen) return true;
    if (_ttsObj) try { URL.revokeObjectURL(_ttsObj); } catch {}
    _ttsObj = URL.createObjectURL(blob);
    _ttsEl = _ttsEl || new Audio();
    _ttsEl.playsInline = true; _ttsEl.volume = .95;
    try { _ttsEl.pause(); } catch {}
    _ttsEl.src = _ttsObj;
    await _ttsEl.play(); // throws if still blocked → caller falls back to device

  } catch { return false; }
}
function deviceSpeak(text) {
  if (!("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    // Warm and natural: gentle pace, near-natural pitch (no chipmunk).
    u.rate = S.settings.slowVoice ? .74 : .9;
    u.pitch = 1.06;
    u.volume = .95;
    u.lang = langTag();
    const dv = deviceVoice(); if (dv) u.voice = dv;
    speechSynthesis.speak(u);
  } catch {}
}
// speak(text, teach): teach=true uses the precise, accent-free teaching
// voice (letter sounds, words, blending); teach=false (default) uses
// Franky's warm everyday voice.
function speak(text, teach) {
  if (S.settings.muted || !S.settings.voice) return;
  // Spoken-name override: the display name stays (e.g. "Lucy") but the
  // voice says the parent's phonetic spelling (e.g. "Loesie") so names
  // are pronounced correctly in the chosen language.
  if (S.sayName && S.name) text = text.split(S.name).join(S.sayName);
  try { speechSynthesis.cancel(); } catch {}
  if (_ttsEl) try { _ttsEl.pause(); } catch {}
  const gen = ++_speakGen;
  // Try the realistic voice first; gracefully fall back to the device voice -
  // but only if this is still the latest call, so a stale fallback can't
  // play the device voice over a newer phrase's worker voice.
  realisticSpeak(text, teach, gen).then(ok => { if (!ok && gen === _speakGen) deviceSpeak(text); });
}

const buzz = p => { if (S.settings.haptics && navigator.vibrate) try { navigator.vibrate(p); } catch {} };

const SOUND = {

};
// Plofklanken (stop consonants): clipping is more honest than stretching.
// "bbbbal" forces TTS to insert a schwa ("buh"), exactly what Montessori
// teachers avoid. NL has fricative g (stretchable); EN/ES g is a stop.
const PLOSIVES = { nl:"bdkpt", en:"bdgkpt", es:"bdgkpt" };
const isPlosive = c => (PLOSIVES[LC()] || PLOSIVES.en).includes(String(c).toLowerCase());
// Only CONTINUANT consonants may be stretched (held): fricatives, nasals,
// liquids - sss, fff, mmm, nnn, lll, rrr, zzz, vvv, plus the Dutch fricative
// g. Vowels must NOT be stretched: a held short vowel turns long (the cause
// of "man" -> "maan", "pot" -> "poot"). Plosives can't be held either. So
// vowels and plosives are spoken once; only continuants are tripled.
const STRETCHERS = { nl:"fmnlrsvzg", en:"fmnlrsvz", es:"fmnlrsvz" };
const isStretch = c => (STRETCHERS[LC()] || STRETCHERS.en).includes(String(c).toLowerCase());
function phonics(L) {
  const w = (SOUND[LC()] || SOUND.en)[L] || L.toLowerCase();
  const f = w[0];
  const dl = S.caseMode === "lower" ? L.toLowerCase() : L;
  // Continuant consonant: hold it (sss. slang.). Vowel or plosive: say it
  // once (a. aap. / p. pot.) so a short vowel stays short. A period keeps
  // the pure sound and the whole word as two distinct tokens for the voice.
  const say = isStretch(L)
    ? `${f + f + f}. ${w}.`
    : `${f}. ${w}.`;
  return { tip: `${dl}  -  ${w}`, say };
}

function stepText(D, i, stp) {
  const st = stp || D.steps[i];
  // Letter / whole-word steps (writing words AND daily practice).
  if (st._c) {
    const L = String(st._c).toUpperCase();
    return phonics(L);
  }
  if (st._w) return { tip: t("wholeWordTip"), say: t("wholeWordSay")(st._w) };
  if (D.id && D.id.startsWith("num_")) {
    return st._numw
      ? { tip: t("numWholeTip"), say: t("numWholeSay")(st._numw) }
      : { tip: t("numTip")(st._num), say: t("numSay")(st._num) };
  }
  if (D.id && D.id.startsWith("shape_")) {
    const nm = t("shp_" + st._shape) || st._shape;
    return { tip: nm, say: t("shapeSay")(nm) };
  }
  const tbl = STEP_T[LC()];
  if (tbl && tbl[D.id] && tbl[D.id][i]) return { tip: tbl[D.id][i][0], say: tbl[D.id][i][1] };
  return { tip: st.tip, say: st.say };
}

// Real parent gate: a tiny sum a toddler cannot answer. Resolves cb() on
// success; used for Settings, "5 more minutes", and reset.
function parentGate(onPass) {
  const a = 2 + ((Math.random() * 7) | 0), b = 3 + ((Math.random() * 6) | 0);
  const ov = el("div", { css: "position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.55);backdrop-filter:blur(4px);padding:24px" });
  const card = el("div", { cls: "card", css: "background:var(--surface);padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:14px;text-align:center" });
  card.append(
    el("div", { cls: "t-title", textContent: t("pgTitle") }),
    el("div", { cls: "t-head", textContent: t("pgQ")(a, b) }));
  const opts = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap;justify-content:center" });
  const answers = new Set([a + b]);
  while (answers.size < 4) answers.add(a + b + (((Math.random() * 9) | 0) - 4) || 1);
  [...answers].sort(() => Math.random() - .5).forEach(n => {
    const x = el("button", { cls: "btn btn-quiet t-head", css: "min-width:64px", textContent: n });
    x.onclick = () => {
      if (n === a + b) { ov.remove(); onPass(); }
      else { Sound.fx.soft(); x.style.background = "var(--clay)"; x.style.color = "#fff"; }
    };
    opts.append(x);
  });
  const cancel = el("button", { cls: "btn", css: "background:var(--surface-2)", textContent: t("cancel") });
  cancel.onclick = () => ov.remove();
  card.append(opts, cancel);
  ov.append(card); APP.append(ov);
}

// Profile picker: children tap their own name to switch (no data lost);
// adding / deleting a child is parent-gated.
function ProfilePicker() {
  const list = profileList();
  const ov = el("div", { css: "position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.55);backdrop-filter:blur(4px);padding:24px" });
  const card = el("div", { cls: "card", css: "background:var(--surface);padding:22px;width:min(460px,92vw);display:flex;flex-direction:column;gap:12px;max-height:86vh;overflow:auto" });
  card.append(el("div", { cls: "t-title", css: "text-align:center", textContent: t("whoPlaying") }));
  list.forEach(p => {
    const active = p.id === S.id;
    const row = el("div", { css: `display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:18px;border:2px solid ${active ? "var(--clay)" : "var(--line)"};background:var(--surface-2)` });
    const pick = el("button", { css: "flex:1;display:flex;align-items:center;gap:12px;text-align:left;background:none",
      html: `<span style="background:var(--surface);border-radius:14px;padding:4px">${Franky("warm", 44)}</span>
             <span><span class="t-head">${p.name}</span><br><span class="t-body muted">${t("ageWord") || "Age"} ${p.age}</span></span>` });
    pick.onclick = () => { Sound.fx.tap(); buzz(12); ov.remove(); if (p.id !== S.id) switchProfile(p.id); };
    row.append(pick);
    if (list.length > 1) {
      const del = el("button", { cls: "btn btn-quiet btn-icon", html: ic("eraser", 18) });
      del.onclick = () => parentGate(() => {
        if (confirm(t("delConfirm")(p.name))) { ov.remove(); deleteProfile(p.id); }
      });
      row.append(del);
    }
    card.append(row);
  });
  const add = el("button", { cls: "btn btn-go t-head", html: ic("next", 20, "#fff") + `<span>${t("addChild")}</span>` });
  add.onclick = () => parentGate(() => { ov.remove(); _adding = true; Splash(); });
  const close = el("button", { cls: "btn", css: "background:var(--surface-2)", textContent: t("cancel") });
  close.onclick = () => ov.remove();
  card.append(add, close);
  ov.append(card); APP.append(ov);
}

/* ----- 8b. Letters with Franky - early handwriting practice -------------
   Simple "ball & stick" manuscript letters Lucy can trace, exactly like
   copying Papa's writing on paper. Each glyph is drawn through a mapper P
   so it scales/positions anywhere; reuses the same ghost + demo + gentle
   scoring as the drawings. Local box: x 0..adv, y 0..100, ascender top
   y8, x-height top y38, baseline y78, descender bottom y98.
   To add a word: add the letters it needs to GLYPH, then push it to WORDS. */
const _ln = (P, x1, y1, x2, y2) => `M ${P.x(x1)} ${P.y(y1)} L ${P.x(x2)} ${P.y(y2)}`;
const _cir = (P, cx, cy, r) => C(P.x(cx), P.y(cy), r * P.s);
// Ellipse as a path (for round caps that need optical overshoot).
const _ell = (P, cx, cy, rx, ry) => {
  const X = P.x(cx), Y = P.y(cy), a = rx * P.s, b = ry * P.s;
  return `M ${X - a} ${Y} a ${a} ${b} 0 1 0 ${2 * a} 0 a ${a} ${b} 0 1 0 ${-2 * a} 0`;
};

// centring + metric scaling), d = strokes drawn through mapper P.
// UPPERCASE letterforms - research-backed: young children learn capital
// letters first (simple straight lines and single curves, all the same
// height, no tricky ascenders/descenders). Each glyph sits between cap
// top y8 and baseline y78. b = used bounds for centring/scaling.

// Active glyph table + word casing follow the per-profile setting.
const glyphSet = () => S.caseMode === "lower" ? LOWER : GLYPH;
const wordChars = w => [...(S.caseMode === "lower" ? w.toLowerCase() : w.toUpperCase())];

// The words Lucy already practises with Papa, plus the children's names.

// Place a glyph at a common baseline with a consistent pen scale `s`
// (x-height letters stay shorter than tall ones - just like real
// handwriting practice on paper). Centred horizontally on `cx`.
const placeGlyph = (g, s, baseY, cx) => {
  const oy = baseY - 78 * s;            // local baseline y78 → world baseY
  const ox = cx - ((g.b[0] + g.b[2]) / 2) * s;
  return { s, x: lx => ox + lx * s, y: ly => oy + ly * s };
};

// One big centred trace step for a single glyph char.
function glyphStep(ch) {
  const G = glyphSet(), g = G[ch];
  return { _c: ch, icon: "write", tip: `Letter ${ch}`,
    say: `Trace ${ch}.`, d: g.d(placeGlyph(g, 7.2, 720, 500)) };
}
// Built fresh each open so it follows the caps/abc setting.
function letterSteps(word) {
  const G = glyphSet(), chars = wordChars(word);
  const steps = chars.map(glyphStep);
  const gap = 10;
  const wl = chars.reduce((a, c) => a + (G[c].b[2] - G[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(7.2, 860 / wl);
  let x = 500 - (wl * s) / 2; const all = [];
  chars.forEach(c => {
    const g = G[c], oy = 560 - 78 * s, ox = x - g.b[0] * s;
    all.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  steps.push({ _w: word, icon: "write", tip: "The whole word",
    say: `Now the whole word: ${word}.`, d: all });
  return steps;
}

// Small preview of a word in the same letterforms (cards, stickers, win).
function wordArt(word, size) {
  const G = glyphSet();
  const chars = wordChars(word).filter(c => G[c]);
  const gap = 6;
  const wl = chars.reduce((a, c) => a + (G[c].b[2] - G[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(0.92, 86 / wl);
  const y0 = Math.min(...chars.map(c => G[c].b[1]));
  const y1 = Math.max(...chars.map(c => G[c].b[3]));
  const oy = 50 - ((y0 + y1) / 2) * s;
  let x = 50 - (wl * s) / 2; const paths = [];
  chars.forEach(c => {
    const g = G[c], ox = x - g.b[0] * s;
    paths.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${
    paths.map(d => `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>`).join("")
  }</svg>`;
}
// Small preview for a single shape (cards/stickers/win).
function shapeArt(key, size) {
  const g = SHAPES[key]; const s = Math.min(0.9, 84 / (g.b[2] - g.b[0]));
  const ox = 50 - ((g.b[0] + g.b[2]) / 2) * s, oy = 50 - ((g.b[1] + g.b[3]) / 2) * s;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${
    g.d({ s, x: v => ox + v * s, y: v => oy + v * s }).map(d =>
      `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`).join("")
  }</svg>`;
}

/* ----- 8e. P1: Numbers 1-10 and Shapes (same trace engine) ------------- */
function numberSteps(n) {
  const ds = String(n).split("");
  const steps = ds.map(d => {
    const P = placeGlyph(GLYPH[d], 7.2, 720, 500);
    return { _num: d, icon: "write", tip: `The number "${d}"`,
      say: `Trace the number ${d}.`, d: GLYPH[d].d(P) };
  });
  if (ds.length > 1) { // e.g. 10 -> trace the whole number too
    const gap = 12;
    const wl = ds.reduce((a, c) => a + (GLYPH[c].b[2] - GLYPH[c].b[0]), 0) + gap * (ds.length - 1);
    const s = Math.min(7.2, 700 / wl); let x = 500 - (wl * s) / 2; const all = [];
    ds.forEach(c => { const g = GLYPH[c], oy = 560 - 78 * s, ox = x - g.b[0] * s;
      all.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
      x += (g.b[2] - g.b[0] + gap) * s; });
    steps.push({ _numw: String(n), icon: "write", tip: "The whole number",
      say: `Now the whole number ${n}.`, d: all });
  }
  return steps;
}

  const g = SHAPES[key], s = 8.4;
  const ox = 500 - ((g.b[0] + g.b[2]) / 2) * s, oy = 500 - ((g.b[1] + g.b[3]) / 2) * s;
  return [{ _shape: key, icon: "write", tip: key, say: `Let's trace the ${key}.`,
    d: g.d({ s, x: v => ox + v * s, y: v => oy + v * s }) }];
}

  if (!ok) { S.readBox[k] = Math.max(1, rdBox(k)); return; }
  if (_rdAdvanced.has(k)) return;
  S.readBox[k] = Math.min(5, rdBox(k) + 1);

// first (latency desc) so slow-but-correct items resurface sooner.
const byNeed = pre => (a, b) =>
  rdBox(pre + a) - rdBox(pre + b) || rdLat(pre + b) - rdLat(pre + a) || Math.random() - .5;

  sn.split(" ").every(wd =>
    [...wd].every(c => rdIntro().includes(c)) ||           // decodable, or

  const intro = rdIntro(), top = RD().sounds[S.readIntro - 1], items = [];

  if (rdBox("s:" + top) === 0) items.push({ t: "teach", s: top });
  // Echo: one active-production item, least-practised taught sound.
  const taught = intro.filter(c => rdBox("s:" + c) >= 1);
  if (taught.length) {
    const byProd = [...taught].sort((a, b) =>
      ((S.readProd && S.readProd[a]) || 0) - ((S.readProd && S.readProd[b]) || 0) || Math.random() - .5);
    items.push({ t: "echo", s: byProd[0] });
  }
  // Push the high-value rungs FIRST (sight, sentence, decode) so a fixed
  // 10-item session never slices them off in favour of more picks. Picks
  // then fill whatever room remains - they're the cheap, plentiful tier.
  const masteredS = intro.filter(c => rdBox("s:" + c) >= 2).length;
  const words = rdWords();

  if (sight.length) items.push({ t: "sight", w: [...sight].sort(byNeed("sight:"))[0] });

  const wMast = words.filter(wd => rdBox("w:" + wd) >= 2).length;

  if (wMast >= 6 && sents.length) items.push({ t: "read", sent: [...sents].sort(byNeed("sent:"))[0] });

      showEl.innerHTML = lowerArt(it.s, 120);
      const say = () => speak(phonics(L).say, true);
      replay.onclick = () => { Sound.fx.tap(); say(); };
      const go2 = el("button", { cls: "btn btn-go", css: "min-width:120px", html: ic("next", 20, "#fff") + `<span>${t("readNext")}</span>` });
      go2.onclick = () => {
        if (busy) return;
        busy = true;
        Sound.fx.tap(); buzz(12); rdBump("s:" + it.s, true); i++;
        prog.firstChild.style.width = (i / session.length) * 100 + "%";
        i >= session.length ? finish() : showItem(); };
      choices.append(go2);
      frankySay("happy", phonics(L).say, true);
    } else if (it.t === "pick") {
      const L = it.s.toUpperCase();
      promptEl.textContent = t("readWhichLetter");
      showEl.innerHTML = "";
      const say = () => speak(phonics(L).say, true);
      replay.onclick = () => { Sound.fx.tap(); say(); };
      const opts = [it.s, ...distract(RD().sounds, it.s, 2)].sort(() => Math.random() - .5);
      const tiles = {};

            frankySay("warm", phonics(L).say, true);
            resolve(false, "s:" + it.s);

        });
        tiles[o] = b; choices.append(b);
      });
      setTimeout(say, 250);
      frankySay("happy", "");
    }
  }
  function finish() {
    if (finished) return;          // one session-end only
    finished = true;
    rdAdvance();
    S.stars += 1; if (S.stars > S.frankyLevel * 8) S.frankyLevel++;
    save();
    stage.innerHTML = "";
    stage.append(el("div", { cls: "t-display", textContent: t("winTitle")(S.name) }));
    const again = el("button", { cls: "btn btn-go t-head", html: ic("next", 22, "#fff") + `<span>${t("readMore")}</span>` });
    again.onclick = () => { Sound.fx.tap(); go("read"); };
    const home = el("button", { cls: "btn btn-quiet t-head", html: ic("home", 20) + `<span>${t("home")}</span>` });
    home.onclick = () => { Sound.fx.tap(); go("home"); };
    const row = el("div", { css: "display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px" });
    row.append(again, home); stage.append(row);
    Sound.fx.win(); buzz([20, 40, 20]); burst(.8);
    speak(rnd("praiseOk"));
  }
  showItem();
}

// Parent dashboard: visualize per-sound and per-word mastery, suggest a
// concrete next step. Lives inside Settings (already parent-gated).
function readingDashboard() {
  const sounds = RD().sounds, intro = S.readIntro, active = sounds[intro - 1];
  const card = el("div", { cls: "card", css: "padding:18px;display:flex;flex-direction:column;gap:12px" });
  card.append(el("div", { cls: "t-head", textContent: t("rdProgressTitle") }));

  // Summary numbers
  const masteredS = sounds.slice(0, intro).filter(c => rdBox("s:" + c) >= 3).length;
  const words = RD().words.filter(wd => [...wd].every(c => sounds.slice(0, intro).includes(c)));
  const wRead = words.filter(wd => rdBox("w:" + wd) >= 1).length;
  const wMast = words.filter(wd => rdBox("w:" + wd) >= 2).length;
  const sum = el("div", { cls: "t-body", css: "color:var(--ink-soft);font-size:14px",
    textContent: t("rdSummary")(intro, sounds.length, masteredS, wRead, wMast) });
  card.append(sum);

  // Sound grid
  card.append(el("div", { cls: "t-label", textContent: t("rdSoundsLabel") }));
  const grid = el("div", { css: "display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:10px" });
  sounds.forEach((c, i) => {
    const locked = i >= intro;
    const box = rdBox("s:" + c);
    const pct = locked ? 0 : Math.min(5, box) / 5 * 100;
    const isActive = !locked && c === active;
    const produced = !locked && ((S.readProd && S.readProd[c]) || 0) > 0;
    const cell = el("div", { css: `position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;border-radius:10px;background:${locked ? "var(--surface-2)" : "var(--surface)"};border:2px solid ${isActive ? "var(--clay)" : "var(--line)"};${locked ? "opacity:.45" : ""}` });
    // A small plum mic badge marks sounds the child has said aloud (Echo).
    cell.innerHTML =
      (produced ? `<span style="position:absolute;top:3px;right:3px;background:var(--plum);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center">${ic("mic", 11, "#fff")}</span>` : "") +
      `<div style="height:36px;display:flex;align-items:center;justify-content:center">${lowerArt(c, 32)}</div>
       <div style="height:5px;width:100%;background:rgba(52,48,42,.12);border-radius:99px;overflow:hidden">
         <i style="display:block;height:100%;width:${pct}%;background:${box >= 3 ? "var(--sage)" : "var(--ochre)"}"></i></div>`;
    grid.append(cell);
  });
  card.append(grid);

  // Word counters
  card.append(el("div", { cls: "t-body", css: "font-size:14px",
    textContent: `${t("rdWords")}: ${wMast} / ${words.length}  ·  ${t("rdWordsRead")}: ${wRead}` }));

  // Next-step suggestion + CTA
  let suggest;
  if (active && rdBox("s:" + active) < 2) suggest = t("rdSuggestSound")(active);
  else {
    const wob = words.find(wd => rdBox("w:" + wd) < 1);
    if (wob) suggest = t("rdSuggestRead")(wob);
    else suggest = intro < sounds.length ? t("rdSuggestNext") : t("rdSuggestDone");
  }
  card.append(el("div", { cls: "t-body", css: "padding:10px 12px;background:var(--surface-2);border-radius:12px",
    textContent: suggest }));
  const cta = el("button", { cls: "btn btn-go", css: "align-self:flex-start",
    html: ic("play", 18, "#fff") + `<span>${t("rdStartBtn")}</span>` });
  cta.onclick = () => { Sound.fx.tap(); buzz(14); go("read"); };
  card.append(cta);
  return card;
}

/* ----- 8h. "Rekenen met Franky" - number-sense engine -----------------
   Mentava-style mastery applied to early maths: JUMP-Math micro-steps +
   Numberblocks/NCETM block representation + subitizing + Singapore CPA
   (concrete dots -> structured ten-frame -> the symbol). Quantity FIRST:
   recognise a quantity, then count it, then compose it - mastery-gated and
   spaced, exactly like the reading engine. */
// The numeral, drawn from the same ball-and-stick GLYPHs as writing.
function digitArt(n, size) {
  const chars = String(n).split("").filter(c => GLYPH[c]); const gap = 8;
  const wl = chars.reduce((a, c) => a + (GLYPH[c].b[2] - GLYPH[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(0.92, 70 / wl);
  const y0 = Math.min(...chars.map(c => GLYPH[c].b[1])), y1 = Math.max(...chars.map(c => GLYPH[c].b[3]));
  const oy = 50 - ((y0 + y1) / 2) * s; let x = 50 - (wl * s) / 2; const paths = [];
  chars.forEach(c => { const g = GLYPH[c], ox = x - g.b[0] * s;
    paths.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s })); x += (g.b[2] - g.b[0] + gap) * s; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${
    paths.map(d => `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`).join("")}</svg>`;
}
// A ten-frame: the standard structure that builds the "5 and 10" anchors.
// Fills the top row first, then the bottom - so a quantity is SEEN, not
// counted. `lit` optionally shows only the first `lit` dots (for bonds).
function dotsArt(n, size, lit, split) {
  // lit: show only the first `lit` dots filled (rest empty - for bonds).
  // split: from index `split` on, dots use a 2nd colour (conceptual
  // subitizing - the child SEES a quantity as two parts, e.g. 3 + 2).
  const cols = 5, cw = 18, x0 = 5, y0 = 32, show = (lit == null ? n : lit);
  let g = "";
  for (let r = 0; r < 2; r++) for (let c = 0; c < cols; c++) {
    const i = r * cols + c, cx = x0 + c * cw + cw / 2, cy = y0 + r * cw + cw / 2;
    g += `<rect x="${x0 + c * cw}" y="${y0 + r * cw}" width="${cw}" height="${cw}" rx="3" fill="none" stroke="var(--line)" stroke-width="1.4"/>`;
    if (i < n) {
      const filled = i < show;
      const col = filled ? (split != null && i >= split ? "var(--sky)" : "var(--clay)") : "var(--surface-2)";
      g += `<circle cx="${cx}" cy="${cy}" r="6.4" fill="${col}" ${filled ? "" : 'stroke="var(--line)" stroke-width="1.2"'}/>`;
    }
  }
  return `<svg width="${size}" height="${size * 0.74}" viewBox="0 0 100 74">${g}</svg>`;
}
// A bare digit ("2") gives the multilingual TTS voice no language context, so
// it guesses - and reads "2" as English "two" even when the app is Dutch.
// Speaking the number as a WORD in the current language fixes the language and
// is clearer for a pre-reader. (Screens still SHOW the numeral.)
const NUM_WORDS = {
  nl: ["nul","een","twee","drie","vier","vijf","zes","zeven","acht","negen","tien","elf","twaalf","dertien","veertien","vijftien","zestien","zeventien","achttien","negentien","twintig"],
  en: ["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty"],
  es: ["cero","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve","diez","once","doce","trece","catorce","quince","dieciséis","diecisiete","dieciocho","diecinueve","veinte"],
};
const numWord = n => (NUM_WORDS[LC()] || NUM_WORDS.en)[n] || String(n);

const mBox = k => (S.mathBox && S.mathBox[k]) || 0;
let _mAdvanced = new Set();
const mBump = (k, ok) => {
  S.mathBox = S.mathBox || {};
  if (!ok) { S.mathBox[k] = Math.max(1, mBox(k)); return; }
  if (_mAdvanced.has(k)) return;
  S.mathBox[k] = Math.min(5, mBox(k) + 1); _mAdvanced.add(k);
};
const mRange = () => Array.from({ length: Math.min(S.mathIntro || 3, 10) }, (_, i) => i + 1);
const mByNeed = pre => (a, b) => mBox(pre + a) - mBox(pre + b) || Math.random() - .5;
// A numeral is "known" once recognised reliably. Until then, answers are
// given as QUANTITIES (match the amount), so number sense develops without
// the symbol; once known, that number's answers become the numeral (CPA).
const mNumKnown = n => mBox("num:" + n) >= 2;
function buildMathSession() {
  const range = mRange(), max = range[range.length - 1], items = [];
  const pickTwo = () => { const a = 1 + ((Math.random() * max) | 0); let b;
    do { b = 1 + ((Math.random() * max) | 0); } while (b === a); return [a, b]; };
  // Subitize - sometimes 2-colour grouped (conceptual subitizing) once the
  // child can see beyond 3, teaching "I see it as parts" not "I count".
  const bySub = [...range].sort(mByNeed("sub:"));
  for (let i = 0; i < 3; i++) {
    const n = bySub[i % bySub.length];
    const split = (n >= 4 && Math.random() < .5) ? 1 + ((Math.random() * (n - 1)) | 0) : null;
    items.push({ t: "sub", n, split });
  }
  const byCnt = [...range].sort(mByNeed("cnt:"));
  for (let i = 0; i < 2; i++) items.push({ t: "count", n: byCnt[i % byCnt.length] });
  // Numeral track: only AFTER a quantity is solid do we attach its symbol -
  // meet it (numTeach), then map quantity -> numeral (numId). Until the
  // numeral is known, every other activity answers with quantities.
  const numCand = range.filter(n => mBox("sub:" + n) >= 2 && mBox("num:" + n) < 3).sort(mByNeed("num:"));
  if (numCand.length) {
    const n = numCand[0];
    if (mBox("num:" + n) === 0) items.push({ t: "numTeach", n });
    items.push({ t: "numId", n });
  }
  // Compare (more/fewer) - a core Clements-Sarama trajectory level, and one
  // of the strongest predictors of later maths. Always present.
  { const [a, b] = pickTwo(); items.push({ t: "compare", a, b }); }
  const solid = range.filter(n => mBox("sub:" + n) >= 2).length;
  // Change (join / separate) - the REAL arithmetic, introduced early once a
  // few quantities are solid: "there were 2, one more comes, how many now?".
  if ((S.mathIntro || 3) >= 3 && solid >= 2) {
    const add = Math.random() < .6;
    const delta = 1 + ((Math.random() * 2) | 0);              // +/- 1 or 2
    let start, result;
    if (add) { start = 1 + ((Math.random() * (max - delta)) | 0); result = start + delta; }
    else { start = (delta + 1) + ((Math.random() * (max - delta)) | 0); result = start - delta; }
    items.push({ t: "change", start, delta, op: add ? "add" : "take", result });
  }
  // Number bonds (composition) - find the missing part of a known whole.
  const totals = range.filter(n => n >= 3);
  if ((S.mathIntro || 3) >= 4 && solid >= 3 && totals.length) {
    const byBond = [...totals].sort(mByNeed("bond:"));
    for (let i = 0; i < 2; i++) items.push({ t: "bond", n: byBond[i % byBond.length] });
  }
  // interleave: avoid two of the same activity back to back
  const keyOf = it => it.t + (it.n || it.result || it.a), out = [], pool = items.slice(0, 10); let last = null;
  while (pool.length) { let i = pool.findIndex(it => keyOf(it) !== last); if (i < 0) i = 0;
    const [it] = pool.splice(i, 1); out.push(it); last = keyOf(it); }
  return out;
}
function mAdvance() {
  // Introduce the next number once the current top is recognised AND counted.
  const top = mRange()[mRange().length - 1];
  if (top && mBox("sub:" + top) >= 2 && mBox("cnt:" + top) >= 2 && (S.mathIntro || 3) < 10) S.mathIntro++;
}
const mDistract = (n, max) => {
  const pool = []; for (let k = 1; k <= Math.max(max, 5); k++) if (k !== n) pool.push(k);
  const out = []; while (out.length < 2 && pool.length) out.push(pool.splice((Math.random() * pool.length) | 0, 1)[0]);
  return out;
};

function MathScreen() {
  _mAdvanced = new Set();
  const session = buildMathSession();
  let i = 0, busy = false, finished = false, wrongStreak = 0, shownAt = 0;
  const s = el("div", { cls: "screen" });
  const head = el("div", { css: "display:flex;align-items:center;gap:10px;padding:14px 18px 6px" });
  const back = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  back.onclick = () => { Sound.fx.tap(); go("home"); };
  head.append(back, el("div", { css: "flex:1", html: `<div class="t-title" style="color:var(--ochre)">${t("mathTitle")}</div>` }),
    muteBtn(), el("div", { id: "buddy", "data-size": 52, html: Franky("happy", 52) }));
  s.append(head);
  const prog = el("div", { cls: "prog", css: "margin:2px auto 8px;max-width:640px;width:calc(100% - 40px)", html: "<i style='width:0'></i>" });
  s.append(prog);
  const stage = el("div", { cls: "cap", css: "flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:10px 18px;text-align:center" });
  const promptEl = el("div", { cls: "t-title" });
  const showEl = el("div", { css: "min-height:130px;display:flex;align-items:center;justify-content:center" });
  const choices = el("div", { css: "display:flex;gap:14px;flex-wrap:wrap;justify-content:center" });
  const replay = el("button", { cls: "btn btn-quiet", html: ic("sound", 20) + `<span>${t("mathAgain")}</span>` });
  stage.append(promptEl, showEl, choices, replay);
  s.append(stage); APP.append(s);

  const numTile = (n, on) => {
    const b = el("button", { cls: "card", css: "padding:10px 16px;min-width:84px;background:var(--surface)" });
    b.innerHTML = digitArt(n, 64); b.onclick = on; return b;
  };
  function resolve(ok, key) {
    if (busy) return; busy = true; choices.style.pointerEvents = "none";
    if (ok) { Sound.fx.step(); buzz(20); if (key) mBump(key, true); wrongStreak = 0; }
    else { Sound.fx.soft(); buzz(12); if (key) mBump(key, false); wrongStreak++; }
    if (key && shownAt) { S.mathLat = S.mathLat || {}; const dt = Date.now() - shownAt;
      S.mathLat[key] = Math.round((S.mathLat[key] || dt) * 0.6 + dt * 0.4);
      if (ok && dt < 1500 && mBox(key) >= 3) S.mathBox[key] = 5; }
    i++; prog.firstChild.style.width = (i / session.length) * 100 + "%";
    const tired = wrongStreak >= 2 && i >= 5;
    setTimeout(() => (i >= session.length || tired) ? finish() : showItem(), ok ? 700 : 1500);
  }
  // Adaptive answer row: shows NUMERAL tiles once the answer's numeral is
  // known, otherwise QUANTITY tiles (match the amount) - so a child answers
  // with number sense before they can read the symbol (CPA: concrete first).
  function answerRow(correct, key) {
    const max = mRange()[mRange().length - 1];
    const opts = [correct, ...mDistract(correct, max)].sort(() => Math.random() - .5);
    const useNum = mNumKnown(correct), tiles = {};
    opts.forEach(o => {
      const b = el("button", { cls: "card", css: "padding:10px 14px;min-width:78px;background:var(--surface)" });
      b.innerHTML = useNum ? digitArt(o, 60) : dotsArt(o, 108);
      b.onclick = () => {
        if (busy) return;
        if (o === correct) { b.classList.add("rc-ok"); speak(numWord(correct), false); resolve(true, key); }
        else { b.classList.add("rc-no"); if (tiles[correct]) tiles[correct].classList.add("rc-ok"); resolve(false, key); }
      };
      tiles[o] = b; choices.append(b);
    });
  }
  // SUBITIZE: see a quantity, give the amount (recognition).
  function subitizeItem(it) {
    const n = it.n;
    promptEl.textContent = t("subPrompt");
    showEl.innerHTML = dotsArt(n, 240, null, it.split);   // split = conceptual subitizing
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    replay.onclick = () => { Sound.fx.tap(); speak(t("subSay"), false); };
    frankySay("happy", t("subSay"), false);
    answerRow(n, "sub:" + n);
    setTimeout(() => speak(t("subSay"), false), 250);
  }
  // NUMERAL teach: meet the symbol once its quantity is solid - numeral +
  // its ten-frame + Franky names it. Explicit, like the reading teach step.
  function numTeachItem(it) {
    const n = it.n;
    promptEl.textContent = t("numLearnPrompt");
    showEl.innerHTML =
      `<div style="display:flex;align-items:center;gap:20px;justify-content:center">
         ${digitArt(n, 120)}${dotsArt(n, 150)}</div>`;
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    const say = () => speak(t("numLearnSay")(n), false);
    replay.onclick = () => { Sound.fx.tap(); say(); };
    frankySay("happy", t("numLearnSay")(n), false);
    const go2 = el("button", { cls: "btn btn-go", css: "min-width:120px", html: ic("next", 20, "#fff") + `<span>${t("readNext")}</span>` });
    go2.onclick = () => {
      if (busy) return; busy = true; Sound.fx.tap(); buzz(12); mBump("num:" + n, true);
      i++; prog.firstChild.style.width = (i / session.length) * 100 + "%";
      i >= session.length ? finish() : showItem();
    };
    choices.append(go2);
  }
  // NUMERAL recognise: see a quantity, pick its NUMERAL (always numerals
  // here - this IS the symbol-learning task, quantity -> symbol mapping).
  function numIdItem(it) {
    const n = it.n;
    promptEl.textContent = t("numIdPrompt");
    showEl.innerHTML = dotsArt(n, 220);
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    replay.onclick = () => { Sound.fx.tap(); speak(t("numIdSay"), false); };
    frankySay("happy", t("numIdSay"), false);
    const opts = [n, ...mDistract(n, mRange()[mRange().length - 1])].sort(() => Math.random() - .5);
    const tiles = {};
    opts.forEach(o => {
      const b = numTile(o, () => {
        if (busy) return;
        if (o === n) { b.classList.add("rc-ok"); speak(numWord(n), false); resolve(true, "num:" + n); }
        else { b.classList.add("rc-no"); if (tiles[n]) tiles[n].classList.add("rc-ok"); resolve(false, "num:" + n); }
      });
      tiles[o] = b; choices.append(b);
    });
  }
  // COUNT: tap each object in turn, Franky counts aloud, then name the total.
  function countItem(it) {
    const n = it.n;
    promptEl.textContent = t("countPrompt");
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    showEl.innerHTML = "";
    const row = el("div", { css: "display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:380px" });
    let count = 0; const done = new Set();
    for (let k = 0; k < n; k++) {
      const d = el("button", { css: "width:46px;height:46px;border-radius:50%;background:var(--clay);opacity:.5" });
      d.onclick = () => {
        if (done.has(k)) return; done.add(k); count++;
        d.style.opacity = "1"; Sound.fx.tap(); buzz(10); speak(numWord(count), false);
        if (done.size === n) setTimeout(askTotal, 650);
      };
      row.append(d);
    }
    showEl.append(row);
    replay.onclick = () => { Sound.fx.tap(); speak(t("countSay"), false); };
    frankySay("happy", t("countSay"), false);
    function askTotal() {
      promptEl.textContent = t("countWhich");
      choices.innerHTML = ""; choices.style.pointerEvents = "auto";
      answerRow(n, "cnt:" + n);
    }
  }
  // BOND: see the whole and one part, find the missing part. (composition)
  function bondItem(it) {
    const n = it.n, part = 1 + ((Math.random() * (n - 1)) | 0), miss = n - part;
    promptEl.textContent = t("bondPrompt");
    showEl.innerHTML =
      `<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center">
         ${dotsArt(n, 150, part)}
         <span style="font-weight:900;font-size:26px;color:var(--ink-soft)">+ ?</span>
         <span style="display:flex;flex-direction:column;align-items:center">
           <span class="t-label">samen</span>${digitArt(n, 56)}</span>
       </div>`;
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    replay.onclick = () => { Sound.fx.tap(); speak(t("bondSay")(n), false); };
    frankySay("happy", t("bondSay")(n), false);
    answerRow(miss, "bond:" + n);
  }
  // COMPARE: two quantities, tap the one with MORE. (a core trajectory
  // level and a strong predictor of later maths)
  function compareItem(it) {
    const { a, b } = it, more = Math.max(a, b), key = "cmp:" + more;
    promptEl.textContent = t("comparePrompt");
    showEl.innerHTML = "";
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    replay.onclick = () => { Sound.fx.tap(); speak(t("compareSay"), false); };
    frankySay("happy", t("compareSay"), false);
    const side = (val) => {
      const card = el("button", { cls: "card", css: "padding:14px;background:var(--surface)" });
      card.innerHTML = dotsArt(val, 200);
      card.onclick = () => {
        if (busy) return;
        if (val === more && a !== b) { card.classList.add("rc-ok"); speak(numWord(more), false); resolve(true, key); }
        else { card.classList.add("rc-no"); resolve(false, key); }
      };
      return card;
    };
    const wrap = el("div", { css: "display:flex;gap:18px;justify-content:center;flex-wrap:wrap" });
    wrap.append(side(a), side(b)); choices.append(wrap);
  }
  // CHANGE (join / separate): the real arithmetic. Show the start set, then
  // dots come in or go away, then name the new total.
  function changeItem(it) {
    const { start, delta, op, result } = it;
    promptEl.textContent = t("changePrompt");
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    const intro = op === "add" ? t("changeAddSay")(start, delta) : t("changeTakeSay")(start, delta);
    // First show the start quantity, then animate the change, then ask.
    showEl.innerHTML = dotsArt(start, 220);
    frankySay("happy", intro, false);
    replay.onclick = () => { Sound.fx.tap(); speak(intro, false); };
    setTimeout(() => {
      showEl.innerHTML = dotsArt(op === "add" ? result : start, 220, op === "add" ? result : result);
      buzz(14); Sound.fx.tap();
      setTimeout(askTotal, 900);
    }, 1500);
    function askTotal() {
      promptEl.textContent = t("changeWhich");
      showEl.innerHTML = dotsArt(result, 220);
      choices.innerHTML = ""; choices.style.pointerEvents = "auto";
      answerRow(result, "chg:" + result);
    }
  }
  function showItem() {
    const it = session[i]; busy = false; shownAt = Date.now();
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    if (it.t === "sub") subitizeItem(it);
    else if (it.t === "numTeach") numTeachItem(it);
    else if (it.t === "numId") numIdItem(it);
    else if (it.t === "count") countItem(it);
    else if (it.t === "compare") compareItem(it);
    else if (it.t === "change") changeItem(it);
    else bondItem(it);
  }
  function finish() {
    if (finished) return; finished = true;
    mAdvance(); S.stars += 1; if (S.stars > S.frankyLevel * 8) S.frankyLevel++; save();
    stage.innerHTML = "";
    stage.append(el("div", { cls: "t-display", textContent: t("winTitle")(S.name) }));
    const again = el("button", { cls: "btn btn-go t-head", html: ic("next", 22, "#fff") + `<span>${t("mathAgain")}</span>` });
    again.onclick = () => { Sound.fx.tap(); go("math"); };
    const home = el("button", { cls: "btn btn-quiet t-head", html: ic("home", 20) + `<span>${t("home")}</span>` });
    home.onclick = () => { Sound.fx.tap(); go("home"); };
    const row = el("div", { css: "display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px" });
    row.append(again, home); stage.append(row);
    Sound.fx.win(); buzz([20, 40, 20]); burst(.7); speak(rnd("praiseOk"));
  }
  showItem();
}

// Prevent pinch / double-tap / iOS gesture zoom anywhere in the app -
// a toddler hitting an accidental gesture used to leave the screen
// stuck zoomed in.
["gesturestart", "gesturechange", "gestureend"].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault()));
document.addEventListener("touchmove", e => {
  if (e.touches && e.touches.length > 1) e.preventDefault();
}, { passive: false });
document.addEventListener("dblclick", e => e.preventDefault());

/* ----- 10. Splash / onboarding ----------------------------------------- */
function Splash() {
  APP.innerHTML = ""; // Splash is called directly (lang switch, add child,
                      // reset) - clear like go() so screens never stack.
  applyFlags();
  const s = el("div", { cls: "screen", css: "align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px" });
  s.append(
    el("div", { cls: "float", html: Franky("happy", 150) }),
    el("div", { cls: "t-display", textContent: "Franky's World" }),
    el("div", { cls: "t-body muted", textContent: t("madeBy") }),
  );
  // Language picker (Dutch / English / Spanish) - re-renders the splash.
  const langRow = el("div", { css: "display:flex;gap:8px;background:var(--surface-2);padding:6px;border-radius:14px;border:1px solid var(--line)" });
  LANGS.forEach(([code, label]) => {
    const on = S.lang === code;
    const b = el("button", { textContent: label,
      css: `flex:1;padding:11px 8px;border-radius:9px;font-weight:800;border:none;background:${on ? "var(--ink)" : "transparent"};color:${on ? "var(--cream)" : "var(--ink-soft)"}` });
    b.onclick = () => { S.lang = code; save(); Sound.fx.tap(); buzz(12); Splash(); };
    langRow.append(b);
  });
  s.append(langRow);
  const card = el("div", { cls: "card", css: "padding:22px;width:min(540px,92vw);display:flex;flex-direction:column;gap:14px;margin-top:2px;text-align:left" });

  const input = el("input", { id: "nm", placeholder: t("typeName"), maxLength: 14,
    css: "font:inherit;font-size:22px;font-weight:800;padding:15px 18px;border-radius:16px;border:2px solid var(--line);background:var(--surface-2);color:var(--ink);outline:none" });

  let age = 2;
  const seg = el("div", { css: "display:flex;gap:8px;background:var(--surface-2);padding:6px;border-radius:16px;border:1px solid var(--line)" });
  const setAge = a => { age = a;
    [...seg.children].forEach((c, i) => { const on = i + 1 === a;
      c.style.background = on ? "var(--ink)" : "transparent";
      c.style.color = on ? "var(--cream)" : "var(--ink-soft)"; }); };
  [1, 2, 3, 4, 5].forEach(a => {
    const b = el("button", { cls: "btn", textContent: `${a}`,
      css: "flex:1;box-shadow:none;border:none;background:transparent;color:var(--ink-soft);padding:14px 6px" });
    b.onclick = () => { Sound.fx.tap(); buzz(12); setAge(a); };
    seg.append(b);
  });
  setAge(2);

  // Quick-pick buttons for the kids who already play on THIS device.
  // A brand-new device (e.g. shared via the URL with another family) sees
  // no buttons at all - so a cousin's family never finds Lucy/Josh names
  // sitting there as defaults. For the known kids of this family the age
  // is still recomputed from their birthday so it stays correct as they
  // grow.
  const profRow = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap" });
  const BIRTHDAYS = { lucy: [2022, 11, 30], josh: [2024, 12, 16] };
  const prof = (nm, age) => {
    const b = el("button", { cls: "btn btn-primary t-head", css: "flex:1;min-width:120px", textContent: nm });
    b.onclick = () => { Sound.fx.tap(); buzz(12); input.value = nm; setAge(age); };
    return b;
  };
  const onDevice = profileList();
  onDevice.forEach(p => {
    const bd = BIRTHDAYS[p.name.toLowerCase()];
    const a = bd ? ageOf(bd[0], bd[1], bd[2]) : (p.age || 2);
    profRow.append(prof(p.name, a));
  });

  const start = el("button", { cls: "btn btn-go t-head", css: "margin-top:2px",
    html: `${t("start")} ${ic("next", 22, "#fff")}` });
  start.onclick = () => {
    const nm = (input.value || "friend").trim().slice(0, 14);
    createProfile(nm, age, S.lang);   // new profile (or switch if name exists)
    Sound.fx.win(); buzz([18, 30]); maybeInstall(); go("home");
  };
  // Only show the quick-pick row + its label when this device actually
  // has profiles. A brand-new install (cousin's phone) goes straight to
  // the name input - no Lucy/Josh ghosts on someone else's splash.
  if (onDevice.length) {
    card.append(
      el("div", { cls: "t-label", textContent: t("whoPlaying") }),
      profRow,
    );
  }
  // "Of typ een naam" only makes sense as an alternative to the quick-pick
  // buttons. On a fresh device there are no quick-picks, so the label
  // becomes the primary "Typ een naam" question instead.
  card.append(
    el("div", { cls: "t-label", textContent: onDevice.length ? t("orType") : t("typeName") }),
    input,
    el("div", { cls: "t-label", textContent: t("howOld") }),
    seg,
    start,
  );

  // Already playing on another device? Tap once, type the 6-digit code,
  // and this device pulls every profile + their progress. No need to
  // create a profile here first that we'd just overwrite.
  const haveCode = el("button", {
    cls: "btn btn-quiet", css: "margin-top:8px;align-self:center",
    html: ic("share", 16) + `<span>${t("syncSplashCta")}</span>` });
  haveCode.onclick = () => splashPair();
  card.append(haveCode);

  s.append(card);
  APP.append(s);
  if (!_splashed) { setTimeout(() => speak(t("splashIntro")), 600); _splashed = true; }
}

// Lean code-entry dialog for the Splash, so a brand-new device can pair
// before ever creating a placeholder profile. Mirrors Settings.showPairDialog
// but lives at module scope.
function splashPair() {
  const ov = el("div", { css: "position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.6);backdrop-filter:blur(4px);padding:24px" });
  const c = el("div", { cls: "card", css: "background:var(--surface);padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:14px;text-align:center" });
  c.append(
    el("div", { cls: "t-title", textContent: t("syncPairTitle") }),
    el("div", { cls: "t-body muted", textContent: t("syncPairHint") }));
  const inp = el("input", { type: "text", inputmode: "numeric",
    autocomplete: "one-time-code", maxLength: 7, placeholder: "123-456",
    css: "font:900 28px/1 -apple-system,system-ui;letter-spacing:4px;text-align:center;padding:14px;border-radius:12px;border:2px solid var(--line);background:var(--surface-2);color:var(--ink);outline:none" });
  c.append(inp);
  const row = el("div", { css: "display:flex;gap:10px" });
  const cancel = el("button", { cls: "btn btn-quiet", css: "flex:1",
    html: `<span>${t("cancel")}</span>` });
  cancel.onclick = () => ov.remove();
  const ok = el("button", { cls: "btn btn-go", css: "flex:1",
    html: ic("check", 18, "#fff") + `<span>${t("syncPairGo")}</span>` });
  ok.onclick = async () => {
    const code = inp.value.replace(/\D/g, "");
    if (code.length !== 6) { inp.style.borderColor = "var(--clay)"; return; }
    ok.disabled = true; ok.textContent = "...";
    try {
      await Sync.pair(code);
      ov.remove(); Sound.fx.win(); buzz([18, 30]);
      applyFlags(); go("home");
    } catch {
      ok.disabled = false;
      ok.innerHTML = ic("check", 18, "#fff") + `<span>${t("syncPairGo")}</span>`;
      inp.style.borderColor = "var(--clay)";
      alert(t("syncPairError"));
    }
  };
  row.append(cancel, ok);
  c.append(row);
  ov.append(c); APP.append(ov);
  setTimeout(() => inp.focus(), 50);
}

// Franky's pick for the next writing lesson: the least-practised letter
// (fewest stars), in A-Z order. Gives the child one obvious tap instead
// of choosing from the whole alphabet.
function nextWriteLesson() {
  let best = "abc_" + ABC[0], least = Infinity;
  for (const L of ABC) {
    const id = "abc_" + L, st = S.completed[id] || 0;
    if (st < least) { least = st; best = id; }
  }
  return best;
}

/* ----- 11. Home -------------------------------------------------------- */
// Home is a 3-part chooser (Draw / Read / Write). With a mode it shows
// just that part's lessons, with a back arrow to the chooser.
function Home(mode) {
  touchStreak();
  const s = el("div", { cls: "screen" });

  if (!mode) {
    const top = el("div", { cls: "cap", css: "display:flex;align-items:center;gap:12px;padding:14px 20px 6px" });
    const who = el("button", { css: "flex:1;display:flex;align-items:center;gap:12px;text-align:left;background:none",

        <span class="t-body muted">${t("whatDraw")}</span></span>` });
    who.onclick = () => { Sound.fx.tap(); buzz(12); ProfilePicker(); };
    // Counters (streak/stars/stickers) moved to the parent dashboard - they
    // mean nothing to a toddler and only crowded the header.
    top.append(who, muteBtn());
    s.append(top);

    const prevSeen = S.worldSeenStars || 0;
    const inf = worldInfo(S.stars);
    const hint = inf.allDone ? t("worldDone")
      : inf.next ? t("worldNext")(inf.next - S.stars) : t("worldTitle");
    // Just arrived in a new world (the milestones below this one's base
    // were already seen)? Announce the journey.
    const arrived = prevSeen < inf.base && S.stars >= inf.base && inf.idx > 0;
    // Cap the world card narrower than the pillars so its natural height
    // (width x 150/320) stays modest on desktop - the whole scene shows,
    // uncropped, and the 3 pillars stay above the fold. On phones it just
    // uses the available width.
    const world = el("div", { cls: "card", css: "margin:6px auto 0;max-width:440px;width:calc(100% - 40px);padding:0;overflow:hidden" });
    world.innerHTML = worldScene(S.stars, prevSeen) +

         <div class="t-label">${arrived ? t("worldNew")(worldName()) : worldName()}</div>
         <div class="t-body muted" style="font-size:13px;margin-top:1px">${hint}</div>
       </div>`;
    s.append(world);
    if (S.worldSeenStars !== S.stars) { S.worldSeenStars = S.stars; save(); }

    const wrap = el("div", { cls: "scroll cap", css: "flex:1;padding:12px 20px 130px;container-type:inline-size" });
    const pillar = (key, col, fn) => {
      const b = el("button", { cls: "card pop",
        css: `padding:18px 24px;display:flex;align-items:center;gap:20px;background:${col};color:#fff;width:100%;margin-bottom:12px;min-height:92px` });
      b.innerHTML =
        `<div style="background:rgba(255,255,255,.20);border-radius:22px;padding:13px;display:inline-flex">${pillarScene(key)}</div>

         <div class="t-body" style="opacity:.92;margin-top:2px">${t("pillSub_" + key)}</div></div>`;
      b.onclick = () => { Sound.fx.tap(); buzz(14); fn(); };
      return b;
    };
    wrap.append(
      pillar("read", "var(--sky)", () => go("read")),
      pillar("math", "var(--ochre)", () => go("math")),
      pillar("write", "var(--sage)", () => go("home", "write")),
      pillar("draw", "var(--clay)", () => go("home", "draw")),
    );
    s.append(wrap, nav("home"));
    APP.append(s);
    frankySay("warm", _greeted ? "" : t("buddyHome")(S.name));
    _greeted = true;
    if (S.settings.foundations && Math.random() < .25)
      setTimeout(() => speak(rnd("found")), 4000);
    return;
  }

  // A part page (Draw or Write): slim header + that part's lessons.
  const head = el("div", { cls: "cap-wide", css: "display:flex;align-items:center;gap:12px;padding:16px 20px 6px" });
  const back = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  back.onclick = () => { Sound.fx.tap(); go("home"); };
  // Section colour-coding: the page title carries the world's colour.
  const secColor = mode === "write" ? "var(--sage)" : "var(--clay)";
  head.append(back, el("div", { cls: "t-title", css: "flex:1;color:" + secColor, textContent: t("pill_" + mode) }), muteBtn());
  s.append(head);
  const wrap = el("div", { cls: "scroll cap-wide", css: "flex:1;padding:8px 20px 140px;container-type:inline-size" });
  // Writing: a big "Franky's pick" hero so the child has one obvious tap
  // instead of hunting through the whole alphabet. The category grids
  // stay below for browsing.
  if (mode === "write") {
    const nid = nextWriteLesson();
    const hero = el("button", { cls: "card pop",
      css: "padding:22px 24px;display:flex;align-items:center;gap:18px;background:var(--sage);color:#fff;width:100%;margin:4px 0 16px;min-height:118px" });
    hero.innerHTML =
      `<div style="background:rgba(255,255,255,.93);border-radius:20px;padding:8px;display:inline-flex">${ART(nid, 70)}</div>
       <div style="text-align:left;flex:1"><div class="t-title">${t("writeHero")}</div>
       <div class="t-body" style="opacity:.92;margin-top:2px">${t("writeHeroSub")}</div></div>
       <div style="background:rgba(255,255,255,.2);border-radius:50%;padding:12px;display:inline-flex">${ic("next", 26, "#fff")}</div>`;
    hero.onclick = () => { Sound.fx.tap(); buzz(14); go("draw", nid); };
    wrap.append(hero);
  }
  if (mode === "draw") {
    const fd = el("button", { cls: "card pop",
      css: "padding:18px;display:flex;align-items:center;gap:14px;background:var(--surface);width:100%;margin-bottom:4px" });
    fd.innerHTML = `<div style="background:var(--surface-2);border-radius:16px;padding:12px">${ic("brush", 26, "var(--clay)")}</div><div class="t-head">${t("freeTitle")}</div>`;
    fd.onclick = () => { Sound.fx.tap(); buzz(14); go("free"); };
    const g = el("div", { cls: "grid" }); g.append(fd); wrap.append(g);
  }
  CATEGORIES.filter(c => CAT_GROUP[c.id] === mode).forEach(cat => {
    const items = DRAWINGS.filter(d => d.category === cat.id);
    if (!items.length) return;
    wrap.append(el("div", { cls: "t-label", css: "margin:18px 4px 10px", textContent: catName(cat.id) }));
    const grid = el("div", { cls: "grid" });
    const tint = mode === "write" ? "var(--sage-soft)" : "var(--clay-soft)";
    items.forEach(d => {
      const stars = S.completed[d.id];
      const c = el("button", { cls: "card pop",
        css: `padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;background:${tint}` });
      c.innerHTML =
        `<div style="background:var(--surface);border-radius:20px;padding:14px;box-shadow:var(--sh-sm)">${ART(d.id, 76)}</div>
         <div class="t-head">${drawName(d)}</div>` +
        (stars ? `<div style="position:absolute;top:12px;right:12px;display:flex;gap:2px">${
          Array.from({ length: stars }, () => ic("star", 16, "var(--ochre)")).join("")}</div>` : "");
      c.onclick = () => { Sound.fx.tap(); buzz(14); go("draw", d.id); };
      grid.append(c);
    });
    wrap.append(grid);
  });
  s.append(wrap, nav("home"));
  APP.append(s);
}

// Landscape 2-column layout: applied AFTER the portrait DOM is built so
// portrait is byte-identical. Re-parents the controls into a right scroll
// column and lets the canvas take the left full-height. Inline styles
// only, so nothing fights .sw, the cascade, or existing inline styles.
// Landscape 2-col kicks in when the APP BOX (not the window) is clearly
// wide and landscape - the 1.15 margin keeps a near-square box (e.g. the
// desktop device panel) in the calmer single-column portrait layout.
const isLand = () => APP && APP.clientWidth >= 740 && APP.clientWidth > APP.clientHeight * 1.15;

// A bright crayon-box for the child to draw with - vivid and saturated

const COLORS = ["#E5392B", "#F2851C", "#F4BE2C", "#54A63F", "#2C90C8", "#9054B5"];

  3: { brush: 22, tol: 80,  pass: .30, oneStep: false },

    // strokes thicker one way than the other, distorting circles, and
    // looking different on every device. A pinned square fixes all of it.
    const px = size + "px";
    for (const e of [paper, cv, ghost, demo]) {
      e.style.width = px; e.style.height = px;
      e.style.left = "50%"; e.style.top = "50%";
