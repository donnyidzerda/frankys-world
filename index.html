<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#33302B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Scribble Heroes" />
<title>Scribble Heroes - Buddy's Studio</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%23EFE7D8'/%3E%3Ccircle cx='256' cy='258' r='150' fill='%23E0884A'/%3E%3Cellipse cx='256' cy='284' rx='104' ry='86' fill='%23FBF3E7'/%3E%3C/svg%3E" />

<!-- Tailwind v4 browser build + canvas-confetti. Both cached offline by the service worker. -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>

<style>
  /* =======================================================================
     DESIGN SYSTEM
     A warm, gallery-paper aesthetic - not neon, not gradient-y. Earthy,
     considered accents (clay / sage / ochre / sky / rose / plum), soft
     layered shadows, a rounded system typeface, and restrained motion.
     Built for calm focus on iPads & phones; high-contrast + calm modes.
     ======================================================================= */
  :root{
    --bg:#EFE7D8; --bg-2:#E7DCC8; --surface:#FFFFFF; --surface-2:#FBF6EC;
    --ink:#34302A; --ink-soft:#7A7164; --line:#E2D8C4;
    --clay:#C9633F; --sage:#6E8C5E; --ochre:#D89A36; --sky:#5E8AA0;
    --rose:#CF8585; --plum:#7C6C90; --cream:#FBF3E7;
    --r:26px; --r-sm:18px;
    --sh-sm:0 1px 2px rgba(52,48,42,.05), 0 3px 8px rgba(52,48,42,.07);
    --sh:0 2px 6px rgba(52,48,42,.06), 0 16px 34px rgba(52,48,42,.10);
    --sh-lg:0 4px 10px rgba(52,48,42,.07), 0 28px 56px rgba(52,48,42,.14);
    --ring:rgba(201,99,63,.35);
  }
  *{ -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; box-sizing:border-box; }
  html,body{ margin:0; height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; touch-action:manipulation;
    color:var(--ink); background:var(--bg);
    font-family:'Nunito','Quicksand',ui-rounded,-apple-system,'SF Pro Rounded',
      'Segoe UI',system-ui,sans-serif;
    font-feature-settings:"ss01" 1; -webkit-font-smoothing:antialiased; }
  body{ background-image:
      radial-gradient(rgba(52,48,42,.025) 1px, transparent 1px);
    background-size:26px 26px; }
  #app{ position:fixed; inset:0; display:flex; flex-direction:column; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  svg{ display:block; }

  /* Fluid, hierarchical type - heavy but tight, never childish-cheap. */
  .t-display{ font-size:clamp(30px,6.4vw,52px); font-weight:800; letter-spacing:-.02em; line-height:1.04; }
  .t-title{ font-size:clamp(20px,4vw,30px); font-weight:800; letter-spacing:-.015em; line-height:1.12; }
  .t-head{ font-size:clamp(17px,3vw,22px); font-weight:800; letter-spacing:-.01em; }
  .t-body{ font-size:clamp(15px,2.4vw,18px); font-weight:600; line-height:1.55; }
  .t-label{ font-size:clamp(12px,2vw,14px); font-weight:700; letter-spacing:.04em;
    text-transform:uppercase; color:var(--ink-soft); }
  .muted{ color:var(--ink-soft); }

  /* Components */
  .card{ background:var(--surface); border-radius:var(--r); box-shadow:var(--sh);
    border:1px solid rgba(226,216,196,.7); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:10px;
    border-radius:999px; font-weight:800; padding:16px 26px; font-size:clamp(15px,2.6vw,18px);
    background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8);
    transition:transform .14s cubic-bezier(.2,.7,.3,1), box-shadow .14s, background .14s; }
  .btn:active{ transform:translateY(2px) scale(.99); box-shadow:var(--sh-sm); }
  .btn:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring), var(--sh-sm); }
  .btn-primary{ background:var(--clay); color:#fff; border-color:transparent; }
  .btn-go{ background:var(--sage); color:#fff; border-color:transparent; }
  .btn-quiet{ background:var(--surface-2); }
  .btn-icon{ padding:14px; border-radius:18px; }

  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    animation:rise .32s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  .pop{ animation:pop .26s cubic-bezier(.2,.8,.3,1.05); }
  @keyframes pop{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  .float{ animation:float 6s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .nudge{ animation:nudge .6s ease; }
  @keyframes nudge{ 0%,100%{transform:rotate(0)} 30%{transform:rotate(-5deg)} 70%{transform:rotate(5deg)} }
  body.calm .float,body.calm .nudge{ animation:none !important; }

  /* Speech bubble (Buddy) - soft, paper-like, no harsh outline */
  .bubble{ position:relative; background:var(--surface); color:var(--ink);
    border-radius:20px; padding:14px 18px; font-weight:700; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .bubble::after{ content:''; position:absolute; left:30px; bottom:-11px;
    width:18px; height:18px; background:var(--surface); transform:rotate(45deg);
    border-right:1px solid rgba(226,216,196,.8); border-bottom:1px solid rgba(226,216,196,.8); }

  /* Drawing stage: a framed sheet of paper */
  .stage{ position:relative; touch-action:none; }
  #paper{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r);
    background:var(--cream);
    background-image:radial-gradient(rgba(52,48,42,.03) 1px, transparent 1px);
    background-size:20px 20px;
    box-shadow:inset 0 0 0 1px rgba(52,48,42,.05), var(--sh); }
  canvas#pad{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r); }
  #ghost,#demo{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #ghost path{ fill:none; stroke:var(--ink); stroke-opacity:.16; stroke-width:26;
    stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:1 42;
    transition:stroke .3s, stroke-opacity .3s, stroke-width .3s; }
  #ghost.help path{ stroke:var(--clay); stroke-opacity:.55; stroke-width:34; }
  #ghost.pen path{ stroke-width:15; stroke-dasharray:1 26; stroke-opacity:.22; }
  #ghost.pen.help path{ stroke-width:20; }

  /* Step progress */
  .prog{ height:8px; border-radius:999px; background:rgba(52,48,42,.10); overflow:hidden; }
  .prog > i{ display:block; height:100%; border-radius:999px; background:var(--sage);
    transition:width .5s cubic-bezier(.2,.7,.3,1); }

  /* Colour wells + brush chips */
  .well{ width:clamp(44px,10vw,60px); height:clamp(44px,10vw,60px); border-radius:50%;
    box-shadow:var(--sh-sm), inset 0 0 0 2px rgba(255,255,255,.5);
    transition:transform .14s cubic-bezier(.2,.7,.3,1); position:relative; }
  .well.sel{ transform:scale(1.16); }
  .well.sel::after{ content:''; position:absolute; inset:-7px; border-radius:50%;
    border:3px solid var(--ink); opacity:.55; }
  .chip{ display:flex; align-items:center; gap:8px; padding:9px 14px; border-radius:14px;
    background:var(--surface-2); font-weight:800; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .chip.sel{ background:var(--ink); color:var(--cream); }
  .chip.sel svg{ stroke:var(--cream); }

  /* Switch */
  .sw{ width:58px; height:34px; border-radius:999px; background:rgba(52,48,42,.18);
    position:relative; transition:background .2s; flex:none; }
  .sw.on{ background:var(--sage); }
  .sw i{ position:absolute; top:4px; left:4px; width:26px; height:26px; border-radius:50%;
    background:#fff; box-shadow:var(--sh-sm); transition:transform .2s cubic-bezier(.2,.7,.3,1); }
  .sw.on i{ transform:translateX(24px); }

  .grid{ display:grid; gap:14px; grid-template-columns:repeat(2,1fr); }
  @container (min-width:560px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @media (min-width:760px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  .scroll{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .hidden{ display:none !important; }
  .caption{ background:rgba(52,48,42,.86); color:var(--cream);
    border-radius:14px; padding:9px 16px; font-weight:700; backdrop-filter:blur(6px); }
  .row{ display:flex; align-items:center; }
  .stack{ display:flex; flex-direction:column; }

  /* Accessibility modes */
  body.hc{ --bg:#000; --surface:#fff; --surface-2:#fff; --ink:#000; --ink-soft:#222;
    --line:#000; --cream:#fff; }
  body.hc{ background:#000; }
  body.hc #ghost path{ stroke:#000; stroke-opacity:.7; }
  body.hc .card,body.hc .btn{ border:2px solid #000; }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* =========================================================================
   SCRIBBLE HEROES - BUDDY'S STUDIO
   A process-over-product drawing experience for 1-3 year olds.

   Pedagogy embedded in code (2025-26 early-childhood research):
   • Process over product - we never block, grade, or correct. A quality
     read only scales how warm the celebration is; every child advances.
   • Descriptive praise - we narrate the marks the child actually made
     ("you drew a long curving line"), not empty hype. Calm, specific, warm.
   • Age-adaptive - brush size, forgiveness, pacing, language shift 1→3.
   • Growth mindset & neurodiversity - high-contrast, calm mode, slow clear
     voice, always-on captions, gentle motion, zero frustration.
   • Child-directed - open exploration inside every step; Buddy is kind.
   ========================================================================= */

/* ----- 0. Tiny DOM helpers --------------------------------------------- */
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const k in props) {
    if (k === "html") n.innerHTML = props[k];
    else if (k === "css") n.style.cssText = props[k];
    else if (k === "cls") n.className = props[k];
    else if (k in n) n[k] = props[k];
    else n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) c != null && n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand = (a) => a[(Math.random() * a.length) | 0];
// Whole-year age from a birthdate, clamped to the app's 1-5 range.
const ageOf = (y, m, d) => {
  const n = new Date();
  let a = n.getFullYear() - y;
  if (n.getMonth() + 1 < m || (n.getMonth() + 1 === m && n.getDate() < d)) a--;
  return clamp(a, 1, 5);
};

/* ----- 1. Persistent state --------------------------------------------- */
const SAVE_KEY = "scribble-heroes-v2";
const defaultState = () => ({
  name: "", age: 2, onboarded: false, lang: "nl",
  stars: 0, stickers: [], completed: {}, streak: 0, lastPlay: "", buddyLevel: 1,
  settings: { muted: false, voice: true, slowVoice: false, music: true,
    sound: true, haptics: true, contrast: false, calm: false },
});
let S = load();
function load() {
  try {
    const r = JSON.parse(localStorage.getItem(SAVE_KEY));
    return r ? Object.assign(defaultState(), r,
      { settings: Object.assign(defaultState().settings, r.settings || {}) }) : defaultState();
  } catch { return defaultState(); }
}
const save = () => localStorage.setItem(SAVE_KEY, JSON.stringify(S));
function touchStreak() {
  const today = new Date().toDateString();
  if (S.lastPlay === today) return;
  const yest = new Date(Date.now() - 864e5).toDateString();
  S.streak = S.lastPlay === yest ? S.streak + 1 : 1;
  S.lastPlay = today; save();
}

/* IndexedDB gallery (PNG blobs) */
let _db;
const db = () => _db || (_db = new Promise((res, rej) => {
  const r = indexedDB.open("scribble-gallery", 1);
  r.onupgradeneeded = () => r.result.createObjectStore("art", { keyPath: "id" });
  r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
}));
async function galleryAdd(rec) { const d = await db();
  return new Promise(r => { d.transaction("art", "readwrite").objectStore("art").put(rec).onsuccess = r; }); }
async function galleryAll() { const d = await db();
  return new Promise(res => { const o = [];
    d.transaction("art").objectStore("art").openCursor().onsuccess = e => {
      const c = e.target.result; c ? (o.push(c.value), c.continue()) : res(o.sort((a, b) => b.id - a.id)); }; }); }
async function galleryDel(id) { const d = await db();
  return new Promise(r => { d.transaction("art", "readwrite").objectStore("art").delete(id).onsuccess = r; }); }

/* ----- 2. Icons - hand-built line set (no emoji anywhere) --------------- */
// 24×24, 2.4 stroke, round caps. `ic(name)` returns an inline <svg> string.
const ICON_PATHS = {
  back:    'M15 5l-7 7 7 7',
  home:    'M4 11l8-7 8 7M6 10v9h12v-9',
  gallery: 'M4 6h16v12H4zM4 15l4-4 4 4 3-3 5 5',
  sticker: 'M12 4l2.3 4.7 5.2.8-3.8 3.6.9 5.1L12 15.8 7.4 18.2l.9-5.1L4.5 9.5l5.2-.8z',
  brush:   'M16 4l4 4-8 8H8v-4zM7 16c-2 1-3 4-4 5 2 0 4-1 5-3',
  write:   'M5 19l2.6-.6L18 6.6 15.4 4 4 15.4zM14 7.4 16.6 10',
  gear:    'M12 9a3 3 0 100 6 3 3 0 000-6zM4 12h2M18 12h2M12 4v2M12 18v2M6 6l1.5 1.5M16.5 16.5L18 18M18 6l-1.5 1.5M7.5 16.5L6 18',
  undo:    'M9 7L4 12l5 5M4 12h10a6 6 0 010 12',
  eraser:  'M7 17l-3-3 9-9 7 7-5 5zM7 17h12',
  help:    'M9 9a3 3 0 116 0c0 2-3 2.5-3 5M12 18.5h.01',
  share:   'M12 15V4M8 8l4-4 4 4M5 13v6h14v-6',
  save:    'M12 4v11M8 11l4 4 4-4M5 19h14',
  next:    'M9 5l7 7-7 7',
  star:    'M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L12 17l-5.2 2.7 1-5.9L3.5 9.7l5.9-.9z',
  check:   'M5 13l4 4 10-11',
  flame:   'M12 3c1 3-2 4-2 7a2 2 0 004 0c0-1 0-2-.5-3 2 1 3.5 3 3.5 6a5 5 0 11-10 0c0-4 3.5-5 5-10z',
  play:    'M8 5l11 7-11 7z',
  x:       'M6 6l12 12M18 6L6 18',
  sound:   'M5 9v6h4l5 4V5L9 9zM17 9.5a4 4 0 010 5',
  mute:    'M5 9v6h4l5 4V5L9 9zM16 10l5 4M21 10l-5 4',
  music:   'M9 18V6l10-2v12M9 18a3 3 0 11-6 0 3 3 0 016 0zM19 16a3 3 0 11-6 0 3 3 0 016 0z',
  slow:    'M12 7v5l3 2M12 21a9 9 0 110-18 9 9 0 010 18z',
  buzz:    'M12 4v2M12 18v2M5 7l1.4 1.4M17.6 15.6L19 17M5 17l1.4-1.4M17.6 8.4L19 7M9 9h6v6H9z',
  contrast:'M12 3a9 9 0 100 18zM12 3a9 9 0 010 18',
  calm:    'M12 21c5-3 7-7 7-11a7 7 0 00-14 0c0 4 2 8 7 11zM12 21V8',
};
function ic(name, size = 24, color = "currentColor", w = 2.4) {
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none"
    stroke="${color}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"
    aria-hidden="true"><path d="${ICON_PATHS[name] || ''}"/></svg>`;
}

/* ----- 3. Sound (Web Audio) - soft, musical, never jarring ------------- */
const Sound = (() => {
  let ac, master, mGain, mTimer;
  const ensure = () => { if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = .42; master.connect(ac.destination);
    mGain = ac.createGain(); mGain.gain.value = 0; mGain.connect(master); };
  const tone = (f, dur = .18, type = "sine", vol = .4, slide = 0) => {
    if (S.settings.muted || !S.settings.sound) return;
    ensure(); if (ac.state === "suspended") ac.resume();
    const o = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 2600;
    o.type = type; o.frequency.value = f;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(50, f + slide), ac.currentTime + dur);
    g.gain.setValueAtTime(.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(vol, ac.currentTime + .03);
    g.gain.exponentialRampToValueAtTime(.0001, ac.currentTime + dur);
    o.connect(lp); lp.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime + dur + .03);
  };
  const seq = (ns, gap = .14) => ns.forEach((n, i) => setTimeout(() => tone(n, .26, "sine", .38), i * gap * 1000));
  // Warm, restrained palette - gentle marimba-ish tones, no arcade beeps.
  const fx = {
    tap:     () => tone(440, .12, "sine", .26),
    stroke:  () => tone(300 + Math.random() * 90, .14, "sine", .20),
    step:    () => seq([523, 659, 784]),
    soft:    () => seq([392, 523], .16),
    win:     () => seq([523, 659, 784, 988], .15),
    sticker: () => seq([659, 784, 988], .14),
  };
  // Background music removed by request - keep no-op API so call sites stay simple.
  const startMusic = () => {};
  const stopMusic = () => {};
  return { fx, startMusic, stopMusic, ensure };
})();

/* ----- 4. Voice - calm, warm, natural; descriptive not manic ----------- */
// BCP-47 tag for the current language (used by both voices).
const LANG_TAG = { nl: "nl-NL", en: "en-US", es: "es-ES" };
const langTag = () => LANG_TAG[LC()] || "en-US";
// Pick the best device voice for the CURRENT language (fallback when the
// realistic OpenAI voice is unavailable). Recomputed per utterance so it
// follows a language change immediately.
function deviceVoice() {
  if (!("speechSynthesis" in window)) return null;
  const v = speechSynthesis.getVoices(), pre = LC();
  const byLang = v.filter(x => x.lang && x.lang.toLowerCase().startsWith(pre));
  return (
    byLang.find(x => /natural|enhanced|premium|google|siri/i.test(x.name)) ||
    byLang.find(x => /female|vrouw|mujer/i.test(x.name)) ||
    byLang[0] ||
    v.find(x => x.lang && x.lang.startsWith("en")) || v[0] || null
  );
}
if ("speechSynthesis" in window) { speechSynthesis.onvoiceschanged = () => {}; }
// Subtitles removed - the children can't read yet, so Buddy only speaks.
// ---- Realistic neural voice (OpenAI gpt-4o-mini-tts) -------------------
// The key NEVER lives here. Requests go to a tiny serverless proxy that
// holds the key as a secret (see /tts-worker). When no proxy is set, or
// we're offline, or it fails, we fall back to the device voice so the
// app always talks and stays fully usable offline. Each unique phrase is
// cached, so it's spoken once then replays free and offline forever.
const TTS_PROXY_URL = "https://scribble-tts.donny-idzerda.workers.dev";
const ttsUrl = () => { try { return localStorage.getItem("tts_url") || TTS_PROXY_URL; } catch { return TTS_PROXY_URL; } };
let _ttsEl = null, _ttsCache = null, _ttsUnlocked = false, _ttsObj = null;
// iOS Safari blocks programmatic audio until an <audio> element has been
// started inside a real user gesture. We unlock ONE shared element on the
// first tap; afterwards Buddy's realistic voice plays freely. Without this
// the realistic audio silently fails and you only ever hear the robotic
// device fallback - which is exactly the "robot voice in Safari" problem.
function unlockAudio() {
  if (_ttsUnlocked) return;
  try {
    _ttsEl = _ttsEl || new Audio();
    _ttsEl.playsInline = true; _ttsEl.preload = "auto";
    _ttsEl.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
    const p = _ttsEl.play();
    if (p && p.then) p.then(() => { try { _ttsEl.pause(); } catch {} _ttsUnlocked = true; }).catch(() => {});
    else _ttsUnlocked = true;
  } catch {}
}
async function realisticSpeak(text) {
  const base = ttsUrl();
  if (!base || !navigator.onLine || !("caches" in window)) return false;
  try {
    const key = base.replace(/\/$/, "") + "/tts?s=" + (S.settings.slowVoice ? 1 : 0) +
      "&l=" + LC() + "&t=" + encodeURIComponent(text);
    _ttsCache = _ttsCache || await caches.open("tts-v1");
    let res = await _ttsCache.match(key);
    if (!res) {
      res = await fetch(key, { mode: "cors" });
      if (!res.ok) return false;
      try { await _ttsCache.put(key, res.clone()); } catch {}
    }
    if (_ttsObj) try { URL.revokeObjectURL(_ttsObj); } catch {}
    _ttsObj = URL.createObjectURL(await res.blob());
    _ttsEl = _ttsEl || new Audio();
    _ttsEl.playsInline = true; _ttsEl.volume = .95;
    try { _ttsEl.pause(); } catch {}
    _ttsEl.src = _ttsObj;
    await _ttsEl.play(); // throws if still blocked → caller falls back to device
    return true;
  } catch { return false; }
}
function deviceSpeak(text) {
  if (!("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    // Warm and natural: gentle pace, near-natural pitch (no chipmunk).
    u.rate = S.settings.slowVoice ? .74 : .9;
    u.pitch = 1.06;
    u.volume = .95;
    u.lang = langTag();
    const dv = deviceVoice(); if (dv) u.voice = dv;
    speechSynthesis.speak(u);
  } catch {}
}
function speak(text) {
  if (S.settings.muted || !S.settings.voice) return;
  try { speechSynthesis.cancel(); } catch {}
  if (_ttsEl) try { _ttsEl.pause(); } catch {}
  // Try the realistic voice first; gracefully fall back to the device voice.
  realisticSpeak(text).then(ok => { if (!ok) deviceSpeak(text); });
}

/* ----- 5. Haptics ------------------------------------------------------- */
const buzz = p => { if (S.settings.haptics && navigator.vibrate) try { navigator.vibrate(p); } catch {} };

/* ----- 6. Buddy - a calm, well-drawn fox; mood swaps the expression ----- */
function Buddy(mood = "warm", size = 140) {
  const I = "#34302A";
  const mouth = {
    warm:  `<path d="M88 122 Q100 132 112 122" stroke="${I}" stroke-width="6" fill="none" stroke-linecap="round"/>`,
    happy: `<path d="M84 120 Q100 140 116 120" stroke="${I}" stroke-width="7" fill="none" stroke-linecap="round"/>`,
    wow:   `<ellipse cx="100" cy="126" rx="9" ry="11" fill="${I}"/>`,
    rest:  `<path d="M90 124 H110" stroke="${I}" stroke-width="6" fill="none" stroke-linecap="round"/>`,
  };
  const eyeR = mood === "wow" ? 8 : 6.5;
  const hat = S.buddyLevel >= 3
    ? `<path d="M64 50 Q100 18 136 50 Z" fill="var(--rose)"/><circle cx="100" cy="24" r="7" fill="var(--ochre)"/>` : "";
  return `<svg viewBox="0 0 200 210" width="${size}" height="${size * 1.05}" aria-hidden="true">
    <path d="M152 150 Q190 156 184 196 Q170 208 156 196 Q150 174 152 150Z" fill="var(--plum)"/>
    <rect x="170" y="186" width="22" height="12" rx="5" transform="rotate(38 181 192)" fill="var(--ochre)"/>
    <path d="M58 84 L46 34 L96 62 Z" fill="var(--clay)"/>
    <path d="M142 84 L154 34 L104 62 Z" fill="var(--clay)"/>
    <path d="M63 78 L57 50 L86 64 Z" fill="#F0CDB4"/>
    <path d="M137 78 L143 50 L114 64 Z" fill="#F0CDB4"/>
    <circle cx="100" cy="108" r="70" fill="#E0884A"/>
    <ellipse cx="100" cy="128" rx="48" ry="40" fill="var(--cream)"/>
    <circle cx="76" cy="100" r="${eyeR}" fill="${I}"/>
    <circle cx="124" cy="100" r="${eyeR}" fill="${I}"/>
    <path d="M93 114 Q100 120 107 114" stroke="${I}" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="100" cy="112" r="4.5" fill="${I}"/>
    ${mouth[mood] || mouth.warm}
    <circle cx="62" cy="120" r="8" fill="var(--rose)" opacity=".35"/>
    <circle cx="138" cy="120" r="8" fill="var(--rose)" opacity=".35"/>
    ${hat}
  </svg>`;
}
function buddySay(mood, text) {
  const b = $("#buddy");
  if (b) b.innerHTML = Buddy(mood, +b.dataset.size || 92);
  if (text) speak(text);
}

/* ----- 8b. Letters with Buddy - early handwriting practice -------------
   Simple "ball & stick" manuscript letters Lucy can trace, exactly like
   copying Papa's writing on paper. Each glyph is drawn through a mapper P
   so it scales/positions anywhere; reuses the same ghost + demo + gentle
   scoring as the drawings. Local box: x 0..adv, y 0..100, ascender top
   y8, x-height top y38, baseline y78, descender bottom y98.
   To add a word: add the letters it needs to GLYPH, then push it to WORDS. */
const _ln = (P, x1, y1, x2, y2) => `M ${P.x(x1)} ${P.y(y1)} L ${P.x(x2)} ${P.y(y2)}`;
const _cir = (P, cx, cy, r) => C(P.x(cx), P.y(cy), r * P.s);

// Each glyph: adv = advance width, b = used [x0,y0,x1,y1] bounds (for
// centring + metric scaling), d = strokes drawn through mapper P.
// UPPERCASE letterforms - research-backed: young children learn capital
// letters first (simple straight lines and single curves, all the same
// height, no tricky ascenders/descenders). Each glyph sits between cap
// top y8 and baseline y78. b = used bounds for centring/scaling.
const GLYPH = {
  A:{ adv:62, b:[8,8,54,78], d:P=>[ `M ${P.x(8)} ${P.y(78)} L ${P.x(31)} ${P.y(8)}`,
        `M ${P.x(31)} ${P.y(8)} L ${P.x(54)} ${P.y(78)}`, _ln(P,17,52,45,52) ] },
  C:{ adv:58, b:[8,8,52,78], d:P=>[ `M ${P.x(50)} ${P.y(20)} Q ${P.x(30)} ${P.y(6)} ${P.x(16)} ${P.y(24)} Q ${P.x(8)} ${P.y(43)} ${P.x(16)} ${P.y(62)} Q ${P.x(30)} ${P.y(80)} ${P.x(50)} ${P.y(66)}` ] },
  H:{ adv:58, b:[12,8,46,78], d:P=>[ _ln(P,12,8,12,78), _ln(P,46,8,46,78), _ln(P,12,43,46,43) ] },
  J:{ adv:52, b:[10,8,42,78], d:P=>[ `M ${P.x(40)} ${P.y(8)} L ${P.x(40)} ${P.y(58)} Q ${P.x(40)} ${P.y(80)} ${P.x(24)} ${P.y(78)} Q ${P.x(12)} ${P.y(76)} ${P.x(12)} ${P.y(60)}` ] },
  L:{ adv:54, b:[15,8,50,78], d:P=>[ `M ${P.x(15)} ${P.y(8)} L ${P.x(15)} ${P.y(78)} L ${P.x(50)} ${P.y(78)}` ] },
  M:{ adv:68, b:[10,8,58,78], d:P=>[ `M ${P.x(10)} ${P.y(78)} L ${P.x(10)} ${P.y(8)} L ${P.x(34)} ${P.y(56)} L ${P.x(58)} ${P.y(8)} L ${P.x(58)} ${P.y(78)}` ] },
  O:{ adv:64, b:[4,12,60,74], d:P=>[ _cir(P,32,43,28) ] },
  P:{ adv:56, b:[14,8,54,78], d:P=>[ _ln(P,14,78,14,8),
        `M ${P.x(14)} ${P.y(8)} L ${P.x(38)} ${P.y(8)} Q ${P.x(54)} ${P.y(8)} ${P.x(54)} ${P.y(26)} Q ${P.x(54)} ${P.y(44)} ${P.x(38)} ${P.y(44)} L ${P.x(14)} ${P.y(44)}` ] },
  S:{ adv:56, b:[8,8,48,78], d:P=>[ `M ${P.x(46)} ${P.y(20)} Q ${P.x(30)} ${P.y(6)} ${P.x(18)} ${P.y(20)} Q ${P.x(8)} ${P.y(34)} ${P.x(28)} ${P.y(42)} Q ${P.x(48)} ${P.y(50)} ${P.x(46)} ${P.y(64)} Q ${P.x(40)} ${P.y(80)} ${P.x(16)} ${P.y(70)}` ] },
  U:{ adv:60, b:[12,8,48,78], d:P=>[ `M ${P.x(12)} ${P.y(8)} L ${P.x(12)} ${P.y(56)} Q ${P.x(12)} ${P.y(78)} ${P.x(30)} ${P.y(78)} Q ${P.x(48)} ${P.y(78)} ${P.x(48)} ${P.y(56)} L ${P.x(48)} ${P.y(8)}` ] },
  Y:{ adv:60, b:[8,8,52,78], d:P=>[ `M ${P.x(10)} ${P.y(8)} L ${P.x(30)} ${P.y(42)} L ${P.x(50)} ${P.y(8)}`, _ln(P,30,42,30,78) ] },
};

// The words Lucy already practises with Papa, plus the children's names.
const WORDS = ["mama", "papa", "oma", "opa", "Lucy", "Josh"];

// Place a glyph at a common baseline with a consistent pen scale `s`
// (x-height letters stay shorter than tall ones - just like real
// handwriting practice on paper). Centred horizontally on `cx`.
const placeGlyph = (g, s, baseY, cx) => {
  const oy = baseY - 78 * s;            // local baseline y78 → world baseY
  const ox = cx - ((g.b[0] + g.b[2]) / 2) * s;
  return { s, x: lx => ox + lx * s, y: ly => oy + ly * s };
};

function letterSteps(word) {
  const chars = [...word.toUpperCase()];
  // One big letter per step - large, centred, on a steady baseline.
  const steps = chars.map(ch => {
    const g = GLYPH[ch];
    const P = placeGlyph(g, 7.2, 720, 500);
    // _c carries the letter so text can be localized at render time.
    return { _c: ch, icon: "write", tip: `The letter "${ch}"`,
      say: `Let's trace the letter ${ch}. Go nice and slow, just like Papa shows you.`,
      d: g.d(P) };
  });
  // Final step: the whole word together, scaled to fit the width.
  const gap = 10;
  const wl = chars.reduce((a, c) => a + (GLYPH[c].b[2] - GLYPH[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(7.2, 860 / wl);
  let x = 500 - (wl * s) / 2; const all = [];
  chars.forEach(c => {
    const g = GLYPH[c], oy = 560 - 78 * s, ox = x - g.b[0] * s;
    all.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  steps.push({ _w: word, icon: "write", tip: "The whole word",
    say: `Now the whole word. You are writing ${word}. You can do it!`, d: all });
  return steps;
}
WORDS.forEach(wd => DRAWINGS.push({
  id: "word_" + wd, name: wd.toUpperCase(), category: "writing",
  accent: "var(--sky)", finale: "bounce",
  pen: true,            // fine line + no brush-type chooser
  clearEachStep: true,  // wipe the canvas between letters
  steps: letterSteps(wd),
}));

// Small preview of a word in the same letterforms (cards, stickers, win).
function wordArt(word, size) {
  const chars = [...word.toUpperCase()].filter(c => GLYPH[c]);
  const gap = 6;
  const wl = chars.reduce((a, c) => a + (GLYPH[c].b[2] - GLYPH[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(0.92, 86 / wl);
  const y0 = Math.min(...chars.map(c => GLYPH[c].b[1]));
  const y1 = Math.max(...chars.map(c => GLYPH[c].b[3]));
  const oy = 50 - ((y0 + y1) / 2) * s;
  let x = 50 - (wl * s) / 2; const paths = [];
  chars.forEach(c => {
    const g = GLYPH[c], ox = x - g.b[0] * s;
    paths.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${
    paths.map(d => `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>`).join("")
  }</svg>`;
}

/* ----- 12. Drawing engine (canvas, brushes, ghost, scoring) ------------ */
const COLORS = ["#CC4B3C", "#E2952F", "#EBC44A", "#6E9E5F", "#5C90A8", "#8A6FA0"];
const AGE = {
  1: { brush: 58, tol: 150, pass: .10, oneStep: true },
  2: { brush: 46, tol: 112, pass: .18, oneStep: false },
  3: { brush: 34, tol: 80,  pass: .30, oneStep: false },
  4: { brush: 28, tol: 64,  pass: .38, oneStep: false },
  5: { brush: 24, tol: 52,  pass: .45, oneStep: false },
};
function makeEngine(stage, opts = {}) {
  const cfg = AGE[S.age] || AGE[2];
  const paper = el("div", { id: "paper" });
  const cv = el("canvas", { id: "pad" });
  const SVGNS = "http://www.w3.org/2000/svg";
  const ghost = document.createElementNS(SVGNS, "svg"); ghost.id = "ghost"; ghost.setAttribute("viewBox", "0 0 1000 1000");
  const demo = document.createElementNS(SVGNS, "svg"); demo.id = "demo"; demo.setAttribute("viewBox", "0 0 1000 1000");
  stage.append(paper, cv, ghost, demo);

  const ctx = cv.getContext("2d", { willReadFrequently: true });
  let DPR = 1, size = 0;
  function resize() {
    const r = stage.getBoundingClientRect();
    size = Math.min(r.width, r.height);
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    const prev = (size && cv.width) ? ctx.getImageData(0, 0, cv.width, cv.height) : null;
    cv.width = size * DPR; cv.height = size * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (prev) ctx.putImageData(prev, 0, 0);
  }
  new ResizeObserver(resize).observe(stage); resize();
  const L2P = v => (v / 1000) * size;
  // Brush sizes are tuned for a 560px reference canvas; scale to the
  // actual canvas so strokes look right on small phones (not huge).
  const REF = 560;

  const st = { color: COLORS[0], brush: "crayon", down: false, pts: [], strokes: 0 };
  function style() {
    ctx.strokeStyle = st.color;
    const k = size / REF;
    if (st.brush === "pen") {
      // Fine, even line for letter tracing (no texture, no glow).
      ctx.lineWidth = Math.max(3, 11 * k);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    } else {
      ctx.lineWidth = Math.max(5, cfg.brush * k * (st.brush === "marker" ? 1.12 : 1));
      ctx.globalAlpha = st.brush === "crayon" ? .9 : 1;
      ctx.shadowBlur = st.brush === "glow" ? 16 : 0;
    }
    ctx.shadowColor = st.color;
  }
  function sparkle(x, y) {
    for (let i = 0; i < 3; i++) { ctx.save();
      ctx.fillStyle = rand(["#fff", st.color, "#EBC44A"]); ctx.globalAlpha = .85;
      ctx.beginPath();
      ctx.arc(x + (Math.random() - .5) * 36, y + (Math.random() - .5) * 36, Math.random() * 3.5 + 1, 0, 7);
      ctx.fill(); ctx.restore(); }
  }
  function smooth() {
    const p = st.pts; if (p.length < 3) return;
    style(); ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y);
    for (let i = 1; i < p.length - 1; i++) {
      const mx = (p[i].x + p[i + 1].x) / 2, my = (p[i].y + p[i + 1].y) / 2;
      ctx.quadraticCurveTo(p[i].x, p[i].y, mx, my);
    }
    ctx.stroke();
    if (st.brush === "glow") sparkle(p[p.length - 1].x, p[p.length - 1].y);
  }
  const xy = e => { const r = cv.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
  cv.addEventListener("pointerdown", e => { cv.setPointerCapture(e.pointerId); st.down = true; st.pts = [xy(e)]; Sound.fx.stroke(); });
  cv.addEventListener("pointermove", e => {
    if (!st.down) return;
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of evs) st.pts.push(xy(ev));
    smooth();
  });
  function end() {
    if (!st.down) return;
    if (st.pts.length < 3 && st.pts[0]) { // a tap still leaves a mark
      style(); ctx.beginPath();
      ctx.arc(st.pts[0].x, st.pts[0].y, ctx.lineWidth / 2, 0, 7);
      ctx.fillStyle = st.color; ctx.fill();
    }
    st.down = false; st.strokes++; st.pts = [];
    buzz(14); opts.onStroke && opts.onStroke(st.strokes);
  }
  cv.addEventListener("pointerup", end);
  cv.addEventListener("pointercancel", end);
  cv.addEventListener("pointerleave", end);

  let gp = [];
  function setGhost(arr) {
    ghost.innerHTML = ""; demo.innerHTML = ""; ghost.classList.remove("help"); gp = arr;
    arr.forEach(d => { const p = document.createElementNS(SVGNS, "path"); p.setAttribute("d", d); ghost.append(p); });
  }
  let raf;
  function playDemo() {
    cancelAnimationFrame(raf); demo.innerHTML = "";
    const tmp = document.createElementNS(SVGNS, "path");
    const dot = document.createElementNS(SVGNS, "circle");
    dot.setAttribute("r", "22"); dot.setAttribute("fill", "var(--clay)");
    dot.setAttribute("stroke", "#fff"); dot.setAttribute("stroke-width", "6");
    demo.append(dot);
    let i = 0;
    const run = () => {
      if (i >= gp.length) { demo.innerHTML = ""; return; }
      tmp.setAttribute("d", gp[i]);
      const len = tmp.getTotalLength() || 1, dur = clamp(len * 1.7, 800, 2800), t0 = performance.now();
      const fr = now => {
        const k = clamp((now - t0) / dur, 0, 1), pt = tmp.getPointAtLength(k * len);
        dot.setAttribute("cx", pt.x); dot.setAttribute("cy", pt.y);
        if (k < 1) raf = requestAnimationFrame(fr); else { i++; run(); }
      };
      raf = requestAnimationFrame(fr);
    };
    run();
  }
  function helpMe() { ghost.classList.add("help"); setTimeout(() => ghost.classList.remove("help"), 4500); playDemo(); }

  // Forgiving coverage score (0..1). Never blocks - only scales warmth.
  function score() {
    if (!gp.length) return 1;
    const img = ctx.getImageData(0, 0, cv.width, cv.height).data;
    const tol = Math.round(L2P(cfg.tol) * DPR), step = Math.max(3, Math.round(tol / 4));
    const tmp = document.createElementNS(SVGNS, "path");
    let hit = 0, tot = 0;
    for (const d of gp) {
      tmp.setAttribute("d", d);
      const len = tmp.getTotalLength() || 1, n = clamp(Math.round(len / 26), 8, 80);
      for (let i = 0; i <= n; i++) {
        const pt = tmp.getPointAtLength((i / n) * len);
        const cx = Math.round(L2P(pt.x) * DPR), cy = Math.round(L2P(pt.y) * DPR);
        tot++; let f = false;
        for (let dy = -tol; dy <= tol && !f; dy += step)
          for (let dx = -tol; dx <= tol && !f; dx += step) {
            const px = cx + dx, py = cy + dy;
            if (px < 0 || py < 0 || px >= cv.width || py >= cv.height) continue;
            if (img[(py * cv.width + px) * 4 + 3] > 24) f = true;
          }
        if (f) hit++;
      }
    }
    return tot ? hit / tot : 1;
  }
  const clear = () => ctx.clearRect(0, 0, cv.width, cv.height);
  const undo = () => { ctx.save(); ctx.globalCompositeOperation = "destination-out";
    ctx.globalAlpha = .5; ctx.fillRect(0, 0, cv.width, cv.height); ctx.restore(); };
  const toPNG = () => { const o = document.createElement("canvas");
    o.width = cv.width; o.height = cv.height; const c = o.getContext("2d");
    c.fillStyle = "#FBF3E7"; c.fillRect(0, 0, o.width, o.height); c.drawImage(cv, 0, 0);
    return new Promise(r => o.toBlob(r, "image/png")); };
  return { st, setGhost, helpMe, playDemo, score, clear, undo, toPNG, cfg,
           get strokes() { return st.strokes; } };
}

function toolbar(engine, opts = {}) {
  const bar = el("div", { css: "display:flex;flex-direction:column;gap:8px;align-items:center;padding:4px 14px" });
  const cols = el("div", { css: "display:flex;gap:12px;flex-wrap:wrap;justify-content:center" });
  COLORS.forEach((c, i) => {
    const b = el("button", { cls: "well" + (i === 0 ? " sel" : ""), css: `background:${c}` });
    b.onclick = () => { engine.st.color = c; Sound.fx.tap(); buzz(12);
      [...cols.children].forEach(x => x.classList.remove("sel")); b.classList.add("sel"); };
    cols.append(b);
  });
  const br = el("div", { css: "display:flex;gap:10px" });
  [["crayon", "Crayon", "brush"], ["marker", "Marker", "save"], ["glow", "Glow", "star"]].forEach(([k, label, icon], i) => {
    const b = el("button", { cls: "chip" + (i === 0 ? " sel" : ""),
      html: ic(icon, 18, i === 0 ? "var(--cream)" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { engine.st.brush = k; Sound.fx.tap(); buzz(12);
      [...br.children].forEach(x => { x.classList.remove("sel"); x.querySelector("svg").setAttribute("stroke", "var(--ink)"); });
      b.classList.add("sel"); b.querySelector("svg").setAttribute("stroke", "var(--cream)"); };
    br.append(b);
  });
  // Writing mode uses a single fine pen, so the brush chips are hidden.
  bar.append(cols);
  if (opts.brushes !== false) bar.append(br);
  return bar;
}

/* ----- 13. Guided drawing ---------------------------------------------- */
function DrawScreen(id) {
  const D = DRAWINGS.find(d => d.id === id) || DRAWINGS[0];
  const steps = (AGE[S.age].oneStep) ? D.steps.slice(0, Math.min(2, D.steps.length)) : D.steps;
  let i = 0;
  const s = el("div", { cls: "screen" });

  const head = el("div", { css: "display:flex;align-items:center;gap:10px;padding:12px 16px 2px" });
  const back = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  back.onclick = () => { Sound.fx.tap(); go("home"); };
  head.append(back,
    el("div", { css: "flex:1", html: `<div class="t-title">${drawName(D)}</div>` }),
    muteBtn(),
    el("div", { id: "buddy", "data-size": 44, html: Buddy("happy", 44) }));
  s.append(head);

  const progWrap = el("div", { css: "padding:2px 18px 4px;display:flex;align-items:center;gap:10px" });
  const prog = el("div", { cls: "prog", css: "flex:1", html: "<i style='width:0'></i>" });
  const pNum = el("div", { cls: "t-label", css: "white-space:nowrap" });
  progWrap.append(prog, pNum);
  s.append(progWrap);

  const banner = el("div", { cls: "card", css: "margin:2px 16px;padding:10px 14px;display:flex;align-items:center;gap:12px" });
  banner.innerHTML = `<div id="sIcon" style="background:var(--surface-2);border-radius:12px;padding:7px"></div>
    <div id="sTip" class="t-head" style="flex:1"></div>`;
  s.append(banner);

  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(86vw,560px);margin:auto" });
  sw.append(stage); s.append(sw);
  const engine = makeEngine(stage, { onStroke: () => {
    if (Math.random() < .4) buddySay("happy", rnd("encourage"));
  }});
  // Writing lessons: fine pen, no brush chooser, thinner ghost guide.
  if (D.pen) {
    engine.st.brush = "pen";
    const gh = stage.querySelector("#ghost");
    if (gh) gh.classList.add("pen");
  }
  s.append(toolbar(engine, { brushes: !D.pen }));

  // Helpers in a compact row; Next is a full-width primary button on its
  // own line so it can never be pushed off-screen on narrow phones.
  const mk = (icon, label, fn, opt = {}) => {
    const b = el("button", { cls: "btn " + (opt.primary ? "btn-go" : "btn-quiet"),
      css: opt.primary ? "width:100%" : "flex:1;min-width:0;gap:6px;padding:13px 6px",
      html: ic(icon, 20, opt.primary ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(12); fn(); };
    return b;
  };
  const helpers = el("div", { css: "display:flex;gap:8px;padding:4px 16px 0" });
  helpers.append(
    mk("help", t("showMe"), () => { engine.helpMe(); speak(t("showMeSay")); }),
    mk("undo", t("undo"), () => engine.undo()),
    mk("eraser", t("clear"), () => { engine.clear(); engine.setGhost(steps[i].d); }),
  );
  const next = mk("next", t("next"), () => advance(), { primary: true });
  const nextWrap = el("div", { css: "padding:6px 16px calc(10px + env(safe-area-inset-bottom))" });
  nextWrap.append(next);
  s.append(helpers, nextWrap);
  APP.append(s);

  function show() {
    const stp = steps[i], L = stepText(D, i);
    prog.firstChild.style.width = (i / steps.length) * 100 + "%";
    pNum.textContent = t("stepOf")(i + 1, steps.length);
    $("#sIcon").innerHTML = ic(stp.icon, 26, D.accent);
    const tip = $("#sTip"); tip.textContent = L.tip;
    tip.classList.remove("pop"); void tip.offsetWidth; tip.classList.add("pop");
    if (D.clearEachStep) engine.clear(); // each letter starts on a fresh sheet
    engine.setGhost(stp.d);
    next.querySelector("span").textContent = (i === steps.length - 1) ? t("allDone") : t("next");
    buddySay("happy", L.say);
    setTimeout(() => engine.playDemo(), 800);
  }
  const scores = [];
  function advance() {
    scores[i] = engine.score();
    const ok = scores[i] >= engine.cfg.pass;
    if (ok) {
      Sound.fx.step(); burst(.3);
      buddySay("happy", rnd("praiseOk"));
    } else {
      Sound.fx.soft();
      buddySay("warm", rnd("praiseSoft"));
    }
    prog.firstChild.style.width = ((i + 1) / steps.length) * 100 + "%";
    i++;
    if (i >= steps.length) return finish();
    setTimeout(show, ok ? 1100 : 950);
  }
  async function finish() {
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    const stars = avg >= engine.cfg.pass * 1.6 ? 3 : avg >= engine.cfg.pass ? 2 : 1;
    const blob = await engine.toPNG();
    S.completed[D.id] = Math.max(S.completed[D.id] || 0, stars);
    S.stars += stars;
    if (!S.stickers.includes(D.id)) S.stickers.push(D.id);
    if (S.stars > S.buddyLevel * 8) S.buddyLevel++;
    save();
    await galleryAdd({ id: Date.now(), name: drawName(D), art: D.id, blob });
    go("win", { D, stars, blob });
  }
  show();
}

/* ----- 14. Completion -------------------------------------------------- */
function WinScreen({ D, stars, blob }) {
  const s = el("div", { cls: "screen", css: "align-items:center;justify-content:flex-start;text-align:center;padding:24px;gap:14px;overflow-y:auto" });
  const url = URL.createObjectURL(blob);
  s.append(el("div", { cls: "t-display", textContent: t("winTitle")(S.name) }));
  const starsRow = el("div", { css: "display:flex;gap:6px",
    html: Array.from({ length: 3 }, (_, k) =>
      ic("star", 30, k < stars ? "var(--ochre)" : "rgba(52,48,42,.18)")).join("") });
  s.append(starsRow);
  const fin = el("div", { id: "fin", css: "margin:4px 0", html: ART(D.id, 110) });
  const frame = el("div", { cls: "card", css: "padding:12px;background:var(--cream)" });
  frame.append(el("img", { src: url, alt: "Your drawing",
    css: "width:min(62vw,280px);border-radius:14px;display:block" }));
  s.append(fin, frame);
  s.append(el("div", { cls: "bubble t-body", css: "margin-top:14px",
    textContent: t("winSticker")(drawName(D)) }));

  const row = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px" });
  const mk = (icon, label, fn, kind) => {
    const b = el("button", { cls: "btn " + (kind || "btn-quiet"),
      html: ic(icon, 20, kind === "btn-primary" || kind === "btn-go" ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(14); fn(); };
    return b;
  };
  const list = DRAWINGS, nxt = list[(list.findIndex(x => x.id === D.id) + 1) % list.length];
  const fname = drawName(D).replace(/[^\w]+/g, "_");
  row.append(
    mk("undo", t("drawAgain"), () => go("draw", D.id)),
    mk("next", t("nextDrawing"), () => go("draw", nxt.id), "btn-go"),
    mk("gallery", t("nGallery"), () => go("gallery")),
    mk("share", t("share"), async () => {
      const f = new File([blob], `${fname}.png`, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [f] }))
        navigator.share({ files: [f], title: "Scribble Heroes" }).catch(() => {});
      else el("a", { href: url, download: `${fname}.png` }).click();
    }),
    mk("home", t("home"), () => go("home")),
  );
  s.append(row);
  APP.append(s);

  Sound.fx.win(); buzz([20, 40, 20]); burst(1);
  finale($("#fin"), D.finale);
  setTimeout(() => Sound.fx.sticker(), 1300);
  setTimeout(() => speak(rnd("winPraise")), 700);
}
function finale(node, kind) {
  if (!node || S.settings.calm) return;
  const a = {
    fly:    [{ transform: "translateY(0)" }, { transform: "translateY(-220px)", opacity: .5 }],
    bounce: [{ transform: "translateY(0)" }, { transform: "translateY(-46px)" }, { transform: "translateY(0)" }],
    wag:    [{ transform: "rotate(-8deg)" }, { transform: "rotate(8deg)" }, { transform: "rotate(-8deg)" }],
    spin:   [{ transform: "rotate(0)" }, { transform: "rotate(360deg)" }],
    grow:   [{ transform: "scale(.6)" }, { transform: "scale(1.06)" }, { transform: "scale(1)" }],
  };
  node.animate(a[kind] || a.bounce,
    { duration: kind === "fly" ? 2200 : 1400, iterations: kind === "wag" ? 3 : 2, easing: "cubic-bezier(.3,.7,.3,1)" });
}
function burst(scale = 1) {
  if (S.settings.calm || typeof confetti !== "function") return;
  confetti({ particleCount: Math.round(90 * scale), spread: 78, origin: { y: .62 },
    colors: ["#C9633F", "#D89A36", "#6E8C5E", "#5E8AA0", "#CF8585", "#7C6C90"],
    scalar: 1.05, disableForReducedMotion: true, ticks: 160 });
}

/* ----- 15. Gallery ----------------------------------------------------- */
async function GalleryScreen() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("galleryTitle")));
  const wrap = el("div", { cls: "scroll", css: "flex:1;padding:14px 20px 116px;container-type:inline-size" });
  const items = await galleryAll();
  if (!items.length) {
    wrap.append(el("div", { cls: "t-body muted", css: "text-align:center;margin-top:48px",
      textContent: t("galleryEmpty") }));
  } else {
    const grid = el("div", { cls: "grid" });
    items.forEach(rec => {
      const url = URL.createObjectURL(rec.blob);
      const c = el("div", { cls: "card", css: "padding:10px;display:flex;flex-direction:column;gap:8px" });
      c.innerHTML = `<img src="${url}" style="width:100%;border-radius:14px"/>
        <div class="t-head" style="text-align:center">${rec.name}</div>`;
      const r = el("div", { css: "display:flex;gap:8px" });
      const dl = el("button", { cls: "btn btn-quiet", css: "flex:1;padding:11px",
        html: ic("share", 18) });
      dl.onclick = () => { const f = new File([rec.blob], rec.name + ".png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [f] })) navigator.share({ files: [f] }).catch(() => {});
        else el("a", { href: url, download: rec.name + ".png" }).click(); };
      const del = el("button", { cls: "btn btn-quiet", css: "flex:1;padding:11px", html: ic("eraser", 18) });
      del.onclick = async () => { Sound.fx.tap(); await galleryDel(rec.id); GalleryScreen(); };
      r.append(dl, del); c.append(r); grid.append(c);
    });
    wrap.append(grid);
  }
  s.append(wrap, nav("gallery"));
  APP.append(s);
}

/* ----- 16. Sticker book ------------------------------------------------ */
function StickerScreen() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("stickersTitle")));
  const wrap = el("div", { cls: "scroll", css: "flex:1;padding:14px 20px 116px;container-type:inline-size" });
  wrap.append(el("div", { cls: "t-body muted", css: "text-align:center;margin-bottom:12px",
    textContent: t("stickersCount")(S.stickers.length, DRAWINGS.length) }));
  const grid = el("div", { cls: "grid" });
  DRAWINGS.forEach(d => {
    const have = S.stickers.includes(d.id);
    const c = el("button", { cls: "card", css: `padding:22px;display:flex;align-items:center;justify-content:center;${have ? "" : "opacity:.4"}` });
    c.innerHTML = have ? ART(d.id, 78)
      : `<div style="filter:grayscale(1) opacity(.5)">${ART(d.id, 78)}</div>`;
    c.onclick = () => {
      if (!have) { speak(t("stickerLocked")(drawName(d))); return; }
      Sound.fx.sticker(); buzz(26);
      c.classList.remove("nudge"); void c.offsetWidth; c.classList.add("nudge");
      speak(t("stickerEarned")(drawName(d)));
    };
    grid.append(c);
  });
  wrap.append(grid);
  s.append(wrap, nav("stickers"));
  APP.append(s);
}

/* ----- 17. Free draw --------------------------------------------------- */
function FreeDraw() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("freeTitle")));
  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(90vw,620px);margin:auto" });
  sw.append(stage); s.append(sw);
  let n = 0;
  const engine = makeEngine(stage, { onStroke: () => {
    if (++n % 5 === 0) speak(rnd("freeEncourage")); }});
  s.append(toolbar(engine));
  const row = el("div", { css: "display:flex;gap:10px;padding:6px 18px calc(14px + env(safe-area-inset-bottom))" });
  const mk = (icon, label, fn, kind) => {
    const b = el("button", { cls: "btn " + (kind || "btn-quiet"), css: "flex:1",
      html: ic(icon, 20, kind === "btn-go" ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(12); fn(); }; return b;
  };
  row.append(
    mk("undo", t("undo"), () => engine.undo()),
    mk("eraser", t("clear"), () => engine.clear()),
    mk("save", t("save"), async () => {
      const blob = await engine.toPNG();
      await galleryAdd({ id: Date.now(), name: t("freeTitle"), art: "star", blob });
      Sound.fx.win(); burst(.5);
      speak(t("freeSave")(S.name));
    }, "btn-go"),
  );
  s.append(row, nav("free"));
  APP.append(s);
  buddySay("warm", t("freeIntro")(S.name));
}

/* ----- 18. Settings (parent) ------------------------------------------- */
function Settings() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("settingsTitle")));
  const wrap = el("div", { cls: "scroll", css: "flex:1;padding:16px 20px 40px;display:flex;flex-direction:column;gap:10px" });

  // Language selector
  const langCard = el("div", { cls: "card", css: "padding:16px 18px;display:flex;flex-direction:column;gap:10px" });
  langCard.append(el("div", { cls: "t-label", textContent: t("language") }));
  const lseg = el("div", { css: "display:flex;gap:8px;background:var(--surface-2);padding:6px;border-radius:14px" });
  LANGS.forEach(([code, label]) => {
    const on = S.lang === code;
    const b = el("button", { textContent: label,
      css: `flex:1;padding:12px 6px;border-radius:10px;font-weight:800;border:none;background:${on ? "var(--ink)" : "transparent"};color:${on ? "var(--cream)" : "var(--ink-soft)"}` });
    b.onclick = () => { S.lang = code; save(); Sound.fx.tap(); buzz(12); Settings(); };
    lseg.append(b);
  });
  langCard.append(lseg);
  wrap.append(langCard);

  [["muted", "mute", t("setMuted")],
   ["voice", "sound", t("setVoice")],
   ["slowVoice", "slow", t("setSlow")],
   ["sound", "sound", t("setSound")],
   ["haptics", "buzz", t("setHaptics")],
   ["contrast", "contrast", t("setContrast")],
   ["calm", "calm", t("setCalm")]].forEach(([k, icon, label]) => {
    const row = el("div", { cls: "card", css: "padding:16px 18px;display:flex;align-items:center;gap:14px" });
    const swh = el("div", { cls: "sw" + (S.settings[k] ? " on" : ""), html: "<i></i>" });
    row.append(el("div", { html: ic(icon, 22, "var(--ink-soft)") }),
      el("div", { cls: "t-head", css: "flex:1", textContent: label }), swh);
    row.onclick = () => {
      S.settings[k] = !S.settings[k]; save(); Sound.fx.tap(); buzz(12);
      swh.classList.toggle("on", S.settings[k]); applyFlags();
      if (k === "muted" && S.settings.muted && "speechSynthesis" in window)
        try { speechSynthesis.cancel(); } catch {}
    };
    wrap.append(row);
  });

  const prof = el("div", { cls: "card", css: "padding:18px;display:flex;flex-direction:column;gap:12px" });
  prof.append(el("div", { cls: "t-head", html: `${t("artist")}: <b>${S.name}</b>` }),
    el("div", { cls: "t-label", textContent: t("ageSetting") }));
  const seg = el("div", { css: "display:flex;gap:8px;background:var(--surface-2);padding:6px;border-radius:14px" });
  [1, 2, 3, 4, 5].forEach(a => {
    const b = el("button", { textContent: `${a}`,
      css: `flex:1;padding:12px 6px;border-radius:10px;font-weight:800;background:${S.age === a ? "var(--ink)" : "transparent"};color:${S.age === a ? "var(--cream)" : "var(--ink-soft)"}` });
    b.onclick = () => { S.age = a; save(); Sound.fx.tap(); Settings(); };
    seg.append(b);
  });
  prof.append(seg);
  const reset = el("button", { cls: "btn", css: "background:var(--clay);color:#fff;border-color:transparent;margin-top:4px",
    html: ic("eraser", 18, "#fff") + `<span>${t("reset")}</span>` });
  reset.onclick = async () => {
    if (confirm(t("resetConfirm"))) {
      localStorage.removeItem(SAVE_KEY);
      (await galleryAll()).forEach(r => galleryDel(r.id));
      S = defaultState(); save(); Splash();
    }
  };
  prof.append(reset);
  wrap.append(prof);

  const note = el("div", { cls: "card", css: "padding:20px;line-height:1.6", html: t("note") });
  wrap.append(note);
  s.append(wrap);
  APP.append(s);
}

// One-tap master mute - silences effects, voice, and music together.
// Captions stay on (accessibility). Reachable on every play screen, so a
// grown-up never has to go through the parent-gated settings to hush it.
function muteBtn() {
  const b = el("button", { cls: "btn btn-quiet btn-icon" });
  b.setAttribute("aria-label", "Turn sound on or off");
  const render = () => b.innerHTML =
    ic(S.settings.muted ? "mute" : "sound", 22, S.settings.muted ? "var(--ink-soft)" : "var(--clay)");
  render();
  b.onclick = () => {
    S.settings.muted = !S.settings.muted; save(); buzz(12); render();
    if (S.settings.muted) {
      if (_ttsEl) try { _ttsEl.pause(); } catch {}
      if ("speechSynthesis" in window) try { speechSynthesis.cancel(); } catch {}
    }
  };
  return b;
}

function header(title) {
  const h = el("div", { css: "display:flex;align-items:center;gap:12px;padding:18px 20px 6px" });
  const b = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  b.onclick = () => { Sound.fx.tap(); buzz(12); go("home"); };
  h.append(b, el("div", { cls: "t-title", textContent: title }),
    el("div", { css: "flex:1" }), muteBtn());
  return h;
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
