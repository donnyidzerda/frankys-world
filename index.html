<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#33302B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Scribble Heroes" />
<title>Scribble Heroes - Buddy's Studio</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='%23EFE7D8'/%3E%3Ccircle cx='256' cy='258' r='150' fill='%23E0884A'/%3E%3Cellipse cx='256' cy='284' rx='104' ry='86' fill='%23FBF3E7'/%3E%3C/svg%3E" />

<!-- Tailwind v4 browser build + canvas-confetti. Both cached offline by the service worker. -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>

<style>
  /* =======================================================================
     DESIGN SYSTEM
     A warm, gallery-paper aesthetic - not neon, not gradient-y. Earthy,
     considered accents (clay / sage / ochre / sky / rose / plum), soft
     layered shadows, a rounded system typeface, and restrained motion.
     Built for calm focus on iPads & phones; high-contrast + calm modes.
     ======================================================================= */
  :root{
    --bg:#EFE7D8; --bg-2:#E7DCC8; --surface:#FFFFFF; --surface-2:#FBF6EC;
    --ink:#34302A; --ink-soft:#7A7164; --line:#E2D8C4;
    --clay:#C9633F; --sage:#6E8C5E; --ochre:#D89A36; --sky:#5E8AA0;
    --rose:#CF8585; --plum:#7C6C90; --cream:#FBF3E7;
    /* Soft section tints - colour-code the three worlds without shouting. */
    --sky-soft:#E6EEF1; --sage-soft:#EAEFE3; --clay-soft:#F6E7DE;
    --r:26px; --r-sm:18px;
    --sh-sm:0 1px 2px rgba(52,48,42,.05), 0 3px 8px rgba(52,48,42,.07);
    --sh:0 2px 6px rgba(52,48,42,.06), 0 16px 34px rgba(52,48,42,.10);
    --sh-lg:0 4px 10px rgba(52,48,42,.07), 0 28px 56px rgba(52,48,42,.14);
    --ring:rgba(201,99,63,.35);
  }
  *{ -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; box-sizing:border-box; }
  html,body{ margin:0; height:100%; height:100dvh; overflow:hidden; overscroll-behavior:none; touch-action:manipulation;
    color:var(--ink); background:var(--bg);
    font-family:'Nunito','Quicksand',ui-rounded,-apple-system,'SF Pro Rounded',
      'Segoe UI',system-ui,sans-serif;
    font-feature-settings:"ss01" 1; -webkit-font-smoothing:antialiased; }
  body{ background-image:
      radial-gradient(rgba(52,48,42,.025) 1px, transparent 1px);
    background-size:26px 26px; }
  /* Paper grain: one static SVG turbulence layer over everything. Gives a
     hand-made, fibrous warmth instead of flat-vector cleanliness. Pure
     pseudo-element, no DOM node, no repaint cost. Off in high-contrast. */
  body::after{ content:''; position:fixed; inset:0; pointer-events:none;
    z-index:9998; opacity:.05; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='180'%20height='180'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.82'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3C/filter%3E%3Crect%20width='180'%20height='180'%20filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:180px 180px; }
  body.hc::after{ display:none; }
  #app{ position:fixed; inset:0; display:flex; flex-direction:column; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  svg{ display:block; }

  /* Content width caps - on wide screens cards, pillars and grids stay at
     a comfortable reading / tapping width and centre, instead of
     stretching edge to edge. Harmless on phones (already narrower). */
  .cap{ max-width:680px; margin-inline:auto; width:100%; }
  .cap-wide{ max-width:980px; margin-inline:auto; width:100%; }

  /* Desktop: a touch app must not stretch across a monitor. Present it as
     a centred device panel floating on the textured backdrop. Phones and
     tablets (coarse pointer) stay edge-to-edge fullscreen, as a PWA should. */
  @media (min-width:1024px) and (hover:hover) and (pointer:fine){
    body{ display:flex; align-items:center; justify-content:center;
      background-color:#E4D9C2;
      background-image:
        radial-gradient(72% 56% at 50% 36%, rgba(255,255,255,.5), transparent 72%),
        radial-gradient(rgba(52,48,42,.045) 1px, transparent 1px);
      background-size:100% 100%, 26px 26px; }
    #app{ position:relative; inset:auto;
      width:min(780px,94vw); height:min(1120px,94dvh);
      border-radius:36px; overflow:hidden;
      border:1px solid rgba(226,216,196,.7);
      box-shadow:0 2px 8px rgba(52,48,42,.10),
        0 44px 100px rgba(52,48,42,.30), 0 14px 34px rgba(52,48,42,.18); }
  }

  /* Fluid type. Hierarchy comes from BOTH size and weight - heaviest only
     where it earns it, so the screen has a clear loudest-to-quietest order
     instead of everything shouting at weight 800. */
  .t-display{ font-size:clamp(30px,6.4vw,52px); font-weight:700; letter-spacing:-.02em; line-height:1.04; }
  .t-title{ font-size:clamp(20px,4vw,30px); font-weight:700; letter-spacing:-.015em; line-height:1.12; }
  .t-head{ font-size:clamp(17px,3vw,22px); font-weight:600; letter-spacing:-.01em; }
  .t-body{ font-size:clamp(15px,2.4vw,18px); font-weight:500; line-height:1.55; }
  .t-label{ font-size:clamp(12px,2vw,14px); font-weight:700; letter-spacing:.04em;
    text-transform:uppercase; color:var(--ink-soft); }
  .muted{ color:var(--ink-soft); }

  /* Components */
  .card{ background:var(--surface); border-radius:var(--r); box-shadow:var(--sh);
    border:1px solid rgba(226,216,196,.7); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:10px;
    border-radius:999px; font-weight:700; padding:16px 26px; font-size:clamp(15px,2.6vw,18px);
    background:var(--surface); color:var(--ink); box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8);
    transition:transform .14s cubic-bezier(.2,.7,.3,1), box-shadow .14s, background .14s; }
  .btn:active{ transform:translateY(2px) scale(.99); box-shadow:var(--sh-sm); }
  .btn:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring), var(--sh-sm); }
  .btn-primary{ background:var(--clay); color:#fff; border-color:transparent; }
  .btn-go{ background:var(--sage); color:#fff; border-color:transparent; }
  .btn-quiet{ background:var(--surface-2); }
  .btn-icon{ padding:14px; border-radius:var(--r-sm); }
  /* Fridge-door gallery */
  .fridge{ background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.5), transparent 40%),
      repeating-linear-gradient(45deg,#e7dcc4 0 6px,#e3d7bd 6px 12px); }
  .photo{ position:relative; background:#fff; padding:10px 10px 14px;
    box-shadow:var(--sh); border-radius:4px; }
  .photo:nth-child(3n){ transform:rotate(-2.2deg); }
  .photo:nth-child(3n+1){ transform:rotate(1.6deg); }
  .photo:nth-child(3n+2){ transform:rotate(-.8deg); }
  .photo .tape{ position:absolute; top:-10px; left:50%; width:64px; height:22px;
    transform:translateX(-50%) rotate(-3deg);
    background:rgba(214,196,150,.55); box-shadow:0 1px 2px rgba(0,0,0,.08); }

  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    animation:rise .32s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  .pop{ animation:pop .26s cubic-bezier(.2,.8,.3,1.05); }
  @keyframes pop{ from{opacity:0; transform:scale(.94)} to{opacity:1; transform:scale(1)} }
  .float{ animation:float 6s ease-in-out infinite; }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  .nudge{ animation:nudge .6s ease; }
  @keyframes nudge{ 0%,100%{transform:rotate(0)} 30%{transform:rotate(-5deg)} 70%{transform:rotate(5deg)} }
  /* One-shot "this is ready" pulse - the only moment a button asks to be
     pressed, and only when the child has earned it (Pen-Live). */
  .ready{ animation:readyPulse .9s cubic-bezier(.2,.7,.3,1); }
  @keyframes readyPulse{ 0%,100%{transform:none} 42%{transform:scale(1.045)} }
  body.calm .float,body.calm .nudge,body.calm .ready{ animation:none !important; }
  /* Echo mic button: the child's turn to speak. Holds while they say the
     sound; a calm plum ring pulses out so they feel the moment is theirs. */
  .micbtn{ position:relative; width:128px; height:128px; border-radius:50%;
    background:var(--surface); box-shadow:var(--sh);
    border:1px solid rgba(226,216,196,.8);
    display:flex; align-items:center; justify-content:center;
    transition:background .18s, transform .14s; }
  .micbtn:active{ transform:scale(.97); }
  .micbtn.rec{ background:var(--plum); }
  .micbtn .mr{ position:absolute; inset:-4px; border-radius:50%;
    border:3px solid var(--plum); opacity:0; pointer-events:none; }
  .micbtn.rec .mr{ animation:micPulse 1.05s ease-out infinite; }
  @keyframes micPulse{ 0%{transform:scale(1);opacity:.55} 100%{transform:scale(1.34);opacity:0} }
  body.calm .micbtn.rec .mr{ animation:none; }
  /* Buddy's world: milestones pop in once when unlocked; gentle ambient
     motion (sun pulse, cloud drift, bird bob) - all off in calm mode. */
  .we{ transform-box:fill-box; transform-origin:center bottom; }
  .we.lock{ opacity:0; }
  body:not(.calm) .we.new{ animation:wpop .6s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes wpop{ 0%{opacity:0;transform:scale(.15)} 60%{opacity:1;transform:scale(1.12)} 100%{transform:scale(1)} }
  .w-sun{ transform-box:fill-box; transform-origin:center; }
  .w-cloud,.w-bird{ transform-box:fill-box; }
  body:not(.calm) .w-sun{ animation:wsun 4.5s ease-in-out infinite; }
  body:not(.calm) .w-cloud{ animation:wcloud 9s ease-in-out infinite alternate; }
  body:not(.calm) .w-bird{ animation:wbird 1.7s ease-in-out infinite; }
  @keyframes wsun{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes wcloud{ from{transform:translateX(-7px)} to{transform:translateX(11px)} }
  @keyframes wbird{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

  /* Speech bubble (Buddy) - soft, paper-like, no harsh outline */
  .bubble{ position:relative; background:var(--surface); color:var(--ink);
    border-radius:20px; padding:14px 18px; font-weight:700; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .bubble::after{ content:''; position:absolute; left:30px; bottom:-11px;
    width:18px; height:18px; background:var(--surface); transform:rotate(45deg);
    border-right:1px solid rgba(226,216,196,.8); border-bottom:1px solid rgba(226,216,196,.8); }

  /* Drawing stage: a framed sheet of paper */
  .stage{ position:relative; touch-action:none; }
  #paper{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r);
    background:var(--cream);
    background-image:radial-gradient(rgba(52,48,42,.03) 1px, transparent 1px);
    background-size:20px 20px;
    box-shadow:inset 0 0 0 1px rgba(52,48,42,.05), var(--sh); }
  canvas#pad{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--r); }
  #ghost,#demo{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  /* --gw is nudged by invisible dynamic difficulty (more help when a
     child struggles, less when they're cruising). Never punishing. */
  /* pathLength=100 on every ghost path makes the dotted guide evenly
     spaced on tight curves AND long straights (arc-length normalized). */
  #ghost path{ fill:none; stroke:var(--ink); stroke-opacity:.16;
    stroke-width:var(--gw,26);
    stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:.55 3.6;
    transition:stroke .3s, stroke-opacity .3s, stroke-width .4s; }
  #ghost.help path{ stroke:var(--clay); stroke-opacity:.55; stroke-width:34; }
  #ghost.pen path{ stroke-width:var(--gw,15); stroke-dasharray:.5 2.4; stroke-opacity:.22; }
  #ghost.pen.help path{ stroke-width:20; }
  /* Pen-Live in-stroke nudge: the guide recedes when the child is tracking
     it well, and warms toward ochre when they have drifted off for a
     while. Silent, purely visual - a compass, never a scold. Placed last
     so it wins over the pen-mode opacity. */
  #ghost.gd-on path{ stroke-opacity:.07; }
  #ghost.gd-off path{ stroke:var(--ochre); stroke-opacity:.34; }

  /* Step progress */
  .prog{ height:8px; border-radius:999px; background:rgba(52,48,42,.10); overflow:hidden; }
  .prog > i{ display:block; height:100%; border-radius:999px; background:var(--sage);
    transition:width .5s cubic-bezier(.2,.7,.3,1); }

  /* Colour wells + brush chips */
  /* Colour wells - fat, easy targets for small fingers. The selected ring
     is kept tight so it never bleeds into a neighbour or off-screen. */
  .well{ width:clamp(62px,15vw,78px); height:clamp(62px,15vw,78px); border-radius:50%;
    box-shadow:var(--sh-sm), inset 0 0 0 3px rgba(255,255,255,.55);
    transition:transform .14s cubic-bezier(.2,.7,.3,1); position:relative; }
  .well.sel{ transform:scale(1.1); }
  .well.sel::after{ content:''; position:absolute; inset:-6px; border-radius:50%;
    border:3px solid var(--ink); opacity:.5; }
  .chip{ display:flex; align-items:center; justify-content:center; gap:9px;
    padding:13px 14px; border-radius:16px; min-height:54px;
    background:var(--surface-2); font-weight:800; box-shadow:var(--sh-sm);
    border:1px solid rgba(226,216,196,.8); }
  .chip.sel{ background:var(--ink); color:var(--cream); }
  .chip.sel svg{ stroke:var(--cream); }

  /* Reading answer feedback - a clear green ring on the right answer, a
     red ring + shake on a wrong tap; the letter inside stays readable. */
  .rc-ok{ box-shadow:0 0 0 5px var(--sage), var(--sh) !important; }
  .rc-no{ box-shadow:0 0 0 5px var(--rose), var(--sh) !important; animation:rcshake .4s ease; }
  @keyframes rcshake{ 0%,100%{transform:translateX(0)} 22%{transform:translateX(-9px)} 64%{transform:translateX(9px)} }
  body.calm .rc-no{ animation:none; }

  /* Switch */
  .sw{ width:58px; height:34px; border-radius:999px; background:rgba(52,48,42,.18);
    position:relative; transition:background .2s; flex:none; }
  .sw.on{ background:var(--sage); }
  .sw i{ position:absolute; top:4px; left:4px; width:26px; height:26px; border-radius:50%;
    background:#fff; box-shadow:var(--sh-sm); transition:transform .2s cubic-bezier(.2,.7,.3,1); }
  .sw.on i{ transform:translateX(24px); }

  /* .grid always lives inside a container-type wrap, so column count
     follows the content column width (not the window). */
  .grid{ display:grid; gap:14px; grid-template-columns:repeat(2,1fr); }
  @container (min-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @container (min-width:760px){ .grid{ grid-template-columns:repeat(4,1fr); } }
  .scroll{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .hidden{ display:none !important; }
  .caption{ background:rgba(52,48,42,.86); color:var(--cream);
    border-radius:14px; padding:9px 16px; font-weight:700; backdrop-filter:blur(6px); }
  .row{ display:flex; align-items:center; }
  .stack{ display:flex; flex-direction:column; }

  /* Evening warmth: from 18:00 to 06:00 the paper drifts a few points
     warmer and the ink softens slightly, so a tired child near bedtime
     isn't looking at a cool, high-contrast screen. Ambient, not a setting.
     Placed before .hc so high-contrast always wins. */
  body.evening{ --bg:#F1E5CB; --bg-2:#E9D8BB; --surface-2:#FCF3E2;
    --cream:#FCEFDC; --ink:#3E382E; }
  body.evening #paper{ background:var(--cream); }

  /* Accessibility modes */
  body.hc{ --bg:#000; --surface:#fff; --surface-2:#fff; --ink:#000; --ink-soft:#222;
    --line:#000; --cream:#fff; }
  body.hc{ background:#000; }
  body.hc #ghost path{ stroke:#000; stroke-opacity:.7; }
  body.hc .card,body.hc .btn{ border:2px solid #000; }
  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; transition:none !important; } }
</style>

<body>
<div id="app"></div>

<script>
"use strict";
/* =========================================================================
   SCRIBBLE HEROES - BUDDY'S STUDIO
   A process-over-product drawing experience for 1-3 year olds.

   Pedagogy embedded in code (2025-26 early-childhood research):
   • Process over product - we never block, grade, or correct. A quality
     read only scales how warm the celebration is; every child advances.
   • Descriptive praise - we narrate the marks the child actually made
     ("you drew a long curving line"), not empty hype. Calm, specific, warm.
   • Age-adaptive - brush size, forgiveness, pacing, language shift 1→3.
   • Growth mindset & neurodiversity - high-contrast, calm mode, slow clear
     voice, always-on captions, gentle motion, zero frustration.
   • Child-directed - open exploration inside every step; Buddy is kind.
   ========================================================================= */

/* ----- 0. Tiny DOM helpers --------------------------------------------- */
const $ = (s, r = document) => r.querySelector(s);
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const k in props) {
    if (k === "html") n.innerHTML = props[k];
    else if (k === "css") n.style.cssText = props[k];
    else if (k === "cls") n.className = props[k];
    else if (k in n) n[k] = props[k];
    else n.setAttribute(k, props[k]);
  }
  for (const c of [].concat(kids)) c != null && n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
};
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand = (a) => a[(Math.random() * a.length) | 0];
// Whole-year age from a birthdate, clamped to the app's 1-5 range.
const ageOf = (y, m, d) => {
  const n = new Date();
  let a = n.getFullYear() - y;
  if (n.getMonth() + 1 < m || (n.getMonth() + 1 === m && n.getDate() < d)) a--;
  return clamp(a, 1, 5);
};

/* ----- 1. Persistent state --------------------------------------------- */
/* Multi-profile storage. Each child has their own snapshot (name, age,
   language, stars, stickers, progress, streak) plus their own gallery.
   An index tracks which profiles exist and which is active. Legacy
   single-profile data is migrated into the first profile so NOTHING is
   lost. Settings are per-profile too, so a Spanish cousin can have ES
   while Lucy stays NL. */
const SAVE_KEY = "scribble-heroes-v2";          // legacy single-profile key
const IDX_KEY  = "scribble-heroes-idx";
const pKey = id => SAVE_KEY + "::" + id;
const genId = () => "p" + Date.now().toString(36) + ((Math.random() * 1e4) | 0).toString(36);
const defaultState = () => ({
  id: null, name: "", age: 2, onboarded: false, lang: "nl",
  caseMode: "upper", drawDiff: 1, writeDiff: 1, sayName: "", worldSeenStars: 0,
  readBox: {}, readIntro: 1, readProd: {},
  stars: 0, stickers: [], completed: {}, streak: 0, lastPlay: "", buddyLevel: 1,
  settings: { muted: false, voice: true, slowVoice: false,
    sound: true, haptics: true, contrast: false, calm: false,
    foundations: false },
});
function loadIdx() {
  try { const i = JSON.parse(localStorage.getItem(IDX_KEY)); if (i && i.ids) return i; } catch {}
  return null;
}
const saveIdx = i => localStorage.setItem(IDX_KEY, JSON.stringify(i));
function readProfile(id) {
  try {
    const r = JSON.parse(localStorage.getItem(pKey(id)));
    if (!r) return null;
    const s = Object.assign(defaultState(), r,
      { settings: Object.assign(defaultState().settings, r.settings || {}) });
    s.id = id; return s;
  } catch { return null; }
}
let S = load();
function load() {
  let idx = loadIdx();
  if (!idx) {
    // First run with this version: migrate any legacy single profile.
    let legacy = null;
    try { legacy = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch {}
    if (legacy && legacy.onboarded) {
      const id = genId();
      legacy.id = id;
      localStorage.setItem(pKey(id), JSON.stringify(legacy));
      idx = { active: id, ids: [id], legacyPid: id };
    } else {
      idx = { active: null, ids: [], legacyPid: null };
    }
    saveIdx(idx);
  }
  if (idx.active) {
    const s = readProfile(idx.active);
    if (s) return s;
  }
  return defaultState(); // no profile yet -> Splash
}
function save() {
  if (!S.id) return;
  localStorage.setItem(pKey(S.id), JSON.stringify(S));
  const idx = loadIdx() || { active: S.id, ids: [], legacyPid: null };
  if (!idx.ids.includes(S.id)) idx.ids.push(S.id);
  idx.active = S.id;
  saveIdx(idx);
}
// Lightweight list for the picker (id, name, age) read from snapshots.
function profileList() {
  const idx = loadIdx(); if (!idx) return [];
  return idx.ids.map(id => {
    const s = readProfile(id);
    return s ? { id, name: s.name, age: s.age } : null;
  }).filter(Boolean);
}
// Create a profile (or switch to an existing one with the same name).
function createProfile(name, age, lang) {
  const existing = profileList().find(p => p.name.toLowerCase() === name.toLowerCase());
  if (existing) { switchProfile(existing.id); return; }
  const fresh = defaultState();
  fresh.id = genId(); fresh.name = name; fresh.age = age;
  fresh.onboarded = true; fresh.lang = lang || S.lang || "nl";
  S = fresh; save();
}
function switchProfile(id) {
  const s = readProfile(id); if (!s) return;
  S = s;
  const idx = loadIdx(); idx.active = id; saveIdx(idx);
  _greeted = false;            // new child gets their own greeting once
  applyFlags(); go("home");
}
async function deleteProfile(id) {
  const idx = loadIdx(); if (!idx) return;
  idx.ids = idx.ids.filter(x => x !== id);
  localStorage.removeItem(pKey(id));
  // Remove that child's gallery art too.
  try { (await galleryAll(id)).forEach(r => galleryDel(r.id)); } catch {}
  if (idx.active === id) idx.active = idx.ids[0] || null;
  saveIdx(idx);
  if (idx.active) { S = readProfile(idx.active) || defaultState(); applyFlags(); go("home"); }
  else { S = defaultState(); Splash(); }
}
function touchStreak() {
  const today = new Date().toDateString();

/* ----- 3. Sound (Web Audio) - soft, musical, never jarring ------------- */
const Sound = (() => {
  let ac, master, mGain, mTimer;
  const ensure = () => { if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    master = ac.createGain(); master.gain.value = .42; master.connect(ac.destination);
    mGain = ac.createGain(); mGain.gain.value = 0; mGain.connect(master); };
  const tone = (f, dur = .18, type = "sine", vol = .4, slide = 0) => {
    if (S.settings.muted || !S.settings.sound) return;
    ensure(); if (ac.state === "suspended") ac.resume();
    const o = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 2600;
    o.type = type; o.frequency.value = f;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(50, f + slide), ac.currentTime + dur);
    g.gain.setValueAtTime(.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(vol, ac.currentTime + .03);
    g.gain.exponentialRampToValueAtTime(.0001, ac.currentTime + dur);
    o.connect(lp); lp.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime + dur + .03);
  };
  const seq = (ns, gap = .14) => ns.forEach((n, i) => setTimeout(() => tone(n, .26, "sine", .38), i * gap * 1000));
  // Warm, restrained palette - gentle marimba-ish tones, no arcade beeps.
  const fx = {
    tap:     () => tone(440, .12, "sine", .26),
    stroke:  () => tone(300 + Math.random() * 90, .14, "sine", .20),
    step:    () => seq([523, 659, 784]),
    soft:    () => seq([392, 523], .16),
    win:     () => seq([523, 659, 784, 988], .15),
    sticker: () => seq([659, 784, 988], .14),
  };
  return { fx, ensure };
})();

/* ----- 4. Voice - calm, warm, natural; descriptive not manic ----------- */
// BCP-47 tag for the current language (used by both voices).
const LANG_TAG = { nl: "nl-NL", en: "en-US", es: "es-ES" };
const langTag = () => LANG_TAG[LC()] || "en-US";
// Pick the best device voice for the CURRENT language (fallback when the
// realistic OpenAI voice is unavailable). Recomputed per utterance so it
// follows a language change immediately.
function deviceVoice() {
  if (!("speechSynthesis" in window)) return null;
  const v = speechSynthesis.getVoices(), pre = LC();
  const byLang = v.filter(x => x.lang && x.lang.toLowerCase().startsWith(pre));
  return (
    byLang.find(x => /natural|enhanced|premium|google|siri/i.test(x.name)) ||
    byLang.find(x => /female|vrouw|mujer/i.test(x.name)) ||
    byLang[0] ||
    v.find(x => x.lang && x.lang.startsWith("en")) || v[0] || null
  );
}
if ("speechSynthesis" in window) { speechSynthesis.onvoiceschanged = () => {}; }
// Subtitles removed - the children can't read yet, so Buddy only speaks.
// ---- Realistic neural voice (OpenAI gpt-4o-mini-tts) -------------------
// The key NEVER lives here. Requests go to a tiny serverless proxy that
// holds the key as a secret (see /tts-worker). When no proxy is set, or
// we're offline, or it fails, we fall back to the device voice so the
// app always talks and stays fully usable offline. Each unique phrase is
// cached, so it's spoken once then replays free and offline forever.
const TTS_PROXY_URL = "https://scribble-tts.donny-idzerda.workers.dev";
const ttsUrl = () => { try { return localStorage.getItem("tts_url") || TTS_PROXY_URL; } catch { return TTS_PROXY_URL; } };

// started inside a real user gesture. We unlock ONE shared element on the
// first tap; afterwards Buddy's realistic voice plays freely. Without this
// the realistic audio silently fails and you only ever hear the robotic
// device fallback - which is exactly the "robot voice in Safari" problem.
function unlockAudio() {
  if (_ttsUnlocked) return;
  try {
    _ttsEl = _ttsEl || new Audio();
    _ttsEl.playsInline = true; _ttsEl.preload = "auto";
    _ttsEl.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
    const p = _ttsEl.play();
    if (p && p.then) p.then(() => { try { _ttsEl.pause(); } catch {} _ttsUnlocked = true; }).catch(() => {});
    else _ttsUnlocked = true;

// when it says a specific word wrong, respell it here PHONETICALLY for the
// current language and it will be spoken (and cached) correctly. Tune by
// ear on a real device. Word-boundary, case-insensitive. Example:
//   nl: { "tas": "tas" }   // (respell only if a word is actually wrong)
const PRONOUNCE = { nl: {}, en: {}, es: {} };
function applyPronounce(text) {
  const map = PRONOUNCE[LC()];
  if (!map) return text;
  return text.replace(/[A-Za-zÀ-ÿ]+/g, w => {
    const hit = map[w.toLowerCase()];
    return hit === undefined ? w : hit;

async function realisticSpeak(text, teach) {
  const base = ttsUrl();
  if (!base || !("caches" in window)) return false;
  try {
    text = applyPronounce(text);
    const key = base.replace(/\/$/, "") + "/tts?s=" + (S.settings.slowVoice ? 1 : 0) +
      "&m=" + (teach ? "teach" : "chat") +
      "&l=" + LC() + "&t=" + encodeURIComponent(text);
    _ttsCache = _ttsCache || await caches.open("tts-v6");
    let res = await _ttsCache.match(key);
    if (!res) {

      // must keep playing offline (the whole point of caching it).
      if (!navigator.onLine) return false;
      res = await fetch(key, { mode: "cors" });
      if (!res.ok) return false;
      try { await _ttsCache.put(key, res.clone()); } catch {}
    }
    if (_ttsObj) try { URL.revokeObjectURL(_ttsObj); } catch {}
    _ttsObj = URL.createObjectURL(await res.blob());

    _ttsEl.playsInline = true; _ttsEl.volume = .95;
    try { _ttsEl.pause(); } catch {}
    _ttsEl.src = _ttsObj;
    await _ttsEl.play(); // throws if still blocked → caller falls back to device
    return true;
  } catch { return false; }
}

  if (!("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    // Warm and natural: gentle pace, near-natural pitch (no chipmunk).
    u.rate = S.settings.slowVoice ? .74 : .9;
    u.pitch = 1.06;
    u.volume = .95;
    u.lang = langTag();
    const dv = deviceVoice(); if (dv) u.voice = dv;
    speechSynthesis.speak(u);
  } catch {}
}

// voice (letter sounds, words, blending); teach=false (default) uses
// Buddy's warm everyday voice.
function speak(text, teach) {
  if (S.settings.muted || !S.settings.voice) return;
  // Spoken-name override: the display name stays (e.g. "Lucy") but the
  // voice says the parent's phonetic spelling (e.g. "Loesie") so names
  // are pronounced correctly in the chosen language.
  if (S.sayName && S.name) text = text.split(S.name).join(S.sayName);
  try { speechSynthesis.cancel(); } catch {}
  if (_ttsEl) try { _ttsEl.pause(); } catch {}
  // Try the realistic voice first; gracefully fall back to the device voice.
  realisticSpeak(text, teach).then(ok => { if (!ok) deviceSpeak(text); });
}

// Real parent gate: a tiny sum a toddler cannot answer. Resolves cb() on
// success; used for Settings, "5 more minutes", and reset.
function parentGate(onPass) {
  const a = 2 + ((Math.random() * 7) | 0), b = 3 + ((Math.random() * 6) | 0);
  const ov = el("div", { css: "position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.55);backdrop-filter:blur(4px);padding:24px" });
  const card = el("div", { cls: "card", css: "background:var(--surface);padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:14px;text-align:center" });
  card.append(
    el("div", { cls: "t-title", textContent: t("pgTitle") }),
    el("div", { cls: "t-head", textContent: t("pgQ")(a, b) }));
  const opts = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap;justify-content:center" });
  const answers = new Set([a + b]);
  while (answers.size < 4) answers.add(a + b + (((Math.random() * 9) | 0) - 4) || 1);
  [...answers].sort(() => Math.random() - .5).forEach(n => {
    const x = el("button", { cls: "btn btn-quiet t-head", css: "min-width:64px", textContent: n });
    x.onclick = () => {
      if (n === a + b) { ov.remove(); onPass(); }
      else { Sound.fx.soft(); x.style.background = "var(--clay)"; x.style.color = "#fff"; }
    };
    opts.append(x);
  });
  const cancel = el("button", { cls: "btn", css: "background:var(--surface-2)", textContent: t("cancel") });
  cancel.onclick = () => ov.remove();
  card.append(opts, cancel);
  ov.append(card); APP.append(ov);
}

// Profile picker: children tap their own name to switch (no data lost);
// adding / deleting a child is parent-gated.
function ProfilePicker() {
  const list = profileList();
  const ov = el("div", { css: "position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.55);backdrop-filter:blur(4px);padding:24px" });
  const card = el("div", { cls: "card", css: "background:var(--surface);padding:22px;width:min(460px,92vw);display:flex;flex-direction:column;gap:12px;max-height:86vh;overflow:auto" });
  card.append(el("div", { cls: "t-title", css: "text-align:center", textContent: t("whoPlaying") }));
  list.forEach(p => {
    const active = p.id === S.id;
    const row = el("div", { css: `display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:18px;border:2px solid ${active ? "var(--clay)" : "var(--line)"};background:var(--surface-2)` });
    const pick = el("button", { css: "flex:1;display:flex;align-items:center;gap:12px;text-align:left;background:none",
      html: `<span style="background:var(--surface);border-radius:14px;padding:4px">${Buddy("warm", 44)}</span>
             <span><span class="t-head">${p.name}</span><br><span class="t-body muted">${t("ageWord") || "Age"} ${p.age}</span></span>` });
    pick.onclick = () => { Sound.fx.tap(); buzz(12); ov.remove(); if (p.id !== S.id) switchProfile(p.id); };
    row.append(pick);
    if (list.length > 1) {
      const del = el("button", { cls: "btn btn-quiet btn-icon", html: ic("eraser", 18) });
      del.onclick = () => parentGate(() => {
        if (confirm(t("delConfirm")(p.name))) { ov.remove(); deleteProfile(p.id); }
      });
      row.append(del);
    }
    card.append(row);
  });
  const add = el("button", { cls: "btn btn-go t-head", html: ic("next", 20, "#fff") + `<span>${t("addChild")}</span>` });
  add.onclick = () => parentGate(() => { ov.remove(); _adding = true; Splash(); });
  const close = el("button", { cls: "btn", css: "background:var(--surface-2)", textContent: t("cancel") });
  close.onclick = () => ov.remove();
  card.append(add, close);
  ov.append(card); APP.append(ov);
}

/* ----- 8b. Letters with Buddy - early handwriting practice -------------
   Simple "ball & stick" manuscript letters Lucy can trace, exactly like
   copying Papa's writing on paper. Each glyph is drawn through a mapper P
   so it scales/positions anywhere; reuses the same ghost + demo + gentle
   scoring as the drawings. Local box: x 0..adv, y 0..100, ascender top
   y8, x-height top y38, baseline y78, descender bottom y98.
   To add a word: add the letters it needs to GLYPH, then push it to WORDS. */
const _ln = (P, x1, y1, x2, y2) => `M ${P.x(x1)} ${P.y(y1)} L ${P.x(x2)} ${P.y(y2)}`;
const _cir = (P, cx, cy, r) => C(P.x(cx), P.y(cy), r * P.s);
// Ellipse as a path (for round caps that need optical overshoot).
const _ell = (P, cx, cy, rx, ry) => {
  const X = P.x(cx), Y = P.y(cy), a = rx * P.s, b = ry * P.s;
  return `M ${X - a} ${Y} a ${a} ${b} 0 1 0 ${2 * a} 0 a ${a} ${b} 0 1 0 ${-2 * a} 0`;
};

// centring + metric scaling), d = strokes drawn through mapper P.
// UPPERCASE letterforms - research-backed: young children learn capital
// letters first (simple straight lines and single curves, all the same
// height, no tricky ascenders/descenders). Each glyph sits between cap
// top y8 and baseline y78. b = used bounds for centring/scaling.

// Active glyph table + word casing follow the per-profile setting.
const glyphSet = () => S.caseMode === "lower" ? LOWER : GLYPH;
const wordChars = w => [...(S.caseMode === "lower" ? w.toLowerCase() : w.toUpperCase())];

// The words Lucy already practises with Papa, plus the children's names.
const WORDS = ["mama", "papa", "oma", "opa", "Lucy", "Josh"];

// Place a glyph at a common baseline with a consistent pen scale `s`
// (x-height letters stay shorter than tall ones - just like real
// handwriting practice on paper). Centred horizontally on `cx`.
const placeGlyph = (g, s, baseY, cx) => {
  const oy = baseY - 78 * s;            // local baseline y78 → world baseY
  const ox = cx - ((g.b[0] + g.b[2]) / 2) * s;
  return { s, x: lx => ox + lx * s, y: ly => oy + ly * s };
};

// One big centred trace step for a single glyph char.
function glyphStep(ch) {
  const G = glyphSet(), g = G[ch];
  return { _c: ch, icon: "write", tip: `Letter ${ch}`,
    say: `Trace ${ch}.`, d: g.d(placeGlyph(g, 7.2, 720, 500)) };
}
// Built fresh each open so it follows the caps/abc setting.
function letterSteps(word) {
  const G = glyphSet(), chars = wordChars(word);
  const steps = chars.map(glyphStep);
  const gap = 10;
  const wl = chars.reduce((a, c) => a + (G[c].b[2] - G[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(7.2, 860 / wl);
  let x = 500 - (wl * s) / 2; const all = [];
  chars.forEach(c => {
    const g = G[c], oy = 560 - 78 * s, ox = x - g.b[0] * s;
    all.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  steps.push({ _w: word, icon: "write", tip: "The whole word",
    say: `Now the whole word: ${word}.`, d: all });
  return steps;
}

// Small preview of a word in the same letterforms (cards, stickers, win).
function wordArt(word, size) {
  const G = glyphSet();
  const chars = wordChars(word).filter(c => G[c]);
  const gap = 6;
  const wl = chars.reduce((a, c) => a + (G[c].b[2] - G[c].b[0]), 0) + gap * (chars.length - 1);
  const s = Math.min(0.92, 86 / wl);
  const y0 = Math.min(...chars.map(c => G[c].b[1]));
  const y1 = Math.max(...chars.map(c => G[c].b[3]));
  const oy = 50 - ((y0 + y1) / 2) * s;
  let x = 50 - (wl * s) / 2; const paths = [];
  chars.forEach(c => {
    const g = G[c], ox = x - g.b[0] * s;
    paths.push(...g.d({ s, x: lx => ox + lx * s, y: ly => oy + ly * s }));
    x += (g.b[2] - g.b[0] + gap) * s;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${
    paths.map(d => `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>`).join("")
  }</svg>`;
}
// Small preview for a single shape (cards/stickers/win).
function shapeArt(key, size) {
  const g = SHAPES[key]; const s = Math.min(0.9, 84 / (g.b[2] - g.b[0]));
  const ox = 50 - ((g.b[0] + g.b[2]) / 2) * s, oy = 50 - ((g.b[1] + g.b[3]) / 2) * s;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${

      `<path d="${d}" fill="none" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`).join("")
  }</svg>`;
}

      say: `Trace the number ${d}.`, d: GLYPH[d].d(P) };

    const gap = 12;
    const wl = ds.reduce((a, c) => a + (GLYPH[c].b[2] - GLYPH[c].b[0]), 0) + gap * (ds.length - 1);
    const s = Math.min(7.2, 700 / wl); let x = 500 - (wl * s) / 2; const all = [];
    ds.forEach(c => { const g = GLYPH[c], oy = 560 - 78 * s, ox = x - g.b[0] * s;

  en:{ sounds:["s","a","t","p","i","n","m","d","g","o","c","k","e","u","r","h","b","f","l",

const RD = () => READING[LC()] || READING.en;

// retrieval needs the practice spread across separate sessions.

  // Echo: one active-production item per session, for a taught sound that
  // has had the least production practice. Receptive picks alone overstate
  // mastery; saying the sound aloud is what anchors the letter-sound link.
  const taught = intro.filter(c => rdBox("s:" + c) >= 1);
  if (taught.length) {
    const byProd = [...taught].sort((a, b) =>
      ((S.readProd && S.readProd[a]) || 0) - ((S.readProd && S.readProd[b]) || 0) || Math.random() - .5);
    items.push({ t: "echo", s: byProd[0] });

  const bySound = [...intro].sort((a, b) => rdBox("s:" + a) - rdBox("s:" + b) || Math.random() - .5);
  for (let i = 0; i < 5; i++) items.push({ t: "pick", s: bySound[i % bySound.length] });

    // read it aloud. The least-practised words come first.

  }
  function showItem() {
    const it = session[i];
    busy = false;
    choices.innerHTML = ""; choices.style.pointerEvents = "auto";
    if (it.t === "echo") { echoItem(it); return; }
    if (it.t === "decode") { decodeItem(it); return; }
    if (it.t === "teach") {
      const L = it.s.toUpperCase();
      promptEl.textContent = t("readListen");
      showEl.innerHTML = lowerArt(it.s, 120);
      const say = () => speak(phonics(L).say, true);
      replay.onclick = () => { Sound.fx.tap(); say(); };
      const go2 = el("button", { cls: "btn btn-go", css: "min-width:120px", html: ic("next", 20, "#fff") + `<span>${t("readNext")}</span>` });
      go2.onclick = () => {
        if (busy) return;
        busy = true;
        Sound.fx.tap(); buzz(12); rdBump("s:" + it.s, true); i++;
        prog.firstChild.style.width = (i / session.length) * 100 + "%";
        i >= session.length ? finish() : showItem(); };
      choices.append(go2);
      buddySay("happy", phonics(L).say, true);
    } else if (it.t === "pick") {
      const L = it.s.toUpperCase();
      promptEl.textContent = t("readWhichLetter");
      showEl.innerHTML = "";
      const say = () => speak(phonics(L).say, true);
      replay.onclick = () => { Sound.fx.tap(); say(); };
      const opts = [it.s, ...distract(RD().sounds, it.s, 2)].sort(() => Math.random() - .5);
      const tiles = {};
      opts.forEach(o => {
        const b = tile(lowerArt(o, 70), () => {
          if (busy) return;
          if (o === it.s) { b.classList.add("rc-ok"); resolve(true, "s:" + it.s); }
          else {
            b.classList.add("rc-no");
            if (tiles[it.s]) tiles[it.s].classList.add("rc-ok");   // show the right one
            buddySay("warm", phonics(L).say, true);
            resolve(false, "s:" + it.s);
          }
        });
        tiles[o] = b; choices.append(b);
      });
      setTimeout(say, 250);
      buddySay("happy", "");
    }
  }
  function finish() {
    if (finished) return;          // one session-end only
    finished = true;
    rdAdvance();
    S.stars += 1; if (S.stars > S.buddyLevel * 8) S.buddyLevel++;
    save();
    stage.innerHTML = "";
    stage.append(el("div", { cls: "t-display", textContent: t("winTitle")(S.name) }));
    const again = el("button", { cls: "btn btn-go t-head", html: ic("next", 22, "#fff") + `<span>${t("readMore")}</span>` });
    again.onclick = () => { Sound.fx.tap(); go("read"); };
    const home = el("button", { cls: "btn btn-quiet t-head", html: ic("home", 20) + `<span>${t("home")}</span>` });
    home.onclick = () => { Sound.fx.tap(); go("home"); };
    const row = el("div", { css: "display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px" });
    row.append(again, home); stage.append(row);
    Sound.fx.win(); buzz([20, 40, 20]); burst(.8);
    speak(rnd("praiseOk"));
  }
  showItem();
}

// Parent dashboard: visualize per-sound and per-word mastery, suggest a
// concrete next step. Lives inside Settings (already parent-gated).
function readingDashboard() {
  const sounds = RD().sounds, intro = S.readIntro, active = sounds[intro - 1];
  const card = el("div", { cls: "card", css: "padding:18px;display:flex;flex-direction:column;gap:12px" });
  card.append(el("div", { cls: "t-head", textContent: t("rdProgressTitle") }));

  // Summary numbers
  const masteredS = sounds.slice(0, intro).filter(c => rdBox("s:" + c) >= 3).length;
  const words = RD().words.filter(wd => [...wd].every(c => sounds.slice(0, intro).includes(c)));
  const wRead = words.filter(wd => rdBox("w:" + wd) >= 1).length;
  const wMast = words.filter(wd => rdBox("w:" + wd) >= 2).length;
  const sum = el("div", { cls: "t-body", css: "color:var(--ink-soft);font-size:14px",
    textContent: t("rdSummary")(intro, sounds.length, masteredS, wRead, wMast) });
  card.append(sum);

  // Sound grid
  card.append(el("div", { cls: "t-label", textContent: t("rdSoundsLabel") }));
  const grid = el("div", { css: "display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:10px" });
  sounds.forEach((c, i) => {
    const locked = i >= intro;
    const box = rdBox("s:" + c);
    const pct = locked ? 0 : Math.min(5, box) / 5 * 100;
    const isActive = !locked && c === active;
    const produced = !locked && ((S.readProd && S.readProd[c]) || 0) > 0;
    const cell = el("div", { css: `position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;border-radius:10px;background:${locked ? "var(--surface-2)" : "var(--surface)"};border:2px solid ${isActive ? "var(--clay)" : "var(--line)"};${locked ? "opacity:.45" : ""}` });
    // A small plum mic badge marks sounds the child has said aloud (Echo).
    cell.innerHTML =
      (produced ? `<span style="position:absolute;top:3px;right:3px;background:var(--plum);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center">${ic("mic", 11, "#fff")}</span>` : "") +
      `<div style="height:36px;display:flex;align-items:center;justify-content:center">${lowerArt(c, 32)}</div>
       <div style="height:5px;width:100%;background:rgba(52,48,42,.12);border-radius:99px;overflow:hidden">
         <i style="display:block;height:100%;width:${pct}%;background:${box >= 3 ? "var(--sage)" : "var(--ochre)"}"></i></div>`;
    grid.append(cell);
  });
  card.append(grid);

  // Word counters
  card.append(el("div", { cls: "t-body", css: "font-size:14px",
    textContent: `${t("rdWords")}: ${wMast} / ${words.length}  ·  ${t("rdWordsRead")}: ${wRead}` }));

  // Next-step suggestion + CTA
  let suggest;
  if (active && rdBox("s:" + active) < 2) suggest = t("rdSuggestSound")(active);
  else {
    const wob = words.find(wd => rdBox("w:" + wd) < 1);
    if (wob) suggest = t("rdSuggestRead")(wob);
    else suggest = intro < sounds.length ? t("rdSuggestNext") : t("rdSuggestDone");
  }
  card.append(el("div", { cls: "t-body", css: "padding:10px 12px;background:var(--surface-2);border-radius:12px",
    textContent: suggest }));
  const cta = el("button", { cls: "btn btn-go", css: "align-self:flex-start",
    html: ic("play", 18, "#fff") + `<span>${t("rdStartBtn")}</span>` });
  cta.onclick = () => { Sound.fx.tap(); buzz(14); go("read"); };
  card.append(cta);
  return card;
}

// Buddy's pick for the next writing lesson: the least-practised letter
// (fewest stars), in A-Z order. Gives the child one obvious tap instead
// of choosing from the whole alphabet.
function nextWriteLesson() {
  let best = "abc_" + ABC[0], least = Infinity;
  for (const L of ABC) {
    const id = "abc_" + L, st = S.completed[id] || 0;
    if (st < least) { least = st; best = id; }
  }
  return best;
}

      css: "padding:22px 24px;display:flex;align-items:center;gap:18px;background:var(--sage);color:#fff;width:100%;margin:4px 0 16px;min-height:118px" });
    hero.innerHTML =

       <div class="t-body" style="opacity:.92;margin-top:2px">${t("writeHeroSub")}</div></div>
       <div style="background:rgba(255,255,255,.2);border-radius:50%;padding:12px;display:inline-flex">${ic("next", 26, "#fff")}</div>`;

      css: "padding:18px;display:flex;align-items:center;gap:14px;background:var(--surface);width:100%;margin-bottom:4px" });
    fd.innerHTML = `<div style="background:var(--surface-2);border-radius:16px;padding:12px">${ic("brush", 26, "var(--clay)")}</div><div class="t-head">${t("freeTitle")}</div>`;
    fd.onclick = () => { Sound.fx.tap(); buzz(14); go("free"); };

  }
  CATEGORIES.filter(c => CAT_GROUP[c.id] === mode).forEach(cat => {
    const items = DRAWINGS.filter(d => d.category === cat.id);
    if (!items.length) return;
    wrap.append(el("div", { cls: "t-label", css: "margin:18px 4px 10px", textContent: catName(cat.id) }));
    const grid = el("div", { cls: "grid" });
    const tint = mode === "write" ? "var(--sage-soft)" : "var(--clay-soft)";
    items.forEach(d => {
      const stars = S.completed[d.id];
      const c = el("button", { cls: "card pop",
        css: `padding:18px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;background:${tint}` });
      c.innerHTML =
        `<div style="background:var(--surface);border-radius:20px;padding:14px;box-shadow:var(--sh-sm)">${ART(d.id, 76)}</div>
         <div class="t-head">${drawName(d)}</div>` +
        (stars ? `<div style="position:absolute;top:12px;right:12px;display:flex;gap:2px">${
          Array.from({ length: stars }, () => ic("star", 16, "var(--ochre)")).join("")}</div>` : "");
      c.onclick = () => { Sound.fx.tap(); buzz(14); go("draw", d.id); };
      grid.append(c);
    });
    wrap.append(grid);
  });
  s.append(wrap, nav("home"));
  APP.append(s);
}

// Landscape 2-column layout: applied AFTER the portrait DOM is built so
// portrait is byte-identical. Re-parents the controls into a right scroll
// column and lets the canvas take the left full-height. Inline styles
// only, so nothing fights .sw, the cascade, or existing inline styles.
// Landscape 2-col kicks in when the APP BOX (not the window) is clearly
// wide and landscape - the 1.15 margin keeps a near-square box (e.g. the
// desktop device panel) in the calmer single-column portrait layout.
const isLand = () => APP && APP.clientWidth >= 740 && APP.clientWidth > APP.clientHeight * 1.15;
function applyLandscape(s, sw, stage) {
  if (!isLand()) return;
  s.style.flexDirection = "row";
  s.style.alignItems = "stretch";
  // Stage fills the column width and its height follows aspect-ratio - this
  // stops the stage's intrinsic min-height (= sw height) from blowing the
  // flex item past its basis.
  sw.style.flex = "0 0 58%";
  sw.style.minWidth = "0";
  sw.style.height = "100%";
  sw.style.padding = "8px";
  stage.style.height = "auto";
  stage.style.width = "100%";
  stage.style.maxWidth = "100%";
  stage.style.maxHeight = "100%";
  stage.style.margin = "auto";
  // Right column scrolls; bottom padding clears any absolute nav bar.
  const rcol = el("div", { cls: "rcol",
    css: "flex:1 1 42%;min-width:0;height:100%;overflow-y:auto;display:flex;flex-direction:column;padding:8px 12px calc(96px + env(safe-area-inset-bottom))" });
  [...s.children].forEach(ch => {
    if (ch !== sw && !ch.classList.contains("navbar")) rcol.append(ch);
  });
  s.append(sw, rcol);
  // Force flex children inside rcol to shrink to the column width so the
  // FreeDraw action buttons (Undo/Clear/Save) don't overflow horizontally.

/* ----- 12. Drawing engine (canvas, brushes, ghost, scoring) ------------ */
// A bright crayon-box for the child to draw with - vivid and saturated
// (the calm, muted palette stays for the app's backdrop and chrome).
const COLORS = ["#E5392B", "#F2851C", "#F4BE2C", "#54A63F", "#2C90C8", "#9054B5"];
const AGE = {
  1: { brush: 36, tol: 150, pass: .10, oneStep: true },
  2: { brush: 28, tol: 112, pass: .18, oneStep: false },
  3: { brush: 22, tol: 80,  pass: .30, oneStep: false },
  4: { brush: 18, tol: 64,  pass: .38, oneStep: false },
  5: { brush: 14, tol: 52,  pass: .45, oneStep: false },

    const prev = (size && cv.width) ? ctx.getImageData(0, 0, cv.width, cv.height) : null;

    if (prev) ctx.putImageData(prev, 0, 0);

    // out slightly non-square (aspect-ratio vs the max-width cap), which
    // would stretch the square canvas onto a non-square CSS box - making
    // strokes thicker one way than the other, distorting circles, and
    // looking different on every device. A pinned square fixes all of it.
    const px = size + "px";
    for (const e of [paper, cv, ghost, demo]) {
      e.style.width = px; e.style.height = px;
      e.style.left = "50%"; e.style.top = "50%";
      e.style.right = "auto"; e.style.bottom = "auto";
      e.style.transform = "translate(-50%,-50%)";

  }
  new ResizeObserver(resize).observe(stage); resize();
  const L2P = v => (v / 1000) * size;
  // Brush sizes are tuned for a 560px reference canvas; scale to the
  // actual canvas so strokes look right on small phones (not huge).
  const REF = 560;

  const st = { color: COLORS[0], brush: "crayon", down: false, pts: [], strokes: 0,
    mode: "draw", stamp: "star" };
  function style() {
    ctx.strokeStyle = st.color;
    const k = size / REF;

    // normal painting. Always reset compositing so a draw after an erase
    // strokes normally.
    ctx.globalCompositeOperation = st.mode === "erase" ? "destination-out" : "source-over";
    if (st.mode === "erase") {
      ctx.lineWidth = Math.max(8, cfg.brush * k * 1.6);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    } else if (st.brush === "pen") {
      // Fine, even line for letter tracing (no texture, no glow).
      ctx.lineWidth = Math.max(3, 9.5 * k);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    } else {
      ctx.lineWidth = Math.max(4, cfg.brush * k * (st.brush === "marker" ? 1.08 : 1));

      ctx.beginPath();

  function curve(p) {
    style(); ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y);

    const px = Math.round(pt.x * DPR), py = Math.round(pt.y * DPR);

    const at = (x, y) => (y * W + x) * 4;
    const s0 = at(px, py), tr = d[s0], tg = d[s0 + 1], tb = d[s0 + 2], ta = d[s0 + 3];
    const [fr, fg, fb] = hexRGB(st.color);

      seen[id] = 1; d[o] = fr; d[o + 1] = fg; d[o + 2] = fb; d[o + 3] = 255;
      st2.push(x + 1, y, x - 1, y, x, y + 1, x, y - 1);

  }

  cv.addEventListener("pointerdown", e => {
    const p = xy(e);

    if (st.mode === "stamp") { snap(); placeStamp(p); return; }

  // point to cached ghost samples. Tracking well -> guide recedes; drifted
  // off for >800ms -> guide warms. Silent. Skipped when there's no ghost.
  // Ghost samples are stored in viewBox units (0..1000), so they stay
  // valid even when setGhost runs before the canvas has been sized. The
  // child's point is converted into the same space at compare time.
  let _ghostPts = [], _lastLive = 0, _offSince = 0;

    if (!_ghostPts.length || !st.pts.length || !size) return;

    _lastLive = now;
    const raw = st.pts[st.pts.length - 1];
    const p = { x: raw.x / size * 1000, y: raw.y / size * 1000 };  // -> viewBox

       <path d="M64 -88 L80 -100" stroke="var(--plum)" stroke-width="21" stroke-linecap="round"/>

    if (!gp.length) return 1;

    // getImageData throw and could leave the step stuck. Never block.

  // restores exactly the previous state (cap at 6 to keep memory bounded).

    o.width = cv.width; o.height = cv.height; const c = o.getContext("2d");
    c.fillStyle = "#FBF3E7"; c.fillRect(0, 0, o.width, o.height); c.drawImage(cv, 0, 0);
    return new Promise(r => o.toBlob(r, "image/png")); };

           get strokes() { return st.strokes; } };
}

function toolbar(engine, opts = {}) {
  // One centred panel of a fixed width so every row lines up.
  const bar = el("div", { css: "display:flex;flex-direction:column;gap:12px;width:100%;max-width:460px;margin:0 auto;padding:6px 16px" });
  // Colours - 3x2 grid.
  const cols = el("div", { css: "display:grid;grid-template-columns:repeat(3,1fr);gap:14px;justify-items:center" });
  COLORS.forEach((c, i) => {
    const b = el("button", { cls: "well" + (i === 0 ? " sel" : ""), css: `background:${c}` });
    b.onclick = () => { engine.st.color = c; Sound.fx.tap(); buzz(12);
      [...cols.children].forEach(x => x.classList.remove("sel")); b.classList.add("sel"); };
    cols.append(b);
  });
  // Brushes - 3 equal columns, so they never look ragged.
  const br = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px" });
  [["crayon", t("toolCrayon"), "brush"], ["marker", t("toolMarker"), "write"], ["glow", t("toolGlow"), "star"]].forEach(([k, label, icon], i) => {
    const b = el("button", { cls: "chip" + (i === 0 ? " sel" : ""),
      html: ic(icon, 18, i === 0 ? "var(--cream)" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { engine.st.brush = k; Sound.fx.tap(); buzz(12);
      [...br.children].forEach(x => { x.classList.remove("sel"); x.querySelector("svg").setAttribute("stroke", "var(--ink)"); });
      b.classList.add("sel"); b.querySelector("svg").setAttribute("stroke", "var(--cream)"); };
    br.append(b);
  });
  // Writing mode uses a single fine pen, so the brush chips are hidden.
  bar.append(cols);
  if (opts.brushes !== false) bar.append(br);
  return bar;
}

/* ----- 13. Guided drawing ---------------------------------------------- */
function DrawScreen(id) {
  const D = DRAWINGS.find(d => d.id === id) || DRAWINGS[0];
  const built = D.build ? D.build() : D.steps;
  const steps = (AGE[S.age].oneStep && !D.pen)
    ? built.slice(0, Math.min(2, built.length)) : built;
  let i = 0, busy = false;        // lock against double-tapped Next
  const s = el("div", { cls: "screen" });

  const head = el("div", { css: "display:flex;align-items:center;gap:10px;padding:12px 16px 2px" });
  const back = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  back.onclick = () => { Sound.fx.tap(); go("home"); };
  head.append(back,
    el("div", { css: "flex:1", html: `<div class="t-title">${drawName(D)}</div>` }),
    muteBtn(),
    el("div", { id: "buddy", "data-size": 44, html: Buddy("happy", 44) }));
  s.append(head);

  const progWrap = el("div", { css: "padding:2px 18px 4px;display:flex;align-items:center;gap:10px" });
  const prog = el("div", { cls: "prog", css: "flex:1", html: "<i style='width:0'></i>" });
  const pNum = el("div", { cls: "t-label", css: "white-space:nowrap" });
  progWrap.append(prog, pNum);
  s.append(progWrap);

  // No text tip-banner: a toddler can't read it, Buddy says it aloud, and
  // the dotted ghost + the pencil demo ARE the instruction. Dropping it
  // hands the freed space straight to the canvas.
  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(92vw,620px);margin:auto" });
  sw.append(stage); s.append(sw);
  // Pen-Live: every finished stroke recomputes real coverage so the
  // progress bar fills continuously, not in step-sized jumps. When the
  // step first becomes "complete enough", the Next button pulses once -
  // contingent reinforcement, never a gate (Next always works).
  const engine = makeEngine(stage, { onStroke: () => liveUpdate() });
  // Writing lessons: fine pen, no brush chooser, thinner ghost guide.
  if (D.pen) {
    engine.st.brush = "pen";
    const gh = stage.querySelector("#ghost");
    if (gh) gh.classList.add("pen");
  }
  s.append(toolbar(engine, { brushes: !D.pen }));

  // Helpers in a compact row; Next is a full-width primary button on its
  // own line so it can never be pushed off-screen on narrow phones.
  const mk = (icon, label, fn, opt = {}) => {
    const b = el("button", { cls: "btn " + (opt.primary ? "btn-go" : "btn-quiet"),
      css: opt.primary ? "width:100%" : "flex:1;min-width:0;gap:6px;padding:13px 6px",
      html: ic(icon, 20, opt.primary ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(12); fn(); };
    return b;
  };
  // Just one helper - "show me". Undo and Clear are adult concepts that
  // only crowd the screen; tracing never blocks, and each letter starts on
  // a fresh sheet anyway.
  const helpers = el("div", { css: "display:flex;padding:2px 16px 0" });
  helpers.append(
    mk("play", t("showMe"), () => { engine.helpMe(); speak(t("showMeSay")); }),
  );
  const next = mk("next", t("next"), () => advance(), { primary: true });
  const nextWrap = el("div", { css: "padding:4px 16px calc(6px + env(safe-area-inset-bottom))" });
  nextWrap.append(next);
  s.append(helpers, nextWrap);
  APP.append(s);
  applyLandscape(s, sw, stage);

  // Continuous coverage feedback. Within step i the bar fills by how much
  // of the ghost the child has actually covered (capped at the pass mark).
  let stepPassed = false;
  function liveUpdate() {
    const sc = engine.score();
    const frac = clamp(sc / engine.cfg.pass, 0, 1);
    prog.firstChild.style.width = ((i + frac) / steps.length) * 100 + "%";
    if (!stepPassed && sc >= engine.cfg.pass) {
      stepPassed = true;
      next.classList.remove("ready"); void next.offsetWidth; next.classList.add("ready");
      Sound.fx.soft();
      if (Math.random() < .35) buddySay("happy", rnd("encourage"));
    }
  }

  function show() {
    busy = false;
    const stp = steps[i], L = stepText(D, i, stp);
    stepPassed = false;
    prog.firstChild.style.width = (i / steps.length) * 100 + "%";
    pNum.textContent = t("stepOf")(i + 1, steps.length);
    if (D.clearEachStep) engine.clear(); // each letter starts on a fresh sheet
    engine.setGhost(stp.d);
    applyDiff();
    next.querySelector("span").textContent = (i === steps.length - 1) ? t("allDone") : t("next");
    // Letter / whole-word steps teach a sound, so they use the precise
    // accent-free teaching voice.
    buddySay("happy", L.say, !!(stp._c || stp._w));
    setTimeout(() => engine.playDemo(), 800);
  }
  // Invisible dynamic difficulty: scale the guide thickness + demo speed
  // by the child's recent success. Tracked SEPARATELY for drawing and
  // writing - cruising at circles says nothing about tracing letters.
  const diffKey = D.pen ? "writeDiff" : "drawDiff";
  function applyDiff() {
    const d = clamp(S[diffKey] || 1, .7, 1.35);
    const base = D.pen ? 15 : 26;
    const gh = stage.querySelector("#ghost");
    if (gh) gh.style.setProperty("--gw", (base * d).toFixed(1));
    engine.setDemoFactor(d);
  }
  const scores = [];
  function advance() {
    if (busy) return;             // ignore a double-tapped Next
    busy = true;
    scores[i] = engine.score();
    const ok = scores[i] >= engine.cfg.pass;
    // Adapt: cruising -> a little less help next time; struggling -> more.
    if (scores[i] >= engine.cfg.pass * 1.6) S[diffKey] = clamp((S[diffKey] || 1) - .06, .7, 1.35);
    else if (scores[i] < engine.cfg.pass) S[diffKey] = clamp((S[diffKey] || 1) + .08, .7, 1.35);
    save();
    if (ok) {
      Sound.fx.step(); burst(.3);
      buddySay("happy", Math.random() < .45 ? rnd("praiseOk") : "");
    } else {
      Sound.fx.soft();
      buddySay("warm", Math.random() < .45 ? rnd("praiseSoft") : "");
    }
    prog.firstChild.style.width = ((i + 1) / steps.length) * 100 + "%";
    i++;
    if (i >= steps.length) return finish();
    setTimeout(show, ok ? 1100 : 950);
  }
  async function finish() {
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    const stars = avg >= engine.cfg.pass * 1.6 ? 3 : avg >= engine.cfg.pass ? 2 : 1;
    const blob = await engine.toPNG();
    S.completed[D.id] = Math.max(S.completed[D.id] || 0, stars);
    S.stars += stars;
    if (!S.stickers.includes(D.id)) S.stickers.push(D.id);
    if (S.stars > S.buddyLevel * 8) S.buddyLevel++;
    save();
    await galleryAdd({ id: Date.now(), name: drawName(D), art: D.id, blob });
    go("win", { D, stars, blob });
  }
  show();
}

  s.append(starsRow);
  // The child's own drawing is the centerpiece. A slow cream warmth-pulse

  const frameWrap = el("div", { css: "position:relative;margin:8px 0;padding:14px;display:inline-block" });
  const halo = el("div", { id: "winHalo",

  const frame = el("div", { cls: "card", css: "padding:12px;background:var(--cream);position:relative" });

  frameWrap.append(halo, frame);
  s.append(frameWrap);
  s.append(el("div", { cls: "bubble t-body", css: "margin-top:10px",
    textContent: t("winSticker")(drawName(D)) }));
  // Off-screen bridge: push the child back to real paper (panel P0).
  s.append(el("div", { cls: "t-body muted", css: "max-width:440px;margin-top:4px",
    textContent: t("bridge") }));

  const row = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px" });
  const mk = (icon, label, fn, kind) => {
    const b = el("button", { cls: "btn " + (kind || "btn-quiet"),
      html: ic(icon, 20, kind === "btn-primary" || kind === "btn-go" ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(14); fn(); };
    return b;
  };
  const list = DRAWINGS, nxt = list[(list.findIndex(x => x.id === D.id) + 1) % list.length];
  const fname = drawName(D).replace(/[^\w]+/g, "_");
  row.append(
    mk("undo", t("drawAgain"), () => go("draw", D.id)),
    mk("next", t("nextDrawing"), () => go("draw", nxt.id), "btn-go"),
    mk("gallery", t("nGallery"), () => go("gallery")),
    mk("share", t("share"), async () => {
      const f = new File([blob], `${fname}.png`, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [f] }))
        navigator.share({ files: [f], title: "Scribble Heroes" }).catch(() => {});
      else el("a", { href: url, download: `${fname}.png` }).click();
    }),
    mk("home", t("home"), () => go("home")),
  );
  s.append(row);
  APP.append(s);

  Sound.fx.win(); buzz([20, 40, 20]);
  // A single slow cream warmth-pulse around the drawing - the visual
  // equivalent of a warm exhale. Calm mode and reduced-motion skip it.
  const haloEl = $("#winHalo");
  if (haloEl && !S.settings.calm) {
    haloEl.animate(
      [{ opacity: 0, transform: "scale(.92)" },
       { opacity: 1, transform: "scale(1.18)" },
       { opacity: 0, transform: "scale(1.28)" }],
      { duration: 2200, easing: "cubic-bezier(.3,.7,.3,1)" });
  }
  setTimeout(() => speak(rnd("winPraise")), 700);
}
function burst(scale = 1) {
  if (S.settings.calm || typeof confetti !== "function") return;
  confetti({ particleCount: Math.round(90 * scale), spread: 78, origin: { y: .62 },
    colors: COLORS, scalar: 1.05, disableForReducedMotion: true, ticks: 160 });
}

/* ----- 17. Free draw --------------------------------------------------- */
function FreeDraw() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("freeTitle")));
  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(90vw,620px);margin:auto" });
  sw.append(stage); s.append(sw);
  // Free expression: Buddy stays silent here. The value of free drawing
  // is the absence of any judgement, including positive judgement.
  const engine = makeEngine(stage, {});
  // ---- One tidy control panel: two matching 3x2 grids (colours, tools)
  // plus the action row - all the same width and column-aligned, instead
  // of five ragged groups each doing their own thing. -------------------
  const panel = el("div", { css: "display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px;margin:0 auto;padding:8px 16px calc(12px + env(safe-area-inset-bottom))" });

  // Colours - 3x2 grid. minmax(0,1fr) forces truly equal columns, and the
  // gap matches the tool grid below so the two grids line up exactly.
  const colGrid = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;justify-items:center" });
  COLORS.forEach((c, i) => {
    const b = el("button", { cls: "well" + (i === 0 ? " sel" : ""), css: `background:${c}` });
    b.onclick = () => { engine.st.color = c; Sound.fx.tap(); buzz(12);
      [...colGrid.children].forEach(x => x.classList.remove("sel")); b.classList.add("sel"); };
    colGrid.append(b);
  });

  // Tools - 3x2 grid. Brushes and modes are one unified set with a single
  // selected highlight (picking a brush implies draw mode).
  const TOOLS = [
    { k: "crayon", brush: true,  label: t("toolCrayon"), icon: "brush" },
    { k: "marker", brush: true,  label: t("toolMarker"), icon: "write" },
    { k: "glow",   brush: true,  label: t("toolGlow"),   icon: "star" },
    { k: "erase",  brush: false, label: t("modeErase"),  icon: "eraser" },
    { k: "stamp",  brush: false, label: t("modeStamp"),  icon: "sticker" },
    { k: "fill",   brush: false, label: t("modeFill"),   icon: "contrast" },
  ];
  const toolGrid = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px" });
  const stampTray = el("div", { css: "display:none;grid-template-columns:repeat(5,1fr);gap:8px" });
  const toolBtns = [];
  const repaintTools = () => {
    toolBtns.forEach(({ b, T }) => {
      const on = T.brush ? (engine.st.mode === "draw" && engine.st.brush === T.k)
                         : (engine.st.mode === T.k);
      b.classList.toggle("sel", on);
      const sv = b.querySelector("svg");
      if (sv) sv.setAttribute("stroke", on ? "var(--cream)" : "var(--ink)");
    });
    stampTray.style.display = engine.st.mode === "stamp" ? "grid" : "none";
  };
  TOOLS.forEach(T => {
    const b = el("button", { cls: "chip", css: "width:100%;padding:13px 6px;gap:6px;font-size:14px",
      html: ic(T.icon, 18, "var(--ink)") + `<span>${T.label}</span>` });
    b.onclick = () => {
      if (T.brush) { engine.st.brush = T.k; engine.st.mode = "draw"; }
      else { engine.st.mode = T.k; }
      Sound.fx.tap(); buzz(12); repaintTools();
    };
    toolBtns.push({ b, T }); toolGrid.append(b);
  });

  // Stamp tray - five shapes, shown only while the Stamp tool is active.
  // Selected = a light clay tint + a clay ring; the background stays light
  // so the (dark-inked) shape itself never disappears.
  const stampBtns = [];
  const paintStamps = () => stampBtns.forEach(b => {
    const sel = b.dataset.k === engine.st.stamp;
    b.style.background = sel ? "var(--clay-soft)" : "var(--surface-2)";
    b.style.outline = sel ? "3px solid var(--clay)" : "none";
    b.style.outlineOffset = "2px";
  });
  ["star", "heart", "circle", "triangle", "square"].forEach(k => {
    const b = el("button", { cls: "btn btn-quiet", css: "padding:8px;border-radius:14px;min-height:0",
      html: shapeArt(k, 32) });
    b.dataset.k = k;
    b.onclick = () => { engine.st.stamp = k; engine.st.mode = "stamp";
      Sound.fx.tap(); buzz(12); repaintTools(); paintStamps(); };
    stampBtns.push(b); stampTray.append(b);
  });
  paintStamps(); repaintTools();

  // Actions - compact undo, press-and-hold clear, save.
  const row = el("div", { css: "display:flex;gap:10px;align-items:stretch" });
  const undoBtn = el("button", { cls: "btn btn-quiet btn-icon", css: "flex:none",
    html: ic("undo", 24) });
  undoBtn.onclick = () => { Sound.fx.tap(); buzz(12); engine.undo(); };
  // "Clear" wipes the whole drawing, so it is gated behind a deliberate
  // press-and-hold - a child tapping around can never erase by accident.
  const clearBtn = el("button", { cls: "btn btn-quiet",
    css: "flex:1;min-width:0;padding:15px 10px;gap:7px;position:relative;overflow:hidden",
    html: ic("eraser", 20) + `<span>${t("clear")}</span>` });
  let _cT, _cFill;
  const cClear = () => { clearTimeout(_cT); if (_cFill) { _cFill.remove(); _cFill = null; } };
  clearBtn.addEventListener("pointerdown", () => {
    cClear();
    _cFill = el("i", { css: "position:absolute;left:0;top:0;bottom:0;width:0;background:var(--clay);opacity:.3;transition:width .65s linear;pointer-events:none" });
    clearBtn.append(_cFill);
    requestAnimationFrame(() => { if (_cFill) _cFill.style.width = "100%"; });
    _cT = setTimeout(() => { cClear(); engine.clear(); Sound.fx.soft(); buzz([18, 28]); }, 650);
  });
  ["pointerup", "pointerleave", "pointercancel"].forEach(ev => clearBtn.addEventListener(ev, cClear));
  const saveBtn = el("button", { cls: "btn btn-go",
    css: "flex:1;min-width:0;padding:15px 10px;gap:7px",
    html: ic("save", 20, "#fff") + `<span>${t("save")}</span>` });
  saveBtn.onclick = async () => {
    Sound.fx.tap(); buzz(12);
    const blob = await engine.toPNG();
    await galleryAdd({ id: Date.now(), name: t("freeTitle"), art: "star", blob });
    Sound.fx.win(); burst(.5);
    speak(t("freeSave")(S.name));
  };
  row.append(undoBtn, clearBtn, saveBtn);

  panel.append(colGrid, toolGrid, stampTray, row);
  s.append(panel);
  APP.append(s);
  applyLandscape(s, sw, stage);
  buddySay("warm", t("freeIntro")(S.name));
}

  });
  prof.append(seg);
  // Spoken-name override (fixes e.g. English-sounding "Lucy" -> "Loesie").
  prof.append(el("div", { cls: "t-label", textContent: t("sayNameLabel") }));
  const sayIn = el("input", { id: "sayNm", value: S.sayName || "", placeholder: S.name, maxLength: 20,
    css: "font:inherit;font-size:18px;font-weight:800;padding:12px 14px;border-radius:12px;border:2px solid var(--line);background:var(--surface-2);color:var(--ink);outline:none" });
  const commit = () => { S.sayName = sayIn.value.trim(); save(); };
  sayIn.addEventListener("change", commit);
  sayIn.addEventListener("blur", commit);
  const tryBtn = el("button", { cls: "btn btn-quiet", css: "align-self:flex-start;padding:10px 16px",
    html: ic("sound", 18) + `<span>${t("sayNameTry")}</span>` });
  tryBtn.onclick = () => { commit(); speak(t("hello")(S.name)); };
  prof.append(sayIn, el("div", { cls: "t-body muted", textContent: t("sayNameHint") }), tryBtn);
  const reset = el("button", { cls: "btn", css: "background:var(--clay);color:#fff;border-color:transparent;margin-top:4px",
    html: ic("eraser", 18, "#fff") + `<span>${t("reset")}</span>` });
  reset.onclick = async () => {
    if (confirm(t("resetConfirm"))) {
      // Removes only THIS child's profile + gallery; other children are safe.
      if (S.id) await deleteProfile(S.id);
      else { S = defaultState(); Splash(); }
    }
  };
  prof.append(reset);
  wrap.append(prof);

  // Share with another family + offline printable parent sheet.
  const shareCard = el("div", { cls: "card", css: "padding:16px 18px;display:flex;gap:10px;flex-wrap:wrap" });
  const shareBtn = el("button", { cls: "btn btn-quiet", css: "flex:1",
    html: ic("share", 18) + `<span>${t("shareApp")}</span>` });
  shareBtn.onclick = async () => {
    Sound.fx.tap();
    const data = { title: "Scribble Heroes", text: t("shareText"), url: location.href.split("?")[0] };
    try { if (navigator.share) await navigator.share(data);
      else { await navigator.clipboard.writeText(data.url); alert(data.url); } } catch {}
  };
  const sheetBtn = el("button", { cls: "btn btn-quiet", css: "flex:1",
    html: ic("save", 18) + `<span>${t("parentSheet")}</span>` });
  sheetBtn.onclick = () => {
    Sound.fx.tap();
    const acts = t("sheetActs").map(a => `<li>${a}</li>`).join("");
    const lessons = Object.keys(S.completed || {}).length;
    const w = window.open("", "_blank");
    if (!w) return;
    w.document.write(`<!doctype html><html><head><meta charset="utf-8">
      <title>${t("sheetTitle")}</title><style>
      body{font:16px/1.6 -apple-system,system-ui,sans-serif;color:#2b2722;max-width:640px;margin:40px auto;padding:0 24px}
      h1{font-size:26px;margin:0 0 4px} .muted{color:#766}
      .stat{display:flex;gap:24px;margin:18px 0;font-weight:700}
      ul{margin:10px 0 0 20px} .foot{margin-top:28px;color:#766;font-size:14px}
      @media print{button{display:none}}</style></head><body>
      <h1>${t("sheetTitle")}</h1>
      <div class="muted">${t("sheetIntro")(S.name)}</div>
      <div class="stat"><span>⭐ ${S.stars}</span><span>${t("ageWord")} ${S.age}</span><span>${lessons} ${t("sheetLessons")}</span></div>
      <h3>${t("sheetActsTitle")}</h3><ul>${acts}</ul>
      <div class="foot">${t("sheetFooter")}</div>
      <button onclick="print()" style="margin-top:24px;padding:12px 20px;border:0;border-radius:10px;background:#C9633F;color:#fff;font:inherit;font-weight:800">${t("parentSheet")}</button>
      </body></html>`);
    w.document.close();
  };
  shareCard.append(shareBtn, sheetBtn);
  wrap.append(shareCard);

  const note = el("div", { cls: "card", css: "padding:20px;line-height:1.6", html: t("note") });
  wrap.append(note);
  s.append(wrap);
  APP.append(s);
}

// One-tap master mute - silences sound effects and Buddy's voice
// together. Reachable on every play screen, so a grown-up never has to
// go through the parent-gated settings to hush it.
function muteBtn() {
  const b = el("button", { cls: "btn btn-quiet btn-icon" });
  b.setAttribute("aria-label", "Turn sound on or off");
  const render = () => b.innerHTML =
    ic(S.settings.muted ? "mute" : "sound", 22, S.settings.muted ? "var(--ink-soft)" : "var(--clay)");
  render();
  b.onclick = () => {
    S.settings.muted = !S.settings.muted; save(); buzz(12); render();
    if (S.settings.muted) {
      if (_ttsEl) try { _ttsEl.pause(); } catch {}
      if ("speechSynthesis" in window) try { speechSynthesis.cancel(); } catch {}
    }
  };
  return b;
}

function header(title) {
  const h = el("div", { css: "display:flex;align-items:center;gap:12px;padding:18px 20px 6px" });
  const b = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  b.onclick = () => { Sound.fx.tap(); buzz(12); go("home"); };
  h.append(b, el("div", { cls: "t-title", textContent: title }),
    el("div", { css: "flex:1" }), muteBtn());
  return h;
}

/* ----- 19. Service worker ---------------------------------------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
</body>
