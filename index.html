function toolbar(engine, opts = {}) {
  // One centred panel of a fixed width so every row lines up.
  const bar = el("div", { css: "display:flex;flex-direction:column;gap:12px;width:100%;max-width:460px;margin:0 auto;padding:6px 16px" });
  // Colours - 3x2 grid.
  const cols = el("div", { css: "display:grid;grid-template-columns:repeat(3,1fr);gap:14px;justify-items:center" });
  COLORS.forEach((c, i) => {
    const b = el("button", { cls: "well" + (i === 0 ? " sel" : ""), css: `background:${c}` });
    b.onclick = () => { engine.st.color = c; Sound.fx.tap(); buzz(12);
      [...cols.children].forEach(x => x.classList.remove("sel")); b.classList.add("sel"); };
    cols.append(b);
  });
  // Brushes - 3 equal columns, so they never look ragged.
  const br = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px" });
  [["crayon", t("toolCrayon"), "brush"], ["marker", t("toolMarker"), "write"], ["glow", t("toolGlow"), "star"]].forEach(([k, label, icon], i) => {
    const b = el("button", { cls: "chip" + (i === 0 ? " sel" : ""),
      html: ic(icon, 18, i === 0 ? "var(--cream)" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { engine.st.brush = k; Sound.fx.tap(); buzz(12);
      [...br.children].forEach(x => { x.classList.remove("sel"); x.querySelector("svg").setAttribute("stroke", "var(--ink)"); });
      b.classList.add("sel"); b.querySelector("svg").setAttribute("stroke", "var(--cream)"); };
    br.append(b);
  });

  bar.append(cols);
  if (opts.brushes !== false) bar.append(br);
  return bar;
}

/* ----- 13. Guided drawing ---------------------------------------------- */
function DrawScreen(id) {
  const D = DRAWINGS.find(d => d.id === id) || DRAWINGS[0];
  const built = D.build ? D.build() : D.steps;
  const steps = (AGE[S.age].oneStep && !D.pen)
    ? built.slice(0, Math.min(2, built.length)) : built;
  let i = 0, busy = false;        // lock against double-tapped Next
  const s = el("div", { cls: "screen" });

  const head = el("div", { css: "display:flex;align-items:center;gap:10px;padding:12px 16px 2px" });
  const back = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  back.onclick = () => { Sound.fx.tap(); go("home"); };
  head.append(back,
    el("div", { css: "flex:1", html: `<div class="t-title">${drawName(D)}</div>` }),
    muteBtn(),
    el("div", { id: "buddy", "data-size": 44, html: Franky("happy", 44) }));
  s.append(head);

  const progWrap = el("div", { css: "padding:2px 18px 4px;display:flex;align-items:center;gap:10px" });
  const prog = el("div", { cls: "prog", css: "flex:1", html: "<i style='width:0'></i>" });
  const pNum = el("div", { cls: "t-label", css: "white-space:nowrap" });
  progWrap.append(prog, pNum);
  s.append(progWrap);

  // No text tip-banner: a toddler can't read it, Franky says it aloud, and
  // the dotted ghost + the pencil demo ARE the instruction. Dropping it
  // hands the freed space straight to the canvas.
  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(92vw,620px);margin:auto" });
  sw.append(stage); s.append(sw);
  // Pen-Live: every finished stroke recomputes real coverage so the
  // progress bar fills continuously, not in step-sized jumps. When the
  // step first becomes "complete enough", the Next button pulses once -
  // contingent reinforcement, never a gate (Next always works).
  const engine = makeEngine(stage, { onStroke: () => liveUpdate() });
  // Writing lessons: fine pen, no brush chooser, thinner ghost guide.
  if (D.pen) {
    engine.st.brush = "pen";
    const gh = stage.querySelector("#ghost");
    if (gh) gh.classList.add("pen");
  }
  s.append(toolbar(engine, { brushes: !D.pen }));

  // Helpers in a compact row; Next is a full-width primary button on its
  // own line so it can never be pushed off-screen on narrow phones.
  const mk = (icon, label, fn, opt = {}) => {
    const b = el("button", { cls: "btn " + (opt.primary ? "btn-go" : "btn-quiet"),
      css: opt.primary ? "width:100%" : "flex:1;min-width:0;gap:6px;padding:13px 6px",
      html: ic(icon, 20, opt.primary ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(12); fn(); };
    return b;
  };
  // Just one helper - "show me". Undo and Clear are adult concepts that
  // only crowd the screen; tracing never blocks, and each letter starts on
  // a fresh sheet anyway.
  const helpers = el("div", { css: "display:flex;padding:2px 16px 0" });
  helpers.append(
    mk("play", t("showMe"), () => { engine.helpMe(); speak(t("showMeSay")); }),
  );
  const next = mk("next", t("next"), () => advance(), { primary: true });
  const nextWrap = el("div", { css: "padding:4px 16px calc(6px + env(safe-area-inset-bottom))" });
  nextWrap.append(next);
  s.append(helpers, nextWrap);
  APP.append(s);
  applyLandscape(s, sw, stage);

  // Continuous coverage feedback. Within step i the bar fills by how much
  // of the ghost the child has actually covered (capped at the pass mark).
  let stepPassed = false;
  function liveUpdate() {
    const sc = engine.score();
    const frac = clamp(sc / engine.cfg.pass, 0, 1);
    prog.firstChild.style.width = ((i + frac) / steps.length) * 100 + "%";
    if (!stepPassed && sc >= engine.cfg.pass) {
      stepPassed = true;
      next.classList.remove("ready"); void next.offsetWidth; next.classList.add("ready");
      Sound.fx.soft();
      if (Math.random() < .35) frankySay("happy", rnd("encourage"));
    }
  }

  function show() {
    busy = false;
    const stp = steps[i], L = stepText(D, i, stp);
    stepPassed = false;
    prog.firstChild.style.width = (i / steps.length) * 100 + "%";
    pNum.textContent = t("stepOf")(i + 1, steps.length);
    if (D.clearEachStep) engine.clear(); // each letter starts on a fresh sheet
    engine.setGhost(stp.d);
    applyDiff();
    next.querySelector("span").textContent = (i === steps.length - 1) ? t("allDone") : t("next");
    // Letter / whole-word steps teach a sound, so they use the precise
    // accent-free teaching voice.
    frankySay("happy", L.say, !!(stp._c || stp._w));
    setTimeout(() => engine.playDemo(), 800);
  }
  // Invisible dynamic difficulty: scale the guide thickness + demo speed
  // by the child's recent success. Tracked SEPARATELY for drawing and
  // writing - cruising at circles says nothing about tracing letters.
  const diffKey = D.pen ? "writeDiff" : "drawDiff";
  function applyDiff() {
    const d = clamp(S[diffKey] || 1, .7, 1.35);
    const base = D.pen ? 15 : 26;
    const gh = stage.querySelector("#ghost");
    if (gh) gh.style.setProperty("--gw", (base * d).toFixed(1));
    engine.setDemoFactor(d);
  }
  const scores = [];
  function advance() {
    if (busy) return;             // ignore a double-tapped Next
    busy = true;
    scores[i] = engine.score();
    const ok = scores[i] >= engine.cfg.pass;
    // Adapt: cruising -> a little less help next time; struggling -> more.
    if (scores[i] >= engine.cfg.pass * 1.6) S[diffKey] = clamp((S[diffKey] || 1) - .06, .7, 1.35);
    else if (scores[i] < engine.cfg.pass) S[diffKey] = clamp((S[diffKey] || 1) + .08, .7, 1.35);
    save();
    if (ok) {
      Sound.fx.step(); burst(.3);
      frankySay("happy", Math.random() < .45 ? rnd("praiseOk") : "");
    } else {
      Sound.fx.soft();
      frankySay("warm", Math.random() < .45 ? rnd("praiseSoft") : "");
    }
    prog.firstChild.style.width = ((i + 1) / steps.length) * 100 + "%";
    i++;
    if (i >= steps.length) return finish();
    setTimeout(show, ok ? 1100 : 950);
  }
  async function finish() {
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    const stars = avg >= engine.cfg.pass * 1.6 ? 3 : avg >= engine.cfg.pass ? 2 : 1;
    const blob = await engine.toPNG();
    S.completed[D.id] = Math.max(S.completed[D.id] || 0, stars);
    S.stars += stars;
    if (!S.stickers.includes(D.id)) S.stickers.push(D.id);
    if (S.stars > S.frankyLevel * 8) S.frankyLevel++;
    save();
    await galleryAdd({ id: Date.now(), name: drawName(D), art: D.id, blob });
    go("win", { D, stars, blob });
  }
  show();
}

/* ----- 14. Completion -------------------------------------------------- */
function WinScreen({ D, stars, blob }) {
  const s = el("div", { cls: "screen", css: "align-items:center;justify-content:flex-start;text-align:center;padding:24px;gap:14px;overflow-y:auto" });
  // Guard: a missing blob (e.g. a not-yet-sized canvas) must not crash
  // the whole celebration screen.
  const url = (blob instanceof Blob) ? URL.createObjectURL(blob) : "";
  s.append(el("div", { cls: "t-display", textContent: t("winTitle")(S.name) }));
  const starsRow = el("div", { css: "display:flex;gap:6px",
    html: Array.from({ length: 3 }, (_, k) =>
      ic("star", 30, k < stars ? "var(--ochre)" : "rgba(52,48,42,.18)")).join("") });
  s.append(starsRow);
  // The child's own drawing is the centerpiece. A slow cream warmth-pulse
  // breathes around the frame once (calm-mode skips it).
  const frameWrap = el("div", { css: "position:relative;margin:8px 0;padding:14px;display:inline-block" });
  const halo = el("div", { id: "winHalo",
    css: "position:absolute;inset:0;border-radius:24px;pointer-events:none;background:radial-gradient(closest-side,rgba(251,243,231,.85),rgba(251,243,231,0) 72%);opacity:0" });
  const frame = el("div", { cls: "card", css: "padding:12px;background:var(--cream);position:relative" });
  frame.append(el("img", { src: url, alt: "Your drawing",
    css: "width:min(72vw,360px);border-radius:14px;display:block" }));
  frameWrap.append(halo, frame);
  s.append(frameWrap);
  s.append(el("div", { cls: "bubble t-body", css: "margin-top:10px",
    textContent: t("winSticker")(drawName(D)) }));
  // Off-screen bridge: push the child back to real paper (panel P0).
  s.append(el("div", { cls: "t-body muted", css: "max-width:440px;margin-top:4px",
    textContent: t("bridge") }));

  const row = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px" });
  const mk = (icon, label, fn, kind) => {
    const b = el("button", { cls: "btn " + (kind || "btn-quiet"),
      html: ic(icon, 20, kind === "btn-primary" || kind === "btn-go" ? "#fff" : "var(--ink)") + `<span>${label}</span>` });
    b.onclick = () => { Sound.fx.tap(); buzz(14); fn(); };
    return b;
  };
  const list = DRAWINGS, nxt = list[(list.findIndex(x => x.id === D.id) + 1) % list.length];
  const fname = drawName(D).replace(/[^\w]+/g, "_");
  row.append(
    mk("undo", t("drawAgain"), () => go("draw", D.id)),
    mk("next", t("nextDrawing"), () => go("draw", nxt.id), "btn-go"),
    mk("gallery", t("nGallery"), () => go("gallery")),
    mk("share", t("share"), async () => {
      const f = new File([blob], `${fname}.png`, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [f] }))
        navigator.share({ files: [f], title: "Franky's World" }).catch(() => {});
      else el("a", { href: url, download: `${fname}.png` }).click();
    }),
    mk("home", t("home"), () => go("home")),
  );
  s.append(row);
  APP.append(s);

  Sound.fx.win(); buzz([20, 40, 20]);
  // A single slow cream warmth-pulse around the drawing - the visual
  // equivalent of a warm exhale. Calm mode and reduced-motion skip it.
  const haloEl = $("#winHalo");
  if (haloEl && !S.settings.calm) {
    haloEl.animate(
      [{ opacity: 0, transform: "scale(.92)" },
       { opacity: 1, transform: "scale(1.18)" },
       { opacity: 0, transform: "scale(1.28)" }],
      { duration: 2200, easing: "cubic-bezier(.3,.7,.3,1)" });
  }
  setTimeout(() => speak(rnd("winPraise")), 700);
}
function burst(scale = 1) {
  if (S.settings.calm || typeof confetti !== "function") return;
  confetti({ particleCount: Math.round(90 * scale), spread: 78, origin: { y: .62 },
    colors: COLORS, scalar: 1.05, disableForReducedMotion: true, ticks: 160 });
}

/* ----- 17. Free draw --------------------------------------------------- */
function FreeDraw() {
  const s = el("div", { cls: "screen" });
  s.append(header(t("freeTitle")));
  const sw = el("div", { css: "flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 14px" });
  const stage = el("div", { cls: "stage", css: "aspect-ratio:1/1;height:100%;max-height:100%;width:auto;max-width:min(90vw,620px);margin:auto" });
  sw.append(stage); s.append(sw);
  // Free expression: Franky stays silent here. The value of free drawing
  // is the absence of any judgement, including positive judgement.
  const engine = makeEngine(stage, {});
  // ---- One tidy control panel: two matching 3x2 grids (colours, tools)
  // plus the action row - all the same width and column-aligned, instead
  // of five ragged groups each doing their own thing. -------------------
  const panel = el("div", { css: "display:flex;flex-direction:column;gap:12px;width:100%;max-width:480px;margin:0 auto;padding:8px 16px calc(12px + env(safe-area-inset-bottom))" });

  // Colours - 3x2 grid. minmax(0,1fr) forces truly equal columns, and the
  // gap matches the tool grid below so the two grids line up exactly.
  const colGrid = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;justify-items:center" });
  COLORS.forEach((c, i) => {
    const b = el("button", { cls: "well" + (i === 0 ? " sel" : ""), css: `background:${c}` });
    b.onclick = () => { engine.st.color = c; Sound.fx.tap(); buzz(12);
      [...colGrid.children].forEach(x => x.classList.remove("sel")); b.classList.add("sel"); };
    colGrid.append(b);
  });

  // Tools - 3x2 grid. Brushes and modes are one unified set with a single
  // selected highlight (picking a brush implies draw mode).
  const TOOLS = [
    { k: "crayon", brush: true,  label: t("toolCrayon"), icon: "brush" },
    { k: "marker", brush: true,  label: t("toolMarker"), icon: "write" },
    { k: "glow",   brush: true,  label: t("toolGlow"),   icon: "star" },
    { k: "erase",  brush: false, label: t("modeErase"),  icon: "eraser" },
    { k: "stamp",  brush: false, label: t("modeStamp"),  icon: "sticker" },
    { k: "fill",   brush: false, label: t("modeFill"),   icon: "contrast" },
  ];
  const toolGrid = el("div", { css: "display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px" });
  const stampTray = el("div", { css: "display:none;grid-template-columns:repeat(5,1fr);gap:8px" });
  const toolBtns = [];
  const repaintTools = () => {
    toolBtns.forEach(({ b, T }) => {
      const on = T.brush ? (engine.st.mode === "draw" && engine.st.brush === T.k)
                         : (engine.st.mode === T.k);
      b.classList.toggle("sel", on);
      const sv = b.querySelector("svg");
      if (sv) sv.setAttribute("stroke", on ? "var(--cream)" : "var(--ink)");
    });
    stampTray.style.display = engine.st.mode === "stamp" ? "grid" : "none";
  };
  TOOLS.forEach(T => {
    const b = el("button", { cls: "chip", css: "width:100%;padding:13px 6px;gap:6px;font-size:14px",
      html: ic(T.icon, 18, "var(--ink)") + `<span>${T.label}</span>` });
    b.onclick = () => {
      if (T.brush) { engine.st.brush = T.k; engine.st.mode = "draw"; }
      else { engine.st.mode = T.k; }
      Sound.fx.tap(); buzz(12); repaintTools();
    };
    toolBtns.push({ b, T }); toolGrid.append(b);
  });

  // Stamp tray - five shapes, shown only while the Stamp tool is active.
  // Selected = a light clay tint + a clay ring; the background stays light
  // so the (dark-inked) shape itself never disappears.
  const stampBtns = [];
  const paintStamps = () => stampBtns.forEach(b => {
    const sel = b.dataset.k === engine.st.stamp;
    b.style.background = sel ? "var(--clay-soft)" : "var(--surface-2)";
    b.style.outline = sel ? "3px solid var(--clay)" : "none";
    b.style.outlineOffset = "2px";
  });
  ["star", "heart", "circle", "triangle", "square"].forEach(k => {
    const b = el("button", { cls: "btn btn-quiet", css: "padding:8px;border-radius:14px;min-height:0",
      html: shapeArt(k, 32) });
    b.dataset.k = k;
    b.onclick = () => { engine.st.stamp = k; engine.st.mode = "stamp";
      Sound.fx.tap(); buzz(12); repaintTools(); paintStamps(); };
    stampBtns.push(b); stampTray.append(b);
  });
  paintStamps(); repaintTools();

  // Actions - compact undo, press-and-hold clear, save.
  const row = el("div", { css: "display:flex;gap:10px;align-items:stretch" });
  const undoBtn = el("button", { cls: "btn btn-quiet btn-icon", css: "flex:none",
    html: ic("undo", 24) });
  undoBtn.onclick = () => { Sound.fx.tap(); buzz(12); engine.undo(); };
  // "Clear" wipes the whole drawing, so it is gated behind a deliberate
  // press-and-hold - a child tapping around can never erase by accident.
  const clearBtn = el("button", { cls: "btn btn-quiet",
    css: "flex:1;min-width:0;padding:15px 10px;gap:7px;position:relative;overflow:hidden",
    html: ic("eraser", 20) + `<span>${t("clear")}</span>` });
  let _cT, _cFill;
  const cClear = () => { clearTimeout(_cT); if (_cFill) { _cFill.remove(); _cFill = null; } };
  clearBtn.addEventListener("pointerdown", () => {
    cClear();
    _cFill = el("i", { css: "position:absolute;left:0;top:0;bottom:0;width:0;background:var(--clay);opacity:.3;transition:width .65s linear;pointer-events:none" });
    clearBtn.append(_cFill);
    requestAnimationFrame(() => { if (_cFill) _cFill.style.width = "100%"; });
    _cT = setTimeout(() => { cClear(); engine.clear(); Sound.fx.soft(); buzz([18, 28]); }, 650);
  });
  ["pointerup", "pointerleave", "pointercancel"].forEach(ev => clearBtn.addEventListener(ev, cClear));
  const saveBtn = el("button", { cls: "btn btn-go",
    css: "flex:1;min-width:0;padding:15px 10px;gap:7px",
    html: ic("save", 20, "#fff") + `<span>${t("save")}</span>` });
  saveBtn.onclick = async () => {
    Sound.fx.tap(); buzz(12);
    const blob = await engine.toPNG();
    await galleryAdd({ id: Date.now(), name: t("freeTitle"), art: "star", blob });
    Sound.fx.win(); burst(.5);
    speak(t("freeSave")(S.name));
  };
  row.append(undoBtn, clearBtn, saveBtn);

  panel.append(colGrid, toolGrid, stampTray, row);
  s.append(panel);
  APP.append(s);
  applyLandscape(s, sw, stage);
  frankySay("warm", t("freeIntro")(S.name));
}

    const card = el("div", { cls: "card", css: "padding:6px 18px;display:flex;flex-direction:column" });
    groups.forEach((rows, gi) => {
      rows.forEach(([k, icon, label], ri) => {
        const first = gi === 0 && ri === 0;
        const row = el("div", { css: `display:flex;align-items:center;gap:14px;padding:14px 0;${first ? "" : "border-top:1px solid var(--line)"}` });
        const swh = el("div", { cls: "sw" + (S.settings[k] ? " on" : ""), html: "<i></i>" });
        row.append(el("div", { html: ic(icon, 22, "var(--ink-soft)") }),
          el("div", { cls: "t-head", css: "flex:1", textContent: label }), swh);
        row.onclick = () => {
          S.settings[k] = !S.settings[k]; save(); Sound.fx.tap(); buzz(12);
          swh.classList.toggle("on", S.settings[k]); applyFlags();
          if (k === "muted" && S.settings.muted && "speechSynthesis" in window)
            try { speechSynthesis.cancel(); } catch {}
        };
        card.append(row);
      });
    });
    return card;
  };
  const soundCard = toggleGroup([[
    ["muted", "mute", t("setMuted")],
    ["voice", "sound", t("setVoice")],
    ["slowVoice", "slow", t("setSlow")],
    ["sound", "play", t("setSound")],
    ["listen", "mic", t("setListen")],
  ], [
    ["haptics", "buzz", t("setHaptics")],
    ["calm", "calm", t("setCalm")],
    ["contrast", "contrast", t("setContrast")],
    ["foundations", "help", t("setFoundations")],
  ]]);

  const prof = el("div", { cls: "card", css: "padding:18px;display:flex;flex-direction:column;gap:12px" });
  prof.append(el("div", { cls: "t-head", html: `${t("artist")}: <b>${S.name}</b>` }),
    el("div", { cls: "t-label", textContent: t("ageSetting") }));
  const seg = el("div", { css: "display:flex;gap:8px;background:var(--surface-2);padding:6px;border-radius:14px" });
  [1, 2, 3, 4, 5].forEach(a => {
    const b = el("button", { textContent: `${a}`,
      css: `flex:1;padding:12px 6px;border-radius:10px;font-weight:800;background:${S.age === a ? "var(--ink)" : "transparent"};color:${S.age === a ? "var(--cream)" : "var(--ink-soft)"}` });
    b.onclick = () => { S.age = a; save(); Sound.fx.tap(); Settings(); };
    seg.append(b);
  });
  prof.append(seg);
  // Spoken-name override (fixes e.g. English-sounding "Lucy" -> "Loesie").
  prof.append(el("div", { cls: "t-label", textContent: t("sayNameLabel") }));
  const sayIn = el("input", { id: "sayNm", value: S.sayName || "", placeholder: S.name, maxLength: 20,
    css: "font:inherit;font-size:18px;font-weight:800;padding:12px 14px;border-radius:12px;border:2px solid var(--line);background:var(--surface-2);color:var(--ink);outline:none" });
  const commit = () => { S.sayName = sayIn.value.trim(); save(); };
  sayIn.addEventListener("change", commit);
  sayIn.addEventListener("blur", commit);
  const tryBtn = el("button", { cls: "btn btn-quiet", css: "align-self:flex-start;padding:10px 16px",
    html: ic("sound", 18) + `<span>${t("sayNameTry")}</span>` });
  tryBtn.onclick = () => { commit(); speak(t("hello")(S.name)); };
  prof.append(sayIn, el("div", { cls: "t-body muted", textContent: t("sayNameHint") }), tryBtn);
  const reset = el("button", { cls: "btn", css: "background:var(--clay);color:#fff;border-color:transparent;margin-top:4px",
    html: ic("eraser", 18, "#fff") + `<span>${t("reset")}</span>` });
  reset.onclick = async () => {
    if (confirm(t("resetConfirm"))) {
      // Removes only THIS child's profile + gallery; other children are safe.
      if (S.id) await deleteProfile(S.id);
      else { S = defaultState(); Splash(); }
    }
  };
  prof.append(reset);

  // ---- Cross-device sync card ------------------------------------------
  // Links one child profile across the family's devices via a 6-digit
  // pair-code. No accounts, no email. The cloud only sees an opaque blob.
  const syncCard = el("div", { cls: "card", css: "padding:16px 18px;display:flex;flex-direction:column;gap:12px" });
  syncCard.append(el("div", { cls: "t-label", textContent: t("syncTitle") }));
  if (Sync.linked()) {
    // Linked state: show status + actions.
    const st = Sync.status();
    const when = st.lastPull
      ? new Date(st.lastPull).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      : t("syncNever");
    syncCard.append(el("div", { cls: "t-body",
      html: `<span style="color:var(--sage);font-weight:700">● ${t("syncOn")}</span> · ${t("syncLast")} ${when}` }));
    syncCard.append(el("div", { cls: "t-body muted", textContent: t("syncLinkedHint") }));

    const row = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap" });
    const addBtn = el("button", { cls: "btn btn-quiet", css: "flex:1;min-width:160px",
      html: ic("share", 18) + `<span>${t("syncAddDevice")}</span>` });
    addBtn.onclick = async () => {
      Sound.fx.tap();
      try {
        await Sync.push();                       // make sure cloud is current
        const code = await Sync.newCode();
        showCode(code);
      } catch { alert(t("syncError")); }
    };
    const stopBtn = el("button", { cls: "btn btn-quiet", css: "flex:1;min-width:160px",
      html: ic("eraser", 18) + `<span>${t("syncStop")}</span>` });
    stopBtn.onclick = () => parentGate(() => {
      Sync.unlink(); Sound.fx.tap(); Settings();
    });
    row.append(addBtn, stopBtn);
    syncCard.append(row);
  } else {
    syncCard.append(el("div", { cls: "t-body muted", textContent: t("syncIntro") }));

    const row = el("div", { css: "display:flex;gap:10px;flex-wrap:wrap" });
    const startBtn = el("button", { cls: "btn btn-go", css: "flex:1;min-width:160px",
      html: ic("share", 18, "#fff") + `<span>${t("syncStart")}</span>` });
    startBtn.onclick = async () => {
      Sound.fx.tap();
      try {
        const code = await Sync.create();
        showCode(code);
      } catch { alert(t("syncError")); }
    };
    const pairBtn = el("button", { cls: "btn btn-quiet", css: "flex:1;min-width:160px",
      html: ic("next", 18) + `<span>${t("syncPair")}</span>` });
    pairBtn.onclick = () => showPairDialog();
    row.append(startBtn, pairBtn);
    syncCard.append(row);
  }

  // Shows a freshly-minted pair-code, large enough to read aloud.
  function showCode(code) {
    const pretty = String(code).replace(/(\d{3})(\d{3})/, "$1-$2");
    const ov = el("div", { css: "position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.6);backdrop-filter:blur(4px);padding:24px" });
    const c = el("div", { cls: "card", css: "background:var(--surface);padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:14px;text-align:center" });
    c.append(
      el("div", { cls: "t-title", textContent: t("syncCodeTitle") }),
      el("div", { cls: "t-body muted", textContent: t("syncCodeHint") }),
      el("div", { css: "font:900 44px/1 -apple-system,system-ui;letter-spacing:6px;color:var(--clay);padding:18px;background:var(--surface-2);border-radius:14px;user-select:all", textContent: pretty }),
      el("div", { cls: "t-body muted", textContent: t("syncCodeExpiry") }));
    const ok = el("button", { cls: "btn btn-go", html: ic("check", 18, "#fff") + `<span>${t("done")}</span>` });
    ok.onclick = () => { ov.remove(); Settings(); };
    c.append(ok);
    ov.append(c); APP.append(ov);
  }
  function showPairDialog() {
    const ov = el("div", { css: "position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(52,48,42,.6);backdrop-filter:blur(4px);padding:24px" });
    const c = el("div", { cls: "card", css: "background:var(--surface);padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:14px;text-align:center" });
    c.append(
      el("div", { cls: "t-title", textContent: t("syncPairTitle") }),
      el("div", { cls: "t-body muted", textContent: t("syncPairHint") }));
    const inp = el("input", { type: "text", inputmode: "numeric", autocomplete: "one-time-code", maxLength: 7, placeholder: "123-456",
      css: "font:900 28px/1 -apple-system,system-ui;letter-spacing:4px;text-align:center;padding:14px;border-radius:12px;border:2px solid var(--line);background:var(--surface-2);color:var(--ink);outline:none" });
    c.append(inp);
    const row = el("div", { css: "display:flex;gap:10px" });
    const cancel = el("button", { cls: "btn btn-quiet", css: "flex:1", html: `<span>${t("cancel")}</span>` });
    cancel.onclick = () => ov.remove();
    const ok = el("button", { cls: "btn btn-go", css: "flex:1", html: ic("check", 18, "#fff") + `<span>${t("syncPairGo")}</span>` });
    ok.onclick = async () => {
      const code = inp.value.replace(/\D/g, "");
      if (code.length !== 6) { inp.style.borderColor = "var(--clay)"; return; }
      ok.disabled = true; ok.textContent = "...";
      try {
        await Sync.pair(code);
        ov.remove(); Sound.fx.step(); Settings();
      } catch (e) {
        ok.disabled = false;
        ok.innerHTML = ic("check", 18, "#fff") + `<span>${t("syncPairGo")}</span>`;
        inp.style.borderColor = "var(--clay)";
        alert(t("syncPairError"));
      }
    };
    row.append(cancel, ok);
    c.append(row);
    ov.append(c); APP.append(ov);
    setTimeout(() => inp.focus(), 50);
  }

  // Share with another family + offline printable parent sheet.
  const shareCard = el("div", { cls: "card", css: "padding:16px 18px;display:flex;gap:10px;flex-wrap:wrap" });
  const shareBtn = el("button", { cls: "btn btn-quiet", css: "flex:1",
    html: ic("share", 18) + `<span>${t("shareApp")}</span>` });
  shareBtn.onclick = async () => {
    Sound.fx.tap();
    const data = { title: "Franky's World", text: t("shareText"), url: location.href.split("?")[0] };
    try { if (navigator.share) await navigator.share(data);
      else { await navigator.clipboard.writeText(data.url); alert(data.url); } } catch {}
  };
  const sheetBtn = el("button", { cls: "btn btn-quiet", css: "flex:1",
    html: ic("save", 18) + `<span>${t("parentSheet")}</span>` });
  sheetBtn.onclick = () => {
    Sound.fx.tap();
    const acts = t("sheetActs").map(a => `<li>${a}</li>`).join("");
    const lessons = Object.keys(S.completed || {}).length;
    const w = window.open("", "_blank");
    if (!w) return;
    w.document.write(`<!doctype html><html><head><meta charset="utf-8">
      <title>${t("sheetTitle")}</title><style>
      body{font:16px/1.6 -apple-system,system-ui,sans-serif;color:#2b2722;max-width:640px;margin:40px auto;padding:0 24px}
      h1{font-size:26px;margin:0 0 4px} .muted{color:#766}
      .stat{display:flex;gap:24px;margin:18px 0;font-weight:700}
      ul{margin:10px 0 0 20px} .foot{margin-top:28px;color:#766;font-size:14px}
      @media print{button{display:none}}</style></head><body>
      <h1>${t("sheetTitle")}</h1>
      <div class="muted">${t("sheetIntro")(S.name)}</div>
      <div class="stat"><span>⭐ ${S.stars}</span><span>${t("ageWord")} ${S.age}</span><span>${lessons} ${t("sheetLessons")}</span></div>
      <h3>${t("sheetActsTitle")}</h3><ul>${acts}</ul>
      <div class="foot">${t("sheetFooter")}</div>
      <button onclick="print()" style="margin-top:24px;padding:12px 20px;border:0;border-radius:10px;background:#C9633F;color:#fff;font:inherit;font-weight:800">${t("parentSheet")}</button>
      </body></html>`);
    w.document.close();
  };
  shareCard.append(shareBtn, sheetBtn);

  const note = el("div", { cls: "card", css: "padding:20px;line-height:1.6", html: t("note") });

  // Ordered, grouped layout: child first, then learning, sound, devices,
  // and finally app-level bits + the explainer. One clear scroll.
  wrap.append(
    sectionLabel(t("secChild")), stat, prof, profCard,
    sectionLabel(t("secLearn")), caseCard, dashCard,
    sectionLabel(t("secSound")), soundCard,
    sectionLabel(t("secDevices")), syncCard,
    sectionLabel(t("secApp")), langCard, limCard, shareCard, note,
  );
  s.append(wrap);
  APP.append(s);
}

// One-tap master mute - silences sound effects and Franky's voice
// together. Reachable on every play screen, so a grown-up never has to
// go through the parent-gated settings to hush it.
function muteBtn() {
  const b = el("button", { cls: "btn btn-quiet btn-icon" });
  b.setAttribute("aria-label", "Turn sound on or off");
  const render = () => b.innerHTML =
    ic(S.settings.muted ? "mute" : "sound", 22, S.settings.muted ? "var(--ink-soft)" : "var(--clay)");
  render();
  b.onclick = () => {
    S.settings.muted = !S.settings.muted; save(); buzz(12); render();
    if (S.settings.muted) {
      if (_ttsEl) try { _ttsEl.pause(); } catch {}
      if ("speechSynthesis" in window) try { speechSynthesis.cancel(); } catch {}
    }
  };
  return b;
}

function header(title) {
  const h = el("div", { css: "display:flex;align-items:center;gap:12px;padding:18px 20px 6px" });
  const b = el("button", { cls: "btn btn-quiet btn-icon", html: ic("back", 22) });
  b.onclick = () => { Sound.fx.tap(); buzz(12); go("home"); };
  h.append(b, el("div", { cls: "t-title", textContent: title }),
    el("div", { css: "flex:1" }), muteBtn());
  return h;
}

/* ----- 19. Service worker ---------------------------------------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("./sw.js").catch(() => {}));
}

/* ----- 20. Start cross-device sync ------------------------------------- */
// One initial pull (if this profile is linked) so a device that was
// offline picks up the latest learning state before the child plays.
// Then the periodic timer + visibility/online listeners take over.
Sync.start ? Sync.start() : null;   // opens the live WebSocket if linked
window.addEventListener("sync:applied", () => {
  // Refresh only safe screens: home/settings. Mid-activity refresh would
  // yank the child out of a drawing or reading session, so leave those.
  if (_currentScreen === "home") go("home");
  else if (_currentScreen === "settings") go("settings");
});
</script>
</body>
</html>
