name = "scribble-tts"
main = "worker.js"
compatibility_date = "2025-01-01"

# The OpenAI key is NOT stored here. It is set once as an encrypted secret:
#   npx wrangler secret put OPENAI_API_KEY

# Cross-device sync uses a KV namespace. Create it once with:
#   npx wrangler kv namespace create SCRIBBLE_SYNC
# That command prints an id="..." line; paste the id below, then deploy.
[[kv_namespaces]]
binding = "SYNC"
id = "3b9f3a10b9ef4c5284054795d1199a37"

# Real-time sync: one Durable Object per profile, holding a WebSocket to
# every device. SQLite-backed class so it runs on the free plan too.
[[durable_objects.bindings]]
name = "PROFILE"
class_name = "ProfileRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProfileRoom"]
